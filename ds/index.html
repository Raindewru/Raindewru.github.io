
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>机械专硕导师信息</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei"}
        body{display:flex;height:100vh;}
        .sidebar{
            width:260px;
            background:#f5f7fa;
            border-right:1px solid #ddd;
            padding:20px;
            overflow-y:auto;
        }
        .sidebar h2{
            color:#024590;
            margin-bottom:15px;
            font-size:18px;
            text-align:center;
        }
        .teacher-item{
            padding:10px 12px;
            margin:6px 0;
            background:white;
            border-radius:6px;
            cursor:pointer;
            border:1px solid #eee;
        }
        .teacher-item:hover{
            background:#e3f2ff;
            border-color:#024590;
        }
        .content{
            flex:1;
            padding:30px;
            overflow-y:auto;
        }
        .content h1{
            color:#024590;
            margin-bottom:20px;
            text-align:center;
        }
        .teacher-card{
            max-width:900px;
            margin:0 auto;
        }
        table{
            width:100% !important;
            border-collapse:collapse;
            margin:10px 0;
        }
        td{
            border:1px solid #666 !important;
            padding:10px;
            vertical-align:top;
        }
        img{
            max-width:100% !important;
            height:auto !important;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>机械专硕导师列表</h2>
        <div id="teacherList"></div>
    </div>
    <div class="content">
        <h1>导师详情</h1>
        <div id="detailArea" class="teacher-card"></div>
    </div>

<script>
fetch('teachers.json')
  .then(res=>res.json())
  .then(teachers=>{
    const list = document.getElementById('teacherList');
    const detail = document.getElementById('detailArea');

    // 按职称分类
    const categories = {
      '教授': teachers.filter(t => t.title === '教授'),
      '副教授': teachers.filter(t => t.title === '副教授'),
      '其他': teachers.filter(t => t.title === '其他')
    };

    // 渲染分类标题样式
    const categoryTitles = {
      '教授': { color: '#b91c1c', bg: '#fef2f2' },
      '副教授': { color: '#047857', bg: '#ecfdf5' },
      '其他': { color: '#1e40af', bg: '#eff6ff' }
    };

    // 渲染左侧列表（按职称分类）
    Object.keys(categories).forEach(cat => {
      const categoryTeachers = categories[cat];
      if (categoryTeachers.length === 0) return;

      // 添加分类标题
      const titleDiv = document.createElement('div');
      titleDiv.style.cssText = 'padding:10px 12px 6px; margin-top:10px; font-weight:bold; font-size:14px; color:' + categoryTitles[cat].color + '; background:' + categoryTitles[cat].bg + '; border-radius:4px;';
      titleDiv.innerText = cat + ' (' + categoryTeachers.length + '人)';
      list.appendChild(titleDiv);

      // 添加分类下的老师
      categoryTeachers.forEach((t, idx) => {
        let div = document.createElement('div');
        div.className = 'teacher-item';
        div.innerText = t.name;
        div.onclick = () => {
          detail.innerHTML = t.html;
        };
        if (list.children.length === 2 && idx === 0) { // 第一个分类的第一个老师
          detail.innerHTML = t.html;
        }
        list.appendChild(div);
      });
    });
  })
</script>
</body>
</html>
