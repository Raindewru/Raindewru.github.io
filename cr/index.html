<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>机械制造技术基础 · 智能复试助手 | 主题飘落特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 基础框架 (原风格保留) */
        body {
            font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: #f4f8fe;
            color: #1a2f3f;
            padding: 36px 24px 100px 24px;
            font-size: 18px;
            line-height: 1.7;
            transition: background-color 0.4s ease, color 0.3s ease;
            position: relative;
            min-height: 100vh;
        }

        /* 主题变量 (粉色/白色/绿色氛围，同时保持卡片可读) */
        body.theme-pink {
            background: #fff5f7;
        }
        body.theme-pink .header,
        body.theme-pink .card,
        body.theme-pink .random-card {
            background: rgba(255, 250, 252, 0.98);
            border-color: #ffe2e8;
        }
        body.theme-pink .sub {
            background: #ffeef2;
            border-left-color: #f472b6;
            color: #b5476b;
        }
        body.theme-pink .q-id {
            background: #ffe2ea;
            color: #b33b5c;
        }
        body.theme-pink .btn-primary {
            background: #ec489a;
            border-color: #ec489a;
        }
        body.theme-pink .btn-primary:hover {
            background: #db2777;
        }
        body.theme-pink .heart-fab {
            background: #f472b6;
            box-shadow: 0 12px 28px rgba(244, 114, 182, 0.5);
        }

        body.theme-white {
            background: #f0f4f9;
        }
        body.theme-white .header,
        body.theme-white .card,
        body.theme-white .random-card {
            background: rgba(255, 255, 255, 0.96);
            border-color: #e2edf2;
        }
        body.theme-white .sub {
            background: #f0f7fc;
            border-left-color: #7f8c8d;
            color: #2c3e50;
        }
        body.theme-white .btn-primary {
            background: #5d6d7e;
            border-color: #5d6d7e;
        }
        body.theme-white .btn-primary:hover {
            background: #34495e;
        }

        body.theme-green {
            background: #eef5ea;
        }
        body.theme-green .header,
        body.theme-green .card,
        body.theme-green .random-card {
            background: rgba(255, 255, 248, 0.97);
            border-color: #cfe3cf;
        }
        body.theme-green .sub {
            background: #eaf7e6;
            border-left-color: #6fbf4c;
            color: #2f6b2f;
        }
        body.theme-green .q-id {
            background: #d9eed9;
            color: #2c6e2c;
        }
        body.theme-green .btn-primary {
            background: #4c9f4c;
            border-color: #4c9f4c;
        }
        body.theme-green .btn-primary:hover {
            background: #3d8a3d;
        }
        body.theme-green .heart-fab {
            background: #4caf50;
            box-shadow: 0 12px 28px rgba(76, 175, 80, 0.5);
        }

        /* 其余核心样式完全保留原结构 */
        .container {
            max-width: 1480px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .header {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 28px 32px;
            margin-bottom: 40px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(190, 215, 235, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #165a72, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
        }
        body.theme-pink h1 {
            background: linear-gradient(135deg, #b13e6b, #f06292);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        body.theme-green h1 {
            background: linear-gradient(135deg, #2c7840, #5cad5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: #2c6b8c;
            margin-top: 14px;
            font-size: 1rem;
            border-left: 5px solid #3b82f6;
            padding-left: 20px;
            border-radius: 0 20px 20px 0;
            font-weight: 500;
            transition: all 0.2s;
        }

        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            gap: 20px;
        }

        .badge {
            background: #e7f0fa;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #155f7c;
        }
        .theme-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .theme-btn {
            background: white;
            border: 1px solid #d0e2f0;
            padding: 8px 18px;
            border-radius: 48px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #1c6382;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .theme-btn.active {
            background: #1f6382;
            border-color: #1f6382;
            color: white;
        }
        body.theme-pink .theme-btn.active {
            background: #ec489a;
            border-color: #ec489a;
        }
        body.theme-green .theme-btn.active {
            background: #4c9f4c;
            border-color: #4c9f4c;
        }

        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            border: 1px solid #d5e5f0;
            border-radius: 60px;
            padding: 6px 24px;
            flex: 1;
            max-width: 440px;
        }
        .search-box input {
            border: none;
            outline: none;
            font-size: 1rem;
            width: 100%;
            padding: 12px 0;
            background: transparent;
        }
        .btn-group {
            display: flex;
            gap: 14px;
        }
        .btn {
            background: white;
            border: 1px solid #d0e2f0;
            padding: 10px 28px;
            border-radius: 48px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1c6382;
        }
        .btn-primary {
            background: #1f6382;
            border-color: #1f6382;
            color: white;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 32px;
        }
        .card {
            background: white;
            border-radius: 36px;
            box-shadow: 0 15px 32px -14px rgba(0, 0, 0, 0.08);
            border: 1px solid #e6eff7;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #cde2f0;
            box-shadow: 0 28px 38px -18px rgba(0, 0, 0, 0.15);
        }
        .question-header {
            background: #ffffff;
            padding: 26px 28px 20px 28px;
            border-bottom: 1px solid #eef3fa;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
        }
        .q-id {
            background: #e4f0f8;
            border-radius: 60px;
            padding: 5px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: monospace;
            color: #19647e;
            white-space: nowrap;
        }
        .q-text {
            flex: 1;
            font-weight: 700;
            font-size: 1.28rem;
            line-height: 1.45;
            color: #103f52;
        }
        .toggle-btn {
            background: #f0f7fe;
            border: 1px solid #cde0ef;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #266c8c;
        }
        .answer-container {
            padding: 0 28px 28px 28px;
            background: #ffffff;
            border-top: 1px solid #f0f7ff;
            display: none;
        }
        .answer-container.show {
            display: block;
        }
        .answer-content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #1e3b4f;
        }
        .answer-label {
            font-weight: 700;
            color: #1f6082;
            background: rgba(59, 130, 246, 0.12);
            padding: 0 8px;
            border-radius: 12px;
            margin-right: 0.5rem;
            display: inline-block;
            font-size: 0.95rem;
        }
        .bullet-line {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            margin: 0.5rem 0;
        }
        .bullet-dot {
            color: #e26d5c;
            font-size: 1.3rem;
            line-height: 1.4;
            font-weight: 600;
        }
        .highlight-text {
            font-weight: 800;
            color: #bc5a4a;
            background: rgba(255, 225, 220, 0.4);
            padding: 0 3px;
            border-radius: 8px;
        }
        .random-card {
            background: white;
            border-radius: 36px;
            box-shadow: 0 15px 32px -14px rgba(0, 0, 0, 0.08);
            border: 1px solid #e6eff7;
            margin-bottom: 32px;
            padding: 24px 28px;
        }
        .heart-fab {
            position: fixed;
            bottom: 32px;
            right: 20px;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            border: none;
            font-size: 36px;
            color: white;
            transition: transform 0.2s;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.85rem;
            color: #7da1bd;
            border-top: 1px solid #e2edf5;
            padding-top: 30px;
        }
        @media (max-width: 720px) {
            body { padding: 20px 16px 90px 16px; font-size: 17px; }
            .cards-grid { grid-template-columns: 1fr; gap: 24px; }
            .stats-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .heart-fab { width: 56px; height: 56px; font-size: 30px; }
            .q-text { font-size: 1.2rem; }
            .theme-buttons { order: 2; justify-content: center; }
        }

        /* 飘落canvas层 */
        #floatingCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        body .container, body footer, body {
            position: relative;
            z-index: 25;
        }
    </style>
</head>
<body>
<canvas id="floatingCanvas"></canvas>
<div class="container">
    <div class="header">
        <h1>🌸 机械制造技术基础 · 复试精讲</h1>
        <div class="sub">西安工程大学 机械专业 | 核心问答 | 梦幻主题飘落特效 · 一键切换意境</div>
        <div class="stats-bar">
            <div class="badge" id="totalCount">📋 加载中...</div>
            <div class="theme-buttons">
                <button class="theme-btn" data-theme="pink">🌸 粉樱飞舞</button>
                <button class="theme-btn" data-theme="white">❄️ 雪落无声</button>
                <button class="theme-btn" data-theme="green">🍃 绿野清风</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索问题或答案中的关键词..." autocomplete="off">
                <button id="clearSearchBtn">✖</button>
            </div>
            <div class="btn-group">
                <button id="exportJsonBtn" class="btn">📄 导出JSON</button>
            </div>
        </div>
    </div>

    <div class="random-card">
        <div class="random-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
            <span class="random-title" style="font-weight: 700; background: #ecf5fc; padding: 6px 18px; border-radius: 40px;">🎲 随机抽题 · 自测专区</span>
            <button id="randomPickBtn" class="btn btn-primary">🎲 随机抽题</button>
        </div>
        <div class="random-question" style="margin: 20px 0; padding: 12px 0; border-top: 1px solid #eff4fa; border-bottom: 1px solid #eff4fa;">
            <span class="q-text" id="randomQuestionText">加载中...</span>
        </div>
        <div class="random-actions" style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 16px;">
            <button id="randomToggleAnswerBtn" class="toggle-btn">查看答案</button>
        </div>
        <div class="answer-container" id="randomAnswerContainer">
            <div class="answer-content" id="randomAnswerContent"></div>
        </div>
    </div>

    <div class="cards-grid" id="cardsContainer">
        <div class="empty-msg">✨ 题库加载中，请稍后...</div>
    </div>
    <footer>💡 小贴士：点击主题按钮切换飘落特效 & 氛围色 · ❤️ 一键展开/收起所有答案</footer>
</div>
<div class="heart-fab" id="globalHeartBtn" aria-label="全局展开/收起答案">❤️</div>

<script>
    // ---------- 数据加载 (完全外部 data.json) ----------
    let fullQAData = [];
    
    async function loadData() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            fullQAData = await response.json();
            // 数据加载完成后渲染界面
            renderCards('');
            updateRandomQuestion();
        } catch (error) {
            console.error('题库加载失败:', error);
            document.getElementById('cardsContainer').innerHTML = '<div class="empty-msg">❌ 题库加载失败，请确保 data.json 文件存在且格式正确。</div>';
            document.getElementById('totalCount').innerText = '📚 加载失败';
        }
    }
    
    // ---------- 辅助函数 ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatAnswerWithHighlights(text) {
        if (!text) return '';
        text = text.replace(/\\n/g, '\n');
        let lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line !== '');
        const seqRegex = /([\u2460-\u2473]|\d+\.|\d+\))/g;
        let processedLines = [];
        for (let line of lines) {
            let matches = [];
            let match;
            seqRegex.lastIndex = 0;
            while ((match = seqRegex.exec(line)) !== null) matches.push({ index: match.index, text: match[0] });
            if (matches.length <= 1) processedLines.push(line);
            else {
                let segments = [];
                let lastIdx = 0;
                for (let i = 0; i < matches.length; i++) {
                    const m = matches[i];
                    if (lastIdx < m.index) { let prev = line.slice(lastIdx, m.index).trim(); if (prev) segments.push(prev); }
                    const nextIdx = i+1 < matches.length ? matches[i+1].index : line.length;
                    let segment = line.slice(m.index, nextIdx).trim();
                    if (segment) segments.push(segment);
                    lastIdx = nextIdx;
                }
                if (lastIdx < line.length) { let remain = line.slice(lastIdx).trim(); if(remain) segments.push(remain); }
                processedLines.push(...segments);
            }
        }
        const termRegex = /([\u4e00-\u9fa5a-zA-Z]+：)/g;
        const highlightTriggers = ['磨削','顺铣','逆铣','铰孔','特点','切削','主运动','进给运动','积屑瘤','基准','公差'];
        const keywordRegex = new RegExp(`(${highlightTriggers.join('|')})`, 'g');
        function highlightTermAndKeyword(line) {
            let withTerms = line.replace(termRegex, match => `<span class="answer-label">${match}</span>`);
            const temp = [];
            let idx = 0;
            const replaced = withTerms.replace(/<span class="answer-label">.*?<\/span>/g, match => { temp.push(match); return `__TEMP_${idx++}__`; });
            const finalWithKeywords = replaced.replace(keywordRegex, match => `<span class="highlight-text">${match}</span>`);
            let final = finalWithKeywords;
            for (let i=0; i<temp.length; i++) final = final.replace(`__TEMP_${i}__`, temp[i]);
            return final;
        }
        return processedLines.map(segment => {
            const isBullet = /^·\s*/.test(segment);
            const cleaned = isBullet ? segment.replace(/^·\s*/, '') : segment;
            let lineContent = highlightTermAndKeyword(escapeHtml(cleaned));
            const isNumbered = /^[\u2460-\u2473]|^\d+\.|^\d+\)/.test(cleaned);
            const extraStyle = isNumbered ? ' style="margin-bottom: 0.4rem;"' : '';
            if (isBullet) return `<div class="answer-line bullet-line"${extraStyle}><span class="bullet-dot">•</span><span>${lineContent}</span></div>`;
            return `<div class="answer-line"${extraStyle}>${lineContent}</div>`;
        }).join('');
    }
    
    function renderCards(filterText = '') {
        if (!fullQAData.length) return;
        const lower = filterText.toLowerCase().trim();
        const filtered = lower === '' ? fullQAData : fullQAData.filter(item => 
            item.question.toLowerCase().includes(lower) || item.answer.toLowerCase().includes(lower)
        );
        document.getElementById('totalCount').innerText = `📚 共 ${filtered.length} / ${fullQAData.length} 道题目`;
        const container = document.getElementById('cardsContainer');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-msg">🔍 未匹配到“${escapeHtml(filterText)}”</div>`;
            return;
        }
        let html = '';
        filtered.forEach(item => {
            html += `<div class="card" data-id="${item.id}">
                        <div class="question-header">
                            <span class="q-id">${item.id}</span>
                            <span class="q-text">${escapeHtml(item.question)}</span>
                            <button class="toggle-btn" data-id="${item.id}">查看答案</button>
                        </div>
                        <div class="answer-container" id="answer-${item.id}">
                            <div class="answer-content">${formatAnswerWithHighlights(item.answer)}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const qid = parseInt(btn.getAttribute('data-id'));
                const answerDiv = document.getElementById(`answer-${qid}`);
                if (answerDiv.classList.contains('show')) {
                    answerDiv.classList.remove('show');
                    btn.innerHTML = '查看答案';
                } else {
                    answerDiv.classList.add('show');
                    btn.innerHTML = '收起答案';
                }
            });
        });
    }
    
    function toggleAllAnswers() {
        const allContainers = document.querySelectorAll('.answer-container');
        const btns = document.querySelectorAll('.toggle-btn');
        const anyVisible = Array.from(allContainers).some(c => c.classList.contains('show'));
        allContainers.forEach(c => c.classList[anyVisible ? 'remove' : 'add']('show'));
        btns.forEach(btn => btn.innerHTML = anyVisible ? '查看答案' : '收起答案');
    }
    
    // 随机抽题模块
    let currentRandomItem = null;
    function updateRandomQuestion() {
        if (!fullQAData.length) return;
        const rand = Math.floor(Math.random() * fullQAData.length);
        currentRandomItem = fullQAData[rand];
        document.getElementById('randomQuestionText').textContent = currentRandomItem.question;
        document.getElementById('randomAnswerContent').innerHTML = formatAnswerWithHighlights(currentRandomItem.answer);
        const randContainer = document.getElementById('randomAnswerContainer');
        randContainer.classList.remove('show');
        document.getElementById('randomToggleAnswerBtn').textContent = '查看答案';
    }
    function toggleRandomAnswer() {
        const cont = document.getElementById('randomAnswerContainer');
        const btn = document.getElementById('randomToggleAnswerBtn');
        if (cont.classList.contains('show')) {
            cont.classList.remove('show');
            btn.textContent = '查看答案';
        } else {
            cont.classList.add('show');
            btn.textContent = '收起答案';
        }
    }
    
    // ---------- 飘落动画引擎 (精致形状) ----------
    const canvas = document.getElementById('floatingCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;
    let currentTheme = 'pink';
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    
    function resizeCanvas() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
    }
    
    // 绘制樱花花瓣 (五瓣)
    function drawSakura(ctx, x, y, size, rotation, opacity) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.globalAlpha = opacity;
        const petalColor = `rgba(255, 182, 193, ${opacity * 0.9})`;
        const centerColor = `rgba(255, 105, 130, ${opacity * 0.8})`;
        // 五片花瓣
        for (let i = 0; i < 5; i++) {
            const angle = (i * 72) * Math.PI / 180;
            const px = Math.cos(angle) * size * 0.65;
            const py = Math.sin(angle) * size * 0.65;
            ctx.beginPath();
            ctx.ellipse(px, py, size * 0.55, size * 0.7, angle, 0, Math.PI * 2);
            ctx.fillStyle = petalColor;
            ctx.fill();
        }
        // 花蕊
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = centerColor;
        ctx.fill();
        ctx.restore();
    }
    
    // 绘制雪花 (六角星形)
    function drawSnowflake(ctx, x, y, size, rotation, opacity) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.globalAlpha = opacity;
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.95})`;
        ctx.shadowBlur = 2;
        ctx.shadowColor = "rgba(200, 220, 255, 0.6)";
        for (let i = 0; i < 6; i++) {
            const angle = (i * 60) * Math.PI / 180;
            const x1 = Math.cos(angle) * size;
            const y1 = Math.sin(angle) * size;
            const x2 = Math.cos(angle + 0.5) * size * 0.45;
            const y2 = Math.sin(angle + 0.5) * size * 0.45;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.fill();
            // 侧枝
            const branchX = Math.cos(angle) * size * 0.7;
            const branchY = Math.sin(angle) * size * 0.7;
            ctx.beginPath();
            ctx.moveTo(branchX, branchY);
            ctx.lineTo(branchX + Math.cos(angle + 0.8) * size * 0.4, branchY + Math.sin(angle + 0.8) * size * 0.4);
            ctx.lineTo(branchX + Math.cos(angle - 0.8) * size * 0.4, branchY + Math.sin(angle - 0.8) * size * 0.4);
            ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    // 绘制绿叶 (椭圆带叶脉)
    function drawLeaf(ctx, x, y, size, rotation, opacity) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.globalAlpha = opacity;
        ctx.fillStyle = `rgba(100, 180, 80, ${opacity})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 0.7, size * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(60, 120, 40, ${opacity * 0.9})`;
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.3);
        ctx.lineTo(size * 0.3, -size * 0.6);
        ctx.lineTo(0, -size * 0.2);
        ctx.fill();
        // 叶脉
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.4);
        ctx.lineTo(0, size * 0.5);
        ctx.lineWidth = size * 0.08;
        ctx.strokeStyle = `rgba(40, 80, 20, ${opacity * 0.7})`;
        ctx.stroke();
        ctx.restore();
    }
    
    class Particle {
        constructor(x, y, size, speedY, speedX, rotation, rotSpeed, theme) {
            this.x = x;
            this.y = y;
            this.size = size;
            this.speedY = speedY;
            this.speedX = speedX;
            this.rotation = rotation;
            this.rotSpeed = rotSpeed;
            this.theme = theme;
            this.opacity = 0.5 + Math.random() * 0.5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotSpeed;
            if (this.y > canvasHeight + 80) {
                this.y = -80;
                this.x = Math.random() * canvasWidth;
            }
            if (this.x > canvasWidth + 80) this.x = -80;
            if (this.x < -80) this.x = canvasWidth + 80;
        }
        draw(ctx) {
            if (this.theme === 'pink') {
                drawSakura(ctx, this.x, this.y, this.size, this.rotation, this.opacity);
            } else if (this.theme === 'white') {
                drawSnowflake(ctx, this.x, this.y, this.size, this.rotation, this.opacity);
            } else if (this.theme === 'green') {
                drawLeaf(ctx, this.x, this.y, this.size, this.rotation, this.opacity);
            }
        }
    }
    
    function initParticles(theme, count = 70) {
        particles = [];
        for (let i = 0; i < count; i++) {
            let size = 8 + Math.random() * 18;    // 大小不一
            let x = Math.random() * canvasWidth;
            let y = Math.random() * canvasHeight;
            let speedY = 0.4 + Math.random() * 1.6;
            let speedX = (Math.random() - 0.5) * 0.7;
            let rotation = Math.random() * Math.PI * 2;
            let rotSpeed = (Math.random() - 0.5) * 0.02;
            particles.push(new Particle(x, y, size, speedY, speedX, rotation, rotSpeed, theme));
        }
    }
    
    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        for (let p of particles) {
            p.update();
            p.draw(ctx);
        }
        animationId = requestAnimationFrame(animateParticles);
    }
    
    function setTheme(theme) {
        currentTheme = theme;
        document.body.classList.remove('theme-pink', 'theme-white', 'theme-green');
        if (theme === 'pink') document.body.classList.add('theme-pink');
        else if (theme === 'white') document.body.classList.add('theme-white');
        else if (theme === 'green') document.body.classList.add('theme-green');
        
        if (animationId) cancelAnimationFrame(animationId);
        resizeCanvas();
        let particleCount = 70;
        if (theme === 'white') particleCount = 80;
        if (theme === 'green') particleCount = 65;
        initParticles(theme, particleCount);
        animateParticles();
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
            if (btn.getAttribute('data-theme') === theme) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    window.addEventListener('resize', () => {
        resizeCanvas();
        if (currentTheme) {
            initParticles(currentTheme, particles.length);
        }
    });
    
    // ---------- 绑定事件 & 启动 ----------
    document.getElementById('exportJsonBtn').addEventListener('click', () => {
        if (!fullQAData.length) return;
        const dataStr = JSON.stringify(fullQAData, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'mechanical_manufacture_qa.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
    
    const searchInput = document.getElementById('searchInput');
    document.getElementById('clearSearchBtn').addEventListener('click', () => {
        searchInput.value = '';
        renderCards('');
    });
    searchInput.addEventListener('input', (e) => {
        renderCards(e.target.value);
    });
    document.getElementById('globalHeartBtn').addEventListener('click', toggleAllAnswers);
    document.getElementById('randomPickBtn').addEventListener('click', updateRandomQuestion);
    document.getElementById('randomToggleAnswerBtn').addEventListener('click', toggleRandomAnswer);
    
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            setTheme(btn.getAttribute('data-theme'));
        });
    });
    
    // 启动: 先加载数据，再初始化飘落（默认粉色樱花）
    loadData().then(() => {
        resizeCanvas();
        setTheme('pink');
    }).catch(() => {
        // 即使数据加载失败也展示飘落效果
        resizeCanvas();
        setTheme('pink');
    });
</script>
