<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>机械制造技术基础 · 智能复试助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: #f4f8fe;
            color: #1a2f3f;
            padding: 36px 24px 100px 24px;
            font-size: 18px;
            line-height: 1.7;
        }

        .container {
            max-width: 1480px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 28px 32px;
            margin-bottom: 40px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(190, 215, 235, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #165a72, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
        }

        .sub {
            color: #2c6b8c;
            margin-top: 14px;
            font-size: 1rem;
            border-left: 5px solid #3b82f6;
            padding-left: 20px;
            background: #ecf5fc;
            border-radius: 0 20px 20px 0;
            font-weight: 500;
        }

        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            gap: 20px;
        }

        .badge {
            background: #e7f0fa;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #155f7c;
        }

        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            border: 1px solid #d5e5f0;
            border-radius: 60px;
            padding: 6px 24px;
            flex: 1;
            max-width: 440px;
        }
        .search-box:focus-within {
            border-color: #5f9fc0;
            box-shadow: 0 4px 12px rgba(47, 128, 166, 0.1);
        }
        .search-box input {
            border: none;
            outline: none;
            font-size: 1rem;
            width: 100%;
            padding: 12px 0;
            background: transparent;
        }
        .search-box button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            color: #7e9ebd;
        }

        .btn-group {
            display: flex;
            gap: 14px;
        }

        .btn {
            background: white;
            border: 1px solid #d0e2f0;
            padding: 10px 28px;
            border-radius: 48px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1c6382;
        }

        .btn-primary {
            background: #1f6382;
            border-color: #1f6382;
            color: white;
        }

        .btn-primary:hover {
            background: #0e4f6b;
            transform: translateY(-2px);
        }

        .btn:hover {
            background: #eef4fc;
            transform: translateY(-1px);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 32px;
        }

        .card {
            background: white;
            border-radius: 36px;
            box-shadow: 0 15px 32px -14px rgba(0, 0, 0, 0.08);
            border: 1px solid #e6eff7;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #cde2f0;
            box-shadow: 0 28px 38px -18px rgba(0, 0, 0, 0.15);
        }

        .question-header {
            background: #ffffff;
            padding: 26px 28px 20px 28px;
            border-bottom: 1px solid #eef3fa;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
        }

        .q-id {
            background: #e4f0f8;
            border-radius: 60px;
            padding: 5px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: monospace;
            color: #19647e;
            white-space: nowrap;
        }

        .q-text {
            flex: 1;
            font-weight: 700;
            font-size: 1.28rem;
            line-height: 1.45;
            color: #103f52;
        }

        .toggle-btn {
            background: #f0f7fe;
            border: 1px solid #cde0ef;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #266c8c;
        }

        .toggle-btn:hover {
            background-color: #e3f0f9;
            border-color: #99bed9;
            transform: scale(0.97);
        }

        .answer-container {
            padding: 0 28px 28px 28px;
            background: #ffffff;
            border-top: 1px solid #f0f7ff;
            display: none;
        }

        .answer-container.show {
            display: block;
        }

        .answer-content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #1e3b4f;
        }

        .answer-line {
            margin-bottom: 0.5rem;
        }

        .answer-label {
            font-weight: 700;
            color: #1f6082;
            background: rgba(59, 130, 246, 0.12);
            padding: 0 8px;
            border-radius: 12px;
            margin-right: 0.5rem;
            display: inline-block;
            font-size: 0.95rem;
        }

        .bullet-line {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            margin: 0.5rem 0;
        }

        .bullet-dot {
            color: #e26d5c;
            font-size: 1.3rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .highlight-text {
            font-weight: 800;
            color: #bc5a4a;
            background: rgba(255, 225, 220, 0.4);
            padding: 0 3px;
            border-radius: 8px;
        }

        .empty-msg {
            text-align: center;
            background: #ffffffdd;
            border-radius: 60px;
            padding: 70px 28px;
            color: #5885a8;
            font-size: 1.2rem;
            font-weight: 500;
            grid-column: 1 / -1;
            border: 1px solid #e2edf5;
        }

        .heart-fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: #ff7675;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(255, 107, 107, 0.45);
            z-index: 1000;
            border: none;
            font-size: 36px;
            color: white;
        }

        .heart-fab:hover {
            transform: scale(1.08);
            background: #ff5c5b;
        }

        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.85rem;
            color: #7da1bd;
            border-top: 1px solid #e2edf5;
            padding-top: 30px;
        }

        /* 随机问答卡片 */
        .random-card {
            background: white;
            border-radius: 36px;
            box-shadow: 0 15px 32px -14px rgba(0, 0, 0, 0.08);
            border: 1px solid #e6eff7;
            margin-bottom: 32px;
            padding: 24px 28px;
        }
        .random-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .random-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1f6382;
            background: #ecf5fc;
            padding: 6px 18px;
            border-radius: 40px;
        }
        .random-question {
            margin-bottom: 20px;
            padding: 12px 0;
            border-top: 1px solid #eff4fa;
            border-bottom: 1px solid #eff4fa;
        }
        .random-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 16px;
        }
        #randomAnswerContainer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eef3fa;
        }

        @media (max-width: 720px) {
            body {
                padding: 20px 16px 90px 16px;
                font-size: 17px;
            }
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .stats-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
            }
            .heart-fab {
                width: 56px;
                height: 56px;
                font-size: 30px;
                bottom: 20px;
                right: 20px;
            }
            .q-text {
                font-size: 1.2rem;
            }
            .question-header {
                padding: 22px 20px 16px 20px;
            }
            .answer-container {
                padding: 0 20px 22px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .random-card {
                padding: 18px 20px;
            }
            .random-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📖 机械制造技术基础 · 复试精讲</h1>
        <div class="sub">西安工程大学 机械专业 | 123道核心问答 | 点击卡片按钮显示答案 · 爱心全局控制</div>
        <div class="stats-bar">
            <div class="badge" id="totalCount">📋 加载中...</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索问题或答案中的关键词..." autocomplete="off">
                <button id="clearSearchBtn">✖</button>
            </div>
            <div class="btn-group">
                <button id="exportJsonBtn" class="btn">📄 导出JSON</button>
            </div>
        </div>
    </div>

    <!-- 随机问答模块 -->
    <div class="random-card">
        <div class="random-header">
            <span class="random-title">🎲 随机抽题 · 自测专区</span>
            <button id="randomPickBtn" class="btn btn-primary">🎲 随机抽题</button>
        </div>
        <div class="random-question">
            <span class="q-text" id="randomQuestionText">加载中...</span>
        </div>
        <div class="random-actions">
            <button id="randomToggleAnswerBtn" class="toggle-btn">查看答案</button>
        </div>
        <div class="answer-container" id="randomAnswerContainer">
            <div class="answer-content" id="randomAnswerContent"></div>
        </div>
    </div>

    <div class="cards-grid" id="cardsContainer">
        <div class="empty-msg">✨ 加载题库中，请稍后...</div>
    </div>
    <footer>💡 小贴士：答案中 ▹ 开头的为要点分行，重要术语已高亮加粗。点击 ❤️ 一键展开/收起所有答案。</footer>
</div>

<div class="heart-fab" id="globalHeartBtn" aria-label="全局展开/收起答案">❤️</div>
<script>
    // --------------------------------------------------------------
    // 完整题库数据 (123道，基于原始复试文档整理，无删减)
    // --------------------------------------------------------------
    const fullQAData = [
      {"id":1,"question":"什么是主运动、什么是进给运动？","answer":"主运动：形成切削、切下切屑最基本、最主要的相对运动，速度最高、消耗功率最大。\\n进给运动：使切削层不断投入切削，从而加工出完整工件表面的运动。"},
      {"id":2,"question":"机床的外传动链和内传动链分别指的是什么？","answer":"外传动链：动力源与执行件之间的传动链。\\n内传动链：有严格运动关系的执行件之间的传动链。"},
      {"id":3,"question":"机床精度的总类有哪些？","answer":"①几何精度、②运动精度、③传动精度、④定位精度、⑤工作精度  ⑥精度保持性"},
      {"id":4,"question":"车削的主运动和进给运动分别是什么？","answer":"主运动：工件旋转  进给运动：刀具对工件的相对移动"},
      {"id":5,"question":"车削的工艺特点有哪些？","answer":"①适用范围广泛。  ②容易保证被加工零件各表面的位置精度。  ③可用于有色金属零件的精加工。  ④切削过程比较平稳（切削力稳定、惯性小、冲击小）。  ⑤生产成本较低。  ⑥加工的万能性好"},
      {"id":6,"question":"铣削的主运动和进给运动分别是什么？","answer":"主运动：刀具旋转；进给运动：工件移动"},
      {"id":7,"question":"什么是端铣和周铣？各有什么特点？","answer":"周铣：铣刀的外圆面刀刃完成加工表面。端铣：铣刀的端面刀刃完成加工表面。端铣加工质量好，多用于大平面铣削。周铣适应性强，多用于小平面、沟槽和成形面铣削。"},
      {"id":8,"question":"什么是顺铣？顺铣有什么特点？","answer":"顺铣：铣刀切削速度方向与工件进给方向相同。\\n特点：\\n· 切削轻快，表面质量好，刀具磨损小；\\n· 垂直分力向下，工件夹紧稳定；\\n· 水平分力与进给同向，丝杠有间隙易造成工作台窜动、打刀；\\n刀具先切硬皮，不适宜带硬皮毛坯，多用于精加工。"},
      {"id":9,"question":"什么是逆铣？逆铣有什么特点？","answer":"逆铣：切削速度方向与工件进给方向相反。\\n特点：\\n· 切削厚度由零渐增，刀刃挤压滑行，刀具磨损大；\\n· 切削力上抬工件，易振动；\\n· 不会造成工作台窜动，适合带硬皮毛坯粗加工。"},
      {"id":10,"question":"铣削的工艺特点有哪些？","answer":"①铣削是多刃切削，生产率较高 ②断续切削，散热条件较好 ③应用范围广泛 ④铣刀刀齿的切入切出形成冲击，切削过程容易产生振动，限制表面质量的提高"},
      {"id":11,"question":"刨削的主运动和进给运动分别是什么？","answer":"主运动：刨刀的往复直线运动 进给运动：刀具与工件之间的相对移动"},
      {"id":12,"question":"刨削的工艺特点有哪些？","answer":"①机床与刀具简单，加工成本低。 ②加工精度低，生产率低。"},
      {"id":13,"question":"钻削的主运动和进给运动分别是什么？","answer":"钻头的旋转运动为主运动；钻头的轴向运动为进给运动"},
      {"id":14,"question":"钻孔的工艺特点有哪些？","answer":"①容易产生“引偏”； ②排屑困难； ③不易散热； ④加工精度低，表面质量差，用于粗加工。"},
      {"id":15,"question":"减少钻头“引偏”的措施有哪些？","answer":"①预钻锥型定心坑 ②用钻套给钻头导向 ③尽量使用主切削刃对称一致的钻头"},
      {"id":16,"question":"扩孔的工艺特点有哪些？","answer":"①刚性较好； ②导向性较好； ③切削条件较好"},
      {"id":17,"question":"铰孔的工艺特点有哪些？","answer":"(1)铰刀刚性好、导向性好，切削余量小，容易保证孔的尺寸精度和形状精度。\\n(2)铰孔切削速度低、切削力小，加工表面质量好，粗糙度值小。\\n(3)不能校正原有孔的轴线歪斜，孔的位置精度主要由前道工序保证。\\n(4)仅靠钻一扩一铰工艺，难以保证孔与孔之间的位置精度。"},
      {"id":18,"question":"镗削的主运动和进给运动分别是什么？","answer":"主运动：镗刀的转动 进给运动：工件的轴向移动。"},
      {"id":19,"question":"镗削的工艺特点有哪些？","answer":"①主要加工已有预孔的孔和孔系 ②可有效校正原有孔的轴线偏斜，保证孔和孔系的位置精度 ③精度较高，表面粗糙度较低 ④加工范围广泛 ⑤加工效率低"},
      {"id":20,"question":"扩孔、铰孔与镗孔的区别是什么？","answer":"扩孔、铰孔无法提高原底孔轴线的位置精度和直线度。镗孔后的轴线以镗杆的回转轴线决定，可以校正原底孔轴线的位置精度。"},
      {"id":21,"question":"磨削的主运动和进给运动分别是什么？","answer":"主运动：砂轮的旋转运动 进给运动：砂轮与工件之间的相对直线移动"},
      {"id":22,"question":"磨削的工艺特点有哪些？","answer":"①砂轮具有自锐性，但也需要修整 ②加工精度高，表面粗糙度小 ③可加工高硬度材料，往往作为最终加工工序 ④磨削温度高，由于产生热量大，需要充分的磨削液冷却，否则会产生烧伤，降低工件表面质量 ⑤径向磨削分力大"},
      {"id":23,"question":"铣齿的特点有哪些？","answer":"①加工成本低：铣齿可以在一般的铣床上进行，且刀具简单 ②加工精度低：铣刀的齿形误差较大，且铣齿时存在冲击和振动 ③生产率低：铣齿时，每铣一个齿槽都要重复切入切出、退刀和分度等铣齿仅适用于单件小批生产或维修精度不高的低速齿轮"},
      {"id":24,"question":"滚齿的特点有哪些？","answer":"①精度较高，可获得8-7级精度的齿轮。 ②刀具成本低，可以用同一模数的滚刀，滚削出模数相同齿数不同的齿轮 ③加工范围广泛，可以加工直齿轮，斜齿轮及蜗轮等。 ④精度和生产效率都比较高。 ⑤不能加工内齿轮和相距太近的多联齿轮。滚齿适宜单件小批生产，也适宜大批量生产。"},
      {"id":25,"question":"插齿的特点有哪些？","answer":"①是展成法加工，刀具成本低 ②插齿与滚齿的加工精度基本相同 ③插齿的分度精度比滚齿低 ④插齿的回程是空行程，生产效率不如滚齿 ⑤加工范围广泛插齿既适合单件小批量，也适合大批量生产。"},
      {"id":26,"question":"剃齿的特点有哪些？","answer":"剃齿适合大批量生产，主要用于精加工滚齿或插齿后未经淬火的齿轮，去除滚齿后的毛刺与磕碰，提高齿形精度和齿向精度，但不能修正分齿误差。"},
      {"id":27,"question":"珩齿的特点有哪些？","answer":"珩齿适合大批量生产，主要用于加工经过淬火的齿轮。用于消除淬火后的氧化皮，减小表面粗糙度。"},
      {"id":28,"question":"磨齿的特点有哪些？","answer":"磨齿主要用于淬硬或不淬硬齿形的精加工，加工精度高，对齿形误差的修正能力很强。磨齿的加工成本高，只适合单件小批生产。"},
      {"id":29,"question":"研齿的特点有哪些？","answer":"研齿主要用于淬硬齿轮的齿形精加工，可有效减小齿面粗糙度，但不能提高齿形精度。"},
      {"id":30,"question":"数控机床的特点有哪些？","answer":"①加工精度高； ②生产效率高； ③自动化程度高 ④对加工对象的适应性强； ⑤经济效益好"},
      {"id":31,"question":"加工中心的特点有哪些？","answer":"①工序集中； ②备有刀库，能自动换刀； ③加工精度高 ④生产效率高； ⑤有自动转位工作台，自动进行工作台交换。"},
      {"id":32,"question":"特种加工方法的特点有哪些？","answer":"①工具材料的硬度可以大大低于工件材料的硬度 ②可以直接利用电能、化学能、电化学能、声能、光能等能量对材料进行加工 ③加工过程中的机械力不明显，工件很少产生机械变形和热变形，工件的加工精度和表面质量高"},
      {"id":33,"question":"简述前刀面、主后刀面和副后刀面的定义","answer":"①前刀面：刀具与切屑接触并相互作用（切屑流出）的表面。 ②主后刀面：刀具与工件过渡表面接触并相互作用的表面。 ③副后刀面：刀具与工件已加工表面接触并相互作用的表面。"},
      {"id":34,"question":"简述主切削刃、副切削刃","answer":"主切削刃：前刀面与主后刀面的交线，形成过渡表面。副切削刃：前刀面与副后刀面的交线，形成已加工表面。"},
      {"id":35,"question":"什么是刀具的前角？前角的大小有哪些影响？","answer":"前刀面与基面之间的夹角是前角，前角主要影响切削的难易程度。增大前角能使刀刃变得锋利，使切削更为轻快，并减小切削力和切削热。但前角过大，刀刃和刀尖的强度会下降，刀具导热体积减小，影响刀具寿命。"},
      {"id":36,"question":"什么是刀具的后角？后角的大小如何选取？","answer":"后刀面与切削平面之间的夹角是后角。后角的主要作用是减小后刀面与工件间的摩擦和后刀面的磨损。选取：①切削厚度越大，刀具后角越小； ②工件材料越软，塑性越大，后角越大。 ③工艺系统刚性较差时，应当适当减小后角， ④尺寸精度要求较高的刀具，后角宜取小值"},
      {"id":37,"question":"刀具主偏角的大小有何影响？该如何选取？","answer":"主偏角的大小会影响切削分力大小、刀具寿命等。①工艺系统刚性很好时，主偏角宜取小值，可以提高刀具耐用度，减小已加工面粗糙度 ②工件刚性较差时，为避免工件变形和振动，应选用较大的主偏角。"},
      {"id":38,"question":"刀具的副偏角有什么作用？","answer":"刀具副偏角的作用是为了减小副切削刃、副后刀面与已加工表面之间的摩擦，以防止切削时产生振动。"},
      {"id":39,"question":"什么是自由切削？什么是非自由切削？","answer":"自由切削：在刀具切削的过程中，只有一条直线刀刃参加切削。非自由切削：在刀具切削的过程中，有曲线刀刃或者多条刀刃参与切削。"},
      {"id":40,"question":"刀具材料应具备哪些性能？","answer":"①高的强度和耐磨性、 ②足够的强度和韧性、 ③高的耐热性、 ④良好的热物理性能和耐热冲击性能、 ⑤良好的工艺性能、 ⑥经济性"},
      {"id":41,"question":"高速钢的性能特点有哪些？","answer":"①热稳定性好、 ②高强度、 ③制造工艺简单、 ④材料性能稳定"},
      {"id":42,"question":"YG类硬质合金刀具的特点和加工范围？","answer":"特点：①韧性高、 ②耐磨性差 加工范围：铸铁、有色金属和非金属材料"},
      {"id":43,"question":"YT类硬质合金刀具的特点和加工范围？","answer":"特点：①硬度高、 ②耐热性好、 ③耐磨性好、 ④韧性差 加工范围：适合加工钢类零件"},
      {"id":44,"question":"YW类硬质合金刀具的特点和加工范围？","answer":"特点：综合性能良好 加工范围：铸铁和钢类都可以加工：高锰钢、耐热型钢、不锈钢等"},
      {"id":45,"question":"金刚石刀具的加工范围？","answer":"多用于超精密加工；无法切削铁类合金，是切削铝合金最理想的刀具。"},
      {"id":46,"question":"立方氮化硼刀具的加工范围？","answer":"高速切削黑色金属材料的理想刀具"},
      {"id":47,"question":"研究金属切削变形的方法有哪些？","answer":"①图像塑性法、 ②高速摄影法、 ③快速落刀法、 ④扫描电镜显微观察法、 ⑤光弹性、 ⑥光塑性试验法"},
      {"id":48,"question":"切削加工的三大变形区及其特点？","answer":"①第一变形区：沿滑移线发生剪切变形，产生加工硬化，切削速度越大，第一变形区越窄 ②第二变形区：前刀面与切屑底部挤压和摩擦，切屑弯曲变形；切屑底层纤维化，流速减慢滞留黏结前刀面；切屑与前刀面接触区温度升高。 ③第三变形区：后刀面与已加工表面挤压摩擦，产生变形与回弹，造成表面层材料加工硬化，应力集中。"},
      {"id":49,"question":"什么是积屑瘤？","answer":"切削速度不高又能形成连续切屑时，加工一般塑性材料，常在前刀面黏结一个硬块，硬度很高，平稳时可以代替刀刃进行切削，这种冷焊在前刀面的金属称为积屑瘤。"},
      {"id":50,"question":"积屑瘤对切削加工的影响？","answer":"①刀具实际前角增大 ②实际切削厚度增大，积屑瘤的增长脱落成周期性，增大切削厚度变化，引起振动 ③使已加工表面粗糙度增大 ④相对稳定时，可代替刀具进行切削，减小刀具磨损不稳定时，对硬质合金刀具，积屑瘤破裂会使刀具颗粒剥落，加剧磨损"},
      {"id":51,"question":"防止积屑瘤产生的方法？","answer":"①采用低速切削，使黏结现象不易发生 ②提高切削速度，使切削速度高于积屑瘤存在的速度 ③采用润滑效果好的切削液，减少摩擦 ④增加刀具前角，降低刀屑接触区压力 ⑤提高工件材料硬度，减小加工硬化倾向"},
      {"id":52,"question":"切屑的类型有哪几种？","answer":"①带状切屑：切削塑性金属材料，当切削厚度较小、切削速度较高、刀具前角较大时，一般得到带状切屑。 ②挤裂切屑：多在切削速度较低、切削厚度较大、刀具前角较小时产生。 ③单元切屑：当切削某些塑性材料，刀具前角更小，切削速度更低，切削厚度更大，会产生单元切屑。 ④崩碎切屑：切削硬脆材料，切削厚度较大时常得到崩碎切屑。"},
      {"id":53,"question":"切削力的来源有哪些？","answer":"①克服被加工材料弹性变形的抗力 ②克服被加工材料塑性变形的抗力 ③克服切屑对前刀面的摩擦力克服刀具后刀面对过渡表面与已加工表面间的摩擦力"},
      {"id":54,"question":"切削力的影响因素有哪些？","answer":"①工件的材料：工件材料强度越大硬度越大，则切削力越大 ②切削用量：背吃刀量越大切削力越大，进给量越大切削力越大，通常切削速度越快切削力越小 ③刀具的参数：前角越大切削力越小；刃倾角越大，xy方向的切削力越大；主偏角越大，通常x方向切削力越大，y方向切削力越小 ④刀具材料的摩擦系数：摩擦系数越大，切削力越大 ⑤切削液：采用切削液可以降低切削力"},
      {"id":55,"question":"切削用量三要素对切削力影响程度的大小顺序是什么？","answer":"背吃刀量 aP > 进给量 f > 切削速度 ν"},
      {"id":56,"question":"切削力可以通过哪些方法获得，原理是什么？","answer":"①测定机床功率计算切削力 ②通过测力仪测量切削力：电阻应变片式测力仪，压电式测力仪"},
      {"id":57,"question":"影响切削热的因素有哪些？","answer":"①切削用量：背吃刀量 aP > 切削速度 ν > 进给量 f ②工件材料：强度、硬度越高，切削温度越高，导热性越好，切削温度越小 ③刀具角度：前角加大，变形和摩擦减小，切削热小；前角过小，刀头散热体积减小，不利于散热；主偏角减小使切削刃工作长度增加；有利于散热。 ④刀具磨损：后刀面磨损到一定程度后，对切削温度影响加大。 ⑤切削液：取决于切削液的导热性、比热容、流量、浇注方式等"},
      {"id":58,"question":"切削温度分布规律有哪些？","answer":"①剪切面上各点温度几乎相同； ②前后刀面最高温度不在刀刃上，而在离刀刃一定距离的地方； ③在剪切域中，垂直剪切面的温度梯度很大； ④在切屑靠近前刀面的一层上温度梯度很大； ⑤后刀面接触长度较小，温度升降在极短时间内完成； ⑥工件材料塑性越大，前刀面接触长度越大，切削温度分布越均匀，脆性越大，温度最高点离刀刃越近； ⑦工件材料导热系数越低，刀具前后刀面温度越高。"},
      {"id":59,"question":"刀具磨损的形态有哪些？","answer":"①前刀面磨损：加工塑性材料，切削速度和切削厚度都较大时，切屑在前刀面会磨出凹洼，称为月牙洼，在温度最高的地方产生。 ②后刀面磨损：加工脆性材料，或切削速度、切削厚度都较小的情况下加工塑性材料时，刀尖钝圆与已加工表面挤压摩擦，发生弹性和塑性变形，造成后刀面磨损。 ③边界磨损：切削钢料时，常在主切削刃靠工件外皮处、副切削刃靠近刀尖处的后刀面上，磨出较深的沟纹。"},
      {"id":60,"question":"刀具磨损的原因？","answer":"①硬质点磨损：因工件材料的硬质点及积屑瘤的碎片在刀面上划出沟纹造成的机械磨损 ②黏结磨损：黏结是刀具与工件材料在高温高压下，接触到原子间距离产生塑性变形而发生的冷焊。两表面的黏结点因相对运动撕裂被对方背走，会造成刀具黏结磨损。 ③扩散磨损：高温下刀具前刀面与新鲜工件表面相接处，有很高的化学活性，化学元素相互扩散，改变刀具化学成分，使刀具脆弱加速磨损。 ④化学磨损：刀具材料与周围介质发生化学反应，在刀具表面形成硬度较低的化合物，并被切屑带走，加速磨损。或刀具被某种介质腐蚀，造成刀具磨损。"},
      {"id":61,"question":"如何改善材料的切削加工性？","answer":"①调整工件材料的化学成分，在钢中加入硫S、铅Pb改善切削加工性，得到易切钢（切削力小，容易断屑，刀具耐用度高，加工表面质量好） ②通过热处理改变工件材料的金相组织和物理力学性能高碳钢、工具钢：球化退火；低碳钢：冷拔、正火"},
      {"id":62,"question":"切削用量怎样影响切削力、切削温度、刀具寿命？","answer":"①对切削力的影响：背吃刀量 ap > 进给量 f > 切削速度 ν ②对切削温度的影响：切削速度 ν > 进给量 f > 背吃刀量 ap ③对刀具寿命的影响：切削速度 ν > 进给量 f > 背吃刀量 ap"},
      {"id":63,"question":"高速切削有什么特点？","answer":"①加工效率高； ②加工精度高 ③表面质量好； ④能耗低，节省资源"},
      {"id":64,"question":"什么是机械加工工艺过程？","answer":"采用机械加工的方法(包括钳工的手工操作)，按规定的顺序把毛坯（包括轧制材料）变成零件的全部过程。"},
      {"id":65,"question":"零件的结构工艺性指的是什么？","answer":"工艺性就是有加工的可能性，结构工艺性好就是在相同的生产条件下能用较为经济的方法保质保量地加工出来。 ①被加工表面的加工可能性 ②保证位置精度的可能性（同轴度，垂直度，平行度等） ③零件安装时应有方便的定位基准 ④加工面的尺寸、形状及位置应便于加工"},
      {"id":66,"question":"工艺过程的基本单元是什么？","answer":"工序是组成工艺过程的基本单元。"},
      {"id":67,"question":"什么是工序、安装、工步、工位和走刀？","answer":"①工序：一个(或一组)工人在一个工作地点对一个(或几个)工件连续完成的那部分工艺过程称为一个工序。 ②安装：一个工序有时在零件的几次装夹下完成，在零件每次装夹下所完成的那部分工作称为一次安装。 ③工步：在加工表面、切削刀具和切削用量（不包括切削深度)都不变的情况下完成的那一部分工作称为一个工步。是工序的基本单元。 ④工位：工件在机床上相对刀具所占据的每个加工位置所完成的那部分工作称一个工位。 ⑤走刀：有些工步由于余量较大或其他原因，需要用同一刀具在同一转速和进给量条件下对同一表面进行多次切削，刀具对工件的每次切削称为一次走刀"},
      {"id":68,"question":"毛坯的种类有哪些？","answer":"①铸件：适用于做形状复杂的零件的毛坯 ②锻件：适用于对强度有一定要求，形状比较简单的零件 ③热轧型材：尺寸范围大，精度低，用于一般机器零件 ④冷拉型材：尺寸范围小，精度高，用于制作毛坯精度要求较高的中小零件 ⑤焊接件：用焊接的方法得到的结合件 ⑥其他毛坯：主要包括冲压、粉末冶金、冷挤和塑料压制等"},
      {"id":69,"question":"毛坯的选择原则有哪些？","answer":"①零件的生产纲领：产量大，采用金属模机械造型、模锻、型材等；产量小，采用自由锻造或手工造型 ②零件的结构形状和外形尺寸：形状复杂或存在薄壁，不能采用金属型铸造；大尺寸不能采用模锻和压铸，宜采用自由锻造、砂型铸造；直径差不多的阶梯轴采用圆棒料，直径相差较大的阶梯轴采用锻件 ③零件材料和材料的性能要求：铸铁或青铜零件采用铸件；形状不复杂，力学性能要求不高的钢制零件采用型材；重要钢制零件采用锻件 ④现有生产条件，充分利用新工艺、新技术、新材料"},
      {"id":70,"question":"工件在机床上的安装方法有那些？其原理是什么？","answer":"①直接安装：四爪单动卡盘、车孔 ②划线安装：按图纸要求，在工件表面上划出加工表面的尺寸及位置线，然后利用划针盘等工具在机床上对工件找正然后夹紧 ③夹具安装：靠夹具来保证工件在机床上所需的位置，并使其夹紧"},
      {"id":71,"question":"获得加工尺寸的方法有哪些？","answer":"①试切法：对工件试切、测量、调整刀具、再试切，直至达到尺寸要求后才加工全部表面。 ②调整法：加工前按规定尺寸调整好刀具与工件相对位置及进给行程，从而保证在加工时自动获得所需距离尺寸精度的加工方法。 ③定尺寸刀具法：用刀具的相应尺寸(如钻头、铰刀、扩刀等)来保证工件被加工部位尺寸精度的方法。 ④主动测量法：加工中主动测量和加工后主动测量"},
      {"id":72,"question":"粗基准的定义及其选择方法？","answer":"粗基准：用零件毛坯上未经加工的表面作为定位基准的表面。 ①相互位置要求原则：若须保证加工面和不加工面的相互位置要求则应以不加工面作为粗基准；若零件上有很多不加工的面，则应以与加工面位置精度要求较高的表面为粗基准。 ②余量均匀原则：若须保证重要表面的加工余量均匀时，则应选择该表面作为粗基准。 ③须考虑定位准确、夹紧可靠，以及夹具结构简单，操纵方便。表面尽可能平整、光洁和有足够大的尺寸，不许有锻造飞边和铸造浇冒口和其他缺陷，不宜选用铸造分型面作为粗基准。 ④不重复使用粗基准原则：如果已经能用精基准定位，不重复使用粗基准。"},
      {"id":73,"question":"精基准的定义及其选择方法？","answer":"精基准：采用已加工过的表面作为定位基准的表面。选择原则： ①基准重合原则：尽量选择设计基准为精基准。 ②最短路线原则：尽量减少基准的转换次数。 ③统一基准原则：尽早加工出方便加工出其他表面的平面。 ④保证定位准确稳定（表面尽可能大），夹紧可靠。 ⑤互为基准或自为基准原则：减小加工余量，提高生产效率，保证表面层质量"},
      {"id":74,"question":"什么是经济加工精度？","answer":"在正常的机床、刀具、工人等工作条件下，以最有利的消耗成本所能达到的精度"},
      {"id":75,"question":"加工阶段是如何划分的？划分加工阶段的目的是？","answer":"加工阶段主要分为粗加工阶段、半精加工阶段、精加工阶段、光整加工阶段目的： ①保证加工质量 ②合理使用加工设备 ③粗加工阶段可及时发现毛坯缺陷－后续工序可否进行 ④适应热处理的需要"},
      {"id":76,"question":"加工工序的安排应遵循哪些原则？","answer":"①先粗后精，粗精分开 ②先面后孔 ③先主要表面，后次要表面 ④有些零件的精加工应在装配总成以后进行 ⑤注意加工阶段的划分"},
      {"id":77,"question":"安排热处理工序有哪些原则？","answer":"①正火、调质、退火等改善材料机械性能和加工性能的热处理应放在粗加工以前或粗与半精加工之间 ②消除内应力的热时效工序，粗加工前或粗与半精加工之间 ③淬火、渗氮、渗碳等得到所要求物理机械性能的淬硬工序放在半精加工和精加工之间进行 ④为得到表面耐磨、耐腐、美观所进行的镀铬、阳极氮化、发蓝、煮黑等放在最后"},
      {"id":78,"question":"辅助工序通常安排在什么时候？","answer":"①关键工序或工时较长的工序前后 ②转换车间的前后，特别是热处理前后 ③加工阶段的前后 ④零件全部加工完后"},
      {"id":79,"question":"工序分散原则的特点及其适用场合？","answer":"①机床、工具、夹具比较简单，调整方便 ②有利于选择合理的切削用量，减少机动时间 ③工艺路线长，设备和工人多，生产面积大大批大量生产，产品经常变换，零件加工质量技术要求高，适用工序分散"},
      {"id":80,"question":"工序集中原则的特点及其适用场合？","answer":"①安装次数少，易于保证位置精度 ②加工设备要求高，变换产品较困难 ③工艺路线短，设备较少，工人少，生产面积小单件小批生产，零件尺寸、重量大适用工序集中原则"},
      {"id":81,"question":"什么是加工余量、工序间余量和总余量？","answer":"①加工余量：加工表面为了达到所需要的精度和表面质量应切除的材料厚度，即加工前后的尺寸之差 ②工序加工余量：一道工序中所切除的材料厚度，即该工序加工前后尺寸差 ③总加工余量：整个加工过程中某一表面所切除的材料的总厚度，即零件上同一表面毛坯尺寸与图纸尺寸之差"},
      {"id":82,"question":"什么是入体原则？","answer":"指标注工件尺寸公差时应向材料实体方向单向标注"},
      {"id":83,"question":"影响加工余量的因素有哪些？","answer":"①前一工序的公差 Ta （对毛坯来说是公差的入体部分） ②前一工序所遗留的表面粗糙度值 Rya 和表面缺陷层深度 Ha ③前一工序所形成的工件空间误差 Pa ④本工序的安装误差 εb Zb = Ta + Rya + Ha + |Pa + εb|"},
      {"id":84,"question":"提高劳动生产率的工艺措施有哪些？","answer":"①缩短基本时间：提高切削用量；减小切削行程长度；合并工步；多件加工 ②缩短辅助时间：提高机床自动化程度；自动上下料；采用回转工作台等 ③缩短准备终结时间：采用先进的夹具、刀具、量具；采用组成工艺 ④缩短工作地点服务时间：采用快速换刀装置；采用断屑槽改善切屑处理 ⑤采用多机床同时进行操作 ⑥高效及自动化加工"},
      {"id":85,"question":"什么是尺寸链？何谓尺寸链的封闭环和组成环？","answer":"尺寸链：由若干尺寸形成封闭的尺寸联系封闭环：尺寸链中在加工过程最后间接获得的尺寸组成环：尺寸链中直接获得的并对封闭环有影响的尺寸"},
      {"id":86,"question":"尺寸链有哪些种类？","answer":"①直线尺寸链：全部组成环平行于封闭环的尺寸链 ②平面尺寸链：全部组成环在一个或几个平行平面内，但某些组成环不平行封闭环的尺寸链 ③空间尺寸链：组成环位于几个不平行的空间平面内的尺寸链"},
      {"id":87,"question":"什么是装配尺寸链？装配尺寸链的封闭环是什么？","answer":"装配尺寸链：表示装配关系及精度的封闭环封闭环：是装配所要保证的装配精度或技术要求"},
      {"id":88,"question":"保证装配精度的装配方法有哪几种？它们各适用于什么场合？","answer":"①互换装配法：不需要很高的工人技术水平，用于流水线和自动生产线 ②选择装配法：大批大量生产情况下，对装配精度要求很高的场合 ③修复装配法：单件小批量，对装配精度要求较高，组成环数目较多的场合 ④合调整装配法：适用于装配精度要求较高，封闭环精度要求较高的场合"},
      {"id":89,"question":"什么是结构的装配工艺性？","answer":"指机器结构符合装配工艺上的要求 ①机器结构能被分经成若干独立的装配单元 ②装配中的修配工作和机械加工工作应尽可能少 ③装配和拆卸都很方便"},
      {"id":90,"question":"制定装配工艺规程的原则是什么？","answer":"①保证产品的质量，并力求提高质量 ②满足装配周期的要求，并尽可能缩短装配周期 ③要尽量减少手工、钳工装配的工作量，提高机械化程度 ④要尽量减少装配环节所占的成本，力争单位面积上具有最大生产率"},
      {"id":91,"question":"夹具由哪些元件和装置组成？各元件有什么作用？","answer":"①定位元件及定位装置：用来确定工件在夹具上位置的元件或装置 ②夹紧元件及夹紧装置：用来夹紧工件，使其位置固定下来的元件或装置 ③对刀元件：用来确定刀具与工件相互位置的元件 ④动力装置：减轻工人体力劳动，提高劳动生产率 ⑤夹具体：将夹具的各种元件、装置等连接起来的基础件 ⑥其他元件及其他装置：如实现工件分度的分度元件或分度装置确定夹具在机床上位置的定向元件"},
      {"id":92,"question":"何为定位和夹紧？为什么说夹紧不等于定位？","answer":"定位：工件在夹具中准确地占有合适的位置夹紧：工件定位后将其固定，使其在加工过程中保持定位位置不变使工件在夹具中处于正确的位置，这是定位的任务，将工件已取得的位置固定下来，则由夹紧完成"},
      {"id":93,"question":"什么是六点定位原理？","answer":"采用六个按一定规则布置的约束点，限制工件的六个自由度，即可实现完全定位。"},
      {"id":94,"question":"什么是过定位？什么是欠定位？","answer":"过定位：工件的某一自由度同时被多个定位元件限制欠定位：工件应该限制的自由度未被限制"},
      {"id":95,"question":"常用的平面定位方法有哪些？","answer":"①支承钉、支承板：精基准用平头、粗基准用球头 ②可调支承：仅对一批零件调整一次 ③自位支承：多个支承浮动或连动组合，限制1个自由度 ④辅助支承："},
      {"id":96,"question":"常用的孔定位方法有哪些？","answer":"①定位销：中小孔定位，短圆柱销限制2个自由度长圆柱销限制4个自由度菱形销限制1个自由度 ②锥销：工件孔端定位，固定锥销限制3个自由度，浮动锥销限制2个自由度 ③心轴：锥度心轴、刚性心轴、弹性心轴、定心心轴"},
      {"id":97,"question":"常用的外圆定位方法有哪些？","answer":"①套筒：长定位套限制4个自由度，短定位套限制2个自由度 ②V形铁：长V型铁限制4个自由度，短V型铁限制2个自由度 ③自动定心定位：三爪卡盘、定心夹头"},
      {"id":98,"question":"何谓定位误差？定位误差是由哪些因素引起的？定位误差的数值一般应控制在零件公差的什么范围内？","answer":"定位误差：指因工件在夹具中定位不准确而带来的误差引起因素： ①定位基准与设计基准（工序基准）不重合 ②定位基面与定位元件之间的间隙 ③定位基面本身的形状位置误差定位误差一般应控制在零件公差的三分之一之内"},
      {"id":99,"question":"为什么会出现基准位移误差？","answer":"由于定位基面和限位基面的制造公差和间隙造成的"},
      {"id":100,"question":"夹紧机构的设计原则有哪些？","answer":"①夹紧必须保证定位而不能破坏定位 ②工件和夹具的夹紧变形必须在允许范围内 ③夹紧机构必须可靠； ④夹紧机构应操作安全、省力，方便迅捷 ⑤夹紧机构的复杂程度和自动化程度与生产规模相适应"},
      {"id":101,"question":"夹紧力的确定原则有哪些？","answer":"①大小：夹紧力大小应适当，可用类比法、计算分析法确定 ②方向：保证定位准确可靠，一般垂直于主要定位基准面应使所需夹紧力尽可能小应使工件变形小 ③作用点：保持工件稳定定位使工件夹紧变形尽可能小，尽可能靠近工件被加工表面"},
      {"id":102,"question":"夹紧的动力装置有几种？各有什么特点？","answer":"①气压夹紧：优点：使用、操作方便；夹紧效率高；夹紧轻便缺点：夹紧刚度不高；夹紧装置空间大；有噪声污染 ②液压夹紧：优点：布局方便，夹紧刚度大，夹紧可靠，动作平稳缺点：需要油泵提高高压油，油泵有噪声，有漏油污染 ③气液联合夹紧：综合气压来源方便与液压工作油缸体积小的特点 ④电磁夹紧：操作方便，响应快 ⑤真空夹紧：用于有色金属、合金等"},
      {"id":103,"question":"钻套的种类有哪些？各适用于什么场合？","answer":"①固定钻套：用于单件小批量及孔距小的场合 ②可换钻套：用于大批量生产，但不宜用于连续更换刀具的场合 ③快换钻套：广泛用于需要连续更换钻套的场合（钻- 扩- 铰） ④特殊钻套：用于特殊情况下加工孔（例如孔距很小的两孔）"},
      {"id":104,"question":"什么是加工精度和加工误差？二者有何不同？","answer":"加工精度：零件加工后实际几何参数与理想零件几何参数相符合的程度加工误差：零件加工后实际几何参数与理想零件几何参数的偏离程度不同：加工精度考虑符合程度，加工误差是偏离程度"},
      {"id":105,"question":"加工精度包括哪些方面？","answer":"尺寸精度、形状精度、位置精度"},
      {"id":106,"question":"获得零件尺寸精度、形状精度、位置精度的方法有哪些？","answer":"尺寸精度：①试切法、②调整法、③定尺寸刀具法、④自动控制法形状精度：①轨迹法、②成型法、③展成法位置精度：①多次装夹加工时，依赖夹具的正确定位来保证 ②工件一次装夹加工多个表面时，依靠机床的精度保证"},
      {"id":107,"question":"影响加工精度的因素有哪些？","answer":"①原理误差、②安装误差、③测量和调整误差 ④机床、夹具、刀具的制造精度和磨损 ⑤机床、夹具、工件的受力变形 ⑥机床、刀具、工件的受热变形"},
      {"id":108,"question":"何谓原理误差？","answer":"因利用近似加工原理或近似的刀具切削刃形状而产生的误差"},
      {"id":109,"question":"何为主轴回转精度？其对加工精度有何影响？","answer":"主轴回转精度：主轴回转轴线在回转时相对于其平均轴线的变动量在误差敏感方向的最大位移值 影响：①主轴径向跳动，对工件的圆度影响最大 ②主轴轴向窜动，对工件的端面和螺纹的螺距影响最大 ③主轴角度摆动，对工件形状、端面平面度等有影响"},
      {"id":110,"question":"何谓误差敏感方向？","answer":"经过刀具刀刃的切削点又垂直于已加工表面的方向"},
      {"id":111,"question":"什么是机床的几何精度？其对加工精度有何影响？","answer":"机床的几何精度：机床在空载条件下运动或运动速度较低时各主要部件的形状、位置和相对运动的精确程度影响：①车外圆：回转轴线与导轨水平面不平行，造成锥度相交线（垂直面内不平行），造成双曲面 ②车端面：回转轴向与导轨不垂直，造成凸面、凹面 ③镗孔：工作台进给方向与镗杆回转轴线不平行，影响孔的圆度 ④磨平面：磨出的平面呈中凹形"},
      {"id":112,"question":"如何减少机床热变形对加工精度影响？","answer":"①结构设计措施：热对称结构设计：使工件热变形处于误差不敏感方向；合理安排支承位置，使热位移有效部分缩短；足够的冷却措施；隔离热源 ②工艺措施：安装机床的区域保持恒定环境温度；机床达到热平衡状态后再加工；严格控制切削用量以减少工件发热"},
      {"id":113,"question":"减少工件热变形对加工精度影响的措施有哪些？","answer":"①充分冷却，降低切削温度 ②提高切削速度和进给量，使传入工件的热量减小 ③工件精加工前需充分冷却 ④经常刃磨和修正刀具和砂轮 ⑤给工件保留伸缩自由的空间"},
      {"id":114,"question":"何谓误差复映现象？如何减小其对加工精度的影响？","answer":"在切削过程中由于毛坯本身的几何形状误差或材料的硬度不均匀，引起切削力的不断变化，促使工艺系统产生相应的变形。可通过多次走刀减小误差复映现象。"},
      {"id":115,"question":"零件表面质量包含哪两方面的内容？","answer":"①表面微观几何形状：表面粗糙度、表面微观轮廓形状、伤痕 ②表面层的机械物理性能：加工硬化、金相组织、残余应力"},
      {"id":116,"question":"零件表面微观轮廓形状一般有哪几种？","answer":"①尖峰轮廓：切削加工 ②圆弧轮廓：电化学加工 ③凹坑：电蚀加工"},
      {"id":117,"question":"影响切削表面粗糙度的因素有哪些？","answer":"①刀具刀刃与工件相对运动轨迹所构成的几何不平度 ②塑性变形及其他物理因素所附加的表面微观不平度：切削用量、润滑油 ③工艺系统的振动所产生的表面振痕"},
      {"id":118,"question":"影响磨削表面粗糙度的因素有哪些？","answer":"①磨削用量：砂轮速度，工件速度，纵向进给量，磨削深度，空起刀次数 ②砂轮的粒度、硬度、砂轮组织、修整、平衡 ③被加工的材料 ④冷却润滑液 ⑤磨床刚度、精度、抗振性"},
      {"id":119,"question":"产生加工硬化的主要原因是什么？","answer":"（1）刀具的影响：①刃口圆弧半径增大，对表层挤压作用加大，冷硬增加 ②刀具后面磨损增加，对已加工面摩擦加大，冷硬增加 ③前角加大可减小塑性变形，使冷硬减小 （2）切削用量：①切削速度增大，刀具与工件接触挤压时间短，冷硬减小 ②进给量增大，塑性变形增大，冷硬增加 ③工件材料塑性越大，加工后冷硬越大"},
      {"id":120,"question":"什么是磨削烧伤？","answer":"磨削加工时，表面层有很高的温度，对于淬火的钢件，往往使表面层的金相组织产生变化，硬度下降，严重影响零件的使用性能。磨削烧伤的实质是磨削区表层温度超过了相变温度，使材料表层发生金相组织变化。"},
      {"id":121,"question":"如何减小磨削烧伤？","answer":"①合理选择磨削用量； ②合理选择被加工材料，传热性差的材料易烧伤 ③选择硬度较小的砂轮； ④采用冷却润滑液"},
      {"id":122,"question":"机械加工时，工件表面产生残余应力的原因有哪些？","answer":"①塑性变形的影响：通常产生压应力 ②温度的影响：通常产生拉应力 ③金相组织变化的影响"},
      {"id":123,"question":"常用的表面强化工艺有哪些？","answer":"①化学热处理：渗碳、渗氮、渗铬 ②电镀处理 ③机械强化：滚压、喷丸、挤孔"}

function formatAnswerWithHighlights(text) {

    let lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line !== '');

    const seqRegex = /([\u2460-\u2473]|\d+\.|\d+\))/g;

        while ((match = seqRegex.exec(line)) !== null) {
            matches.push({ index: match.index, text: match[0] });
        }
        if (matches.length <= 1) {
            // 0 或 1 个序号，保留原行
            processedLines.push(line);
        } else {
            // 有多个序号，按序号拆分，确保每个序号独占一行且内容完整
            let segments = [];

                let segment = line.slice(m.index, nextIdx).trim();
                if (segment) segments.push(segment);
                lastIdx = nextIdx;
            }
            if (lastIdx < line.length) {
                let remaining = line.slice(lastIdx).trim();
                if (remaining) segments.push(remaining);
            }
            processedLines.push(...segments);
        }
    }

    // 4. 定义高亮函数（先术语，后关键词）
    const termRegex = /([\u4e00-\u9fa5a-zA-Z]+：)/g;
    const highlightTriggers = ['磨削','顺铣', '逆铣', '铰孔', '特点', '切削', '主运动', '进给运动'];
    const keywordRegex = new RegExp(`(${highlightTriggers.join('|')})`, 'g');

    function highlightTermAndKeyword(line) {
        // 先高亮术语（冒号前的词）
        let withTerms = line.replace(termRegex, (match) => `<span class="answer-label">${match}</span>`);
        // 再对非标签部分高亮关键词
        // 简单实现：用一个临时占位符避免重复替换，但关键词可能出现在术语标签内，我们只对标签外的文本处理
        // 使用临时分隔法：将已替换的标签保护起来
        const temp = [];
        let idx = 0;
        const replaced = withTerms.replace(/<span class="answer-label">.*?<\/span>/g, (match) => {
            const placeholder = `__TEMP_${idx++}__`;
            temp.push(match);
            return placeholder;
        });
        const finalWithKeywords = replaced.replace(keywordRegex, (match) => `<span class="highlight-text">${match}</span>`);
        let final = finalWithKeywords;
        for (let i = 0; i < temp.length; i++) {
            final = final.replace(`__TEMP_${i}__`, temp[i]);
        }
        return final;
    }

    // 5. 处理每个段落
    return processedLines.map(segment => {
        const isBullet = /^·\s*/.test(segment);
        const cleaned = isBullet ? segment.replace(/^·\s*/, '') : segment;

        // 高亮术语和关键词
        let lineContent = highlightTermAndKeyword(escapeHtml(cleaned));

        // 判断是否为序号行
        const isNumbered = /^[\u2460-\u2473]|^\d+\.|^\d+\)/.test(cleaned);
        const extraStyle = isNumbered ? ' style="margin-bottom: 0.4rem;"' : '';

        if (isBullet) {
            return `<div class="answer-line bullet-line"${extraStyle}><span class="bullet-dot">•</span><span>${lineContent}</span></div>`;
        }
        return `<div class="answer-line"${extraStyle}>${lineContent}</div>`;
    }).join('');
}







function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    let currentFilter = '';

    function renderCards(filterText = '') {
        const lowerFilter = filterText.toLowerCase().trim();
        const filtered = lowerFilter === '' ? fullQAData : fullQAData.filter(item =>
            item.question.toLowerCase().includes(lowerFilter) ||
            item.answer.toLowerCase().includes(lowerFilter)
        );
        document.getElementById('totalCount').innerText = `📚 共 ${filtered.length} / ${fullQAData.length} 道题目`;

        const container = document.getElementById('cardsContainer');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-msg">🔍 没有找到匹配“${escapeHtml(filterText)}”的题目，试试其他关键词吧。</div>`;
            return;
        }

        let html = '';
        for (const item of filtered) {
            const formattedAnswer = formatAnswerWithHighlights(item.answer);
            html += `
                <div class="card" data-id="${item.id}">
                    <div class="question-header">
                        <span class="q-id">#${item.id}</span>
                        <span class="q-text">${escapeHtml(item.question)}</span>
                        <button class="toggle-btn" data-id="${item.id}">查看答案</button>
                    </div>
                    <div class="answer-container" id="answer-${item.id}">
                        <div class="answer-content">
                            ${formattedAnswer}
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const qid = parseInt(btn.getAttribute('data-id'));
                const answerDiv = document.getElementById(`answer-${qid}`);
                if (!answerDiv) return;
                const isNowVisible = answerDiv.classList.contains('show');
                if (isNowVisible) {
                    answerDiv.classList.remove('show');
                    btn.innerHTML = '查看答案';
                } else {
                    answerDiv.classList.add('show');
                    btn.innerHTML = '收起答案';
                }
            });
        });
    }

    function toggleAllAnswers() {
        const allAnswerContainers = document.querySelectorAll('.answer-container');
        const allToggleBtns = document.querySelectorAll('.toggle-btn');
        if (allAnswerContainers.length === 0) return;
        const anyVisible = Array.from(allAnswerContainers).some(container => container.classList.contains('show'));
        if (anyVisible) {
            allAnswerContainers.forEach(container => container.classList.remove('show'));
            allToggleBtns.forEach(btn => btn.innerHTML = '查看答案');
        } else {
            allAnswerContainers.forEach(container => container.classList.add('show'));
            allToggleBtns.forEach(btn => btn.innerHTML = '收起答案');
        }
    }

    document.getElementById('exportJsonBtn').addEventListener('click', () => {
        const dataStr = JSON.stringify(fullQAData, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'mechanical_manufacture_qa.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    searchInput.addEventListener('input', (e) => {
        currentFilter = e.target.value;
        renderCards(currentFilter);
    });
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        currentFilter = '';
        renderCards('');
    });

    const heartBtn = document.getElementById('globalHeartBtn');
    heartBtn.addEventListener('click', () => {
        toggleAllAnswers();
        heartBtn.style.transform = 'scale(0.9)';
        setTimeout(() => { heartBtn.style.transform = ''; }, 150);
    });

    renderCards('');
    // ================= 随机问答模块 =================
let currentRandomItem = null;

// 更新随机问答区域
function updateRandomQuestion() {
    const randomIndex = Math.floor(Math.random() * fullQAData.length);
    currentRandomItem = fullQAData[randomIndex];
    
    // 更新问题文本
    const questionElement = document.getElementById('randomQuestionText');
    if (questionElement) questionElement.textContent = currentRandomItem.question;
    
    // 生成并填充答案 HTML
    const formattedAnswer = formatAnswerWithHighlights(currentRandomItem.answer);
    const answerContent = document.getElementById('randomAnswerContent');
    if (answerContent) answerContent.innerHTML = formattedAnswer;
    
    // 重置答案显示状态（隐藏）
    const answerContainer = document.getElementById('randomAnswerContainer');
    const toggleBtn = document.getElementById('randomToggleAnswerBtn');
    if (answerContainer) {
        answerContainer.classList.remove('show');
        if (toggleBtn) toggleBtn.textContent = '查看答案';
    }
}

// 切换随机问答的答案显示
function toggleRandomAnswer() {
    const answerContainer = document.getElementById('randomAnswerContainer');
    const toggleBtn = document.getElementById('randomToggleAnswerBtn');
    if (!answerContainer) return;
    
    if (answerContainer.classList.contains('show')) {
        answerContainer.classList.remove('show');
        toggleBtn.textContent = '查看答案';
    } else {
        answerContainer.classList.add('show');
        toggleBtn.textContent = '收起答案';
    }
}

// 绑定事件
document.getElementById('randomPickBtn')?.addEventListener('click', updateRandomQuestion);
document.getElementById('randomToggleAnswerBtn')?.addEventListener('click', toggleRandomAnswer);

// 初始化随机显示一道题
updateRandomQuestion();
</script>
