<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>天津中德应用技术大学 | 机械工程专硕复试 · 抽题系统（答案&笔记同步隐藏/显示）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', '微软雅黑', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            padding-bottom: 5rem;
        }

        .master-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* 顶部抽题卡片 */
        .exam-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            margin-bottom: 2.5rem;
            overflow: hidden;
        }

        .hero {
            background: #0b2b3b;
            padding: 1.4rem 2rem;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 1.7rem;
            font-weight: 600;
        }

        .hero .sub {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.3rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid #e9edf2;
        }

        .badge-info {
            background: #eef2ff;
            color: #1e3a8a;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .random-btn {
            background: #1e6f5c;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .random-btn:hover {
            background: #0e5948;
            transform: scale(0.97);
        }

        .question-area {
            padding: 1.8rem 2rem 1.5rem;
            background: white;
        }

        .question-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #2c7a64;
            background: #e0f2e9;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            color: #1e2f3a;
            margin-bottom: 1.5rem;
            border-left: 5px solid #1e6f5c;
            padding-left: 1.2rem;
        }

        .answer-glass {
            background: #f8fafc;
            border-radius: 1.5rem;
            margin-top: 0.5rem;
            cursor: pointer;
            border: 1px solid #e2edf2;
            overflow: hidden;
        }

        .answer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px dashed #cfdfe8;
            font-size: 0.8rem;
            font-weight: 500;
            color: #3b6e5f;
        }

        .tap-hint {
            background: #eef2f5;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .answer-content {
            padding: 1.3rem 1.8rem;
            font-size: 1rem;
            line-height: 1.55;
            color: #1f2e3a;
            transition: filter 0.2s ease;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .blur-answer {
            filter: blur(6px);
            background-color: rgba(230, 245, 240, 0.6);
            user-select: none;
            cursor: pointer;
        }

        .clear-answer {
            filter: blur(0);
            background-color: transparent;
            cursor: pointer;
        }

        /* 全题库列表 */
        .full-library {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            padding: 1.8rem 1.5rem 2rem;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px solid #1e6f5c;
            padding-bottom: 0.8rem;
            margin-bottom: 1.8rem;
        }

        .library-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-stats {
            background: #eef2fa;
            padding: 0.2rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 1.5rem;
        }

        .question-item {
            background: #ffffff;
            border-radius: 1.5rem;
            border: 1px solid #e6edf4;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .question-item:hover {
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .item-question {
            background: #f9fbfe;
            padding: 1.2rem 1.4rem;
            font-weight: 700;
            font-size: 1.05rem;
            color: #0f3b4a;
            border-left: 4px solid #1e6f5c;
            line-height: 1.4;
        }

        .item-answer {
            margin: 0.8rem 1rem 0rem 1rem;
            background: #fefefe;
            border-radius: 1rem;
            border: 1px solid #eef2f5;
            cursor: pointer;
            overflow: hidden;
        }

        .item-answer .answer-header-sm {
            background: #f4f9fc;
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c7a64;
            border-bottom: 1px solid #e2edf2;
            display: flex;
            justify-content: space-between;
        }

        .item-answer .answer-content-sm {
            padding: 1rem 1.2rem;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: filter 0.2s;
        }

        /* 笔记区域样式 */
        .note-area {
            margin: 0.5rem 1rem 1rem 1rem;
            background: #fffef7;
            border-radius: 1rem;
            border: 1px solid #e9e2c7;
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 隐藏笔记区域（与答案遮盖同步） */
        .note-hidden {
            display: none !important;
        }

        .note-header {
            background: #faf7e4;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b87c2e;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #ede3c2;
        }
        .note-textarea {
            width: 100%;
            border: none;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            font-family: inherit;
            line-height: 1.4;
            color: #2c3e2f;
            background: #fffff2;
            resize: vertical;
            outline: none;
        }
        .note-textarea:focus {
            background: #fffef0;
        }
        .note-save-status {
            font-size: 0.65rem;
            margin-left: auto;
            color: #9c7e4a;
        }

        .love-control {
            position: fixed;
            bottom: 1.8rem;
            right: 1.8rem;
            width: 58px;
            height: 58px;
            background: #f43f5e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 1000;
            border: none;
            color: white;
            font-size: 1.8rem;
        }

        .love-control:hover {
            transform: scale(1.08);
            background: #e11d48;
        }

        @media (max-width: 680px) {
            .questions-grid {
                grid-template-columns: 1fr;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .love-control {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #6c8d9c;
        }
        strong {
            color: #1e6f5c;
        }
    </style>
</head>
<body>
<div class="master-container">
    <!-- 随机抽题区域 -->
    <div class="exam-card">
        <div class="hero">
            <h1>🔧 机械制造技术基础 · 复试抽题</h1>
            <div class="sub">天津中德应用技术大学 | 机械工程专硕</div>
        </div>
        <div class="toolbar">
            <div class="badge-info">📚 总题库容量 <span id="totalCountSpan">0</span> 题</div>
            <button class="random-btn" id="randomBtn">🎲 随机抽题</button>
        </div>
        <div class="question-area">
            <div class="question-label">📌 今日随机抽题</div>
            <div class="question-text" id="questionDisplay">点击「随机抽题」开始练习</div>
            <div class="answer-glass" id="topAnswerCard">
                <div class="answer-header">
                    <span>🔍 参考答案</span>
                    <span class="tap-hint">✨ 点击区域 → 显示/隐藏答案</span>
                </div>
                <div id="topAnswerBlurZone" class="answer-content blur-answer">这里会显示当前题目的详细解答，点击模糊区域切换清晰。</div>
            </div>
            <!-- 顶部笔记区 (与当前随机题目关联) 初始隐藏（与答案遮盖同步） -->
            <div class="note-area note-hidden" id="topNoteArea" style="margin-top: 1rem;">
                <div class="note-header">
                    <span>📝 我的笔记（自动保存）</span>
                    <span class="note-save-status" id="topNoteStatus">已同步</span>
                </div>
                <textarea id="topNoteInput" class="note-textarea" rows="2" placeholder="记录你的理解、易错点或补充知识... 内容会自动保存在浏览器中"></textarea>
            </div>
        </div>
    </div>

    <!-- 完整题库区域 -->
    <div class="full-library">
        <div class="library-header">
            <h2>📖 完整复试题库 <span style="font-size:0.9rem;">(点击答案区单独切换，❤️一键同步)</span></h2>
            <div class="library-stats">✨ 共 <span id="fullCount">0</span> 道题目（含精简背&英语）</div>
        </div>
        <div id="questionsGridContainer" class="questions-grid"></div>
    </div>
    <footer>💡 提示：❤️ 右下角爱心 → 一键同时显示/隐藏【所有答案+所有笔记】 | 笔记内容自动保存至本地</footer>
</div>

<button class="love-control" id="globalLoveBtn" aria-label="全部打开/关闭答案和笔记">❤️</button>

<script>
    // ======================= 题库构建 =======================
    const questionBank = [
        { q: "刀具的五个基本角度是什么？各有什么作用？", a: "<strong>前角、后角、主偏角、副偏角、刃倾角。</strong><br>前角影响切削变形和锋利度；后角减少摩擦；<br>主偏角影响径向力与散热；副偏角影响表面粗糙度；<br>刃倾角控制排屑方向与刀尖强度。" },
        { q: "什么是积屑瘤？怎么消除？", a: "当切削速度不高且又能形成连续切削的过程，通常在前刀面成三角形，稳定状态是能够代替刀具进行切削，这样一块冷焊在前刀面的金属称为积屑瘤<br>消除：提高或切削速度、加大前角、使用切削液、工件预先热处理" },
        { q: "切削力由哪几部分组成？影响切削力的因素？", a: "来源：弹性变形、塑性变形、刀具与切屑工件的摩擦力。<br>影响因素：工件材料、切削用量、刀具角度、切削液。" },
        { q: "粗加工和精加工切削用量怎么选？", a: "粗加工：先选大背吃刀量，再选大进给量，最后选合理切削速度。<br>精加工：高切削速度、小进给量、小背吃刀量，保证精度和表面质量。" },
        { q: "刀具磨损有哪几种形式？原因是什么？", a: "<strong>前刀面磨损</strong>：切削塑性材料，切屑与前刀面高温高压摩擦形成。<br><strong>后刀面磨损</strong>：刀具后刀面与工件表面摩擦，低速、切削脆性材料明显。<br><strong>边界磨损</strong>：刀尖应力集中、散热差，受硬皮摩擦导致。<br><strong>沟纹磨损</strong>：工件硬质点、氧化皮在切削边界造成局部磨损。" },
        { q: "切削液的作用有哪些？", a: "冷却、润滑、清洗、防锈。水基冷却强，油基润滑好。" },
        { q: "车、铣、钻、磨各自的加工特点？", a: "车：加工回转体，外圆、端面、螺纹，精度好。<br>铣：加工平面、沟槽、键槽、轮廓，效率高。<br>钻：孔的粗加工，精度低、钻孔易引偏。<br>磨：精加工，精度高、表面质量好，可淬硬钢。" },
        { q: "顺铣和逆铣的区别？", a: "逆铣：切削厚度由薄变厚，刀具易切入，适合旧机床、粗加工。<br>顺铣：切削厚度由厚变薄，表面质量好，切削平稳，要求机床丝杠无间隙。" },
        { q: "主运动和进给运动的区别？", a: "主运动：切下切屑最主要、速度最快的运动。<br>进给运动：不断把待加工层投入切削，速度低、功耗小。" },
        { q: "砂轮的特性由哪些决定？", a: "磨料、粒度、硬度、结合剂、组织、形状尺寸。" },
        { q: "粗基准选择原则", a: "保准不加工表面位置原则；保证重要表面余量均匀原则；余量最小原则；定位可靠原则；避免重复使用原则" },
        { q: "精基准选择原则", a: "基准重合原则、基准统一原则、自为基准、互为基准、便于装夹。" },
        { q: "工序、工步、安装、工位的区别", a: "工序：一台机床、一个工件、连续完成。<br>工步：表面、刀具、切削用量不变的情况下完成的那部分。<br>安装：工件<strong>一次装夹</strong>后所完成的那部分工序。<br>工位：一次装夹后，工件转到不同位置进行加工，每个位置就是一个工位。" },
        { q: "什么是加工经济精度？", a: "某种加工方法在正常生产条件下，能经济、稳定达到的精度等级。" },
        { q: "影响加工精度的主要因素？", a: "机床误差、刀具误差、夹具误差、工艺系统受力变形、受热变形、工件内应力。" },
        { q: "轴类零件典型工艺路线", a: "下料→正火→粗车→调质→半精车→磨削→检验。" },
        { q: "什么是六点定位原理？", a: "用六个支承点限制工件的六个自由度（3个移动、3个转动），实现完全定位。" },
        { q: "完全定位、不完全定位、欠定位、过定位", a: "完全定位：6个自由度全部限制。<br>不完全定位：根据加工要求合理少限制。<br>欠定位：必须限制的自由度未限制，不允许。<br>过定位：同一自由度被多次限制，一般应避免。" },
        { q: "定位误差由什么组成？", a: "基准位移误差 + 基准不重合误差。<br>仅在调整法加工中存在。" },
        { q: "对夹紧装置的基本要求", a: "保证定位准确、不破坏已加工表面、夹紧变形小、操作方便安全、自锁可靠。" },
        { q: "表面质量包括哪些内容？对零件有什么影响？", a: "包括：表面粗糙度、冷作硬化、残余应力、金相组织。<br>影响：耐磨性、耐腐蚀性、疲劳强度、配合性质。" },
        { q: "机械加工中振动有哪几种？怎么控制？", a: "自由振动、强迫振动、自激振动。<br>控制：提高工艺系统刚度、增加阻尼、避开共振区、合理选择切削用量。" },
        { q: "尺寸链中什么是封闭环、增环、减环？", a: "封闭环：间接获得、最后形成的尺寸。<br>增环：该环增大则封闭环增大。<br>减环：该环增大则封闭环减小。" },
        { q: "数控加工与普通加工相比有什么优势？", a: "精度高、柔性好、适合复杂型面、生产效率高、一致性好、减轻劳动强度。" },
        { q: "刀具五个角度及作用（精简背）", a: "<strong>前角</strong>（减切削力 / 摩擦）、<strong>后角</strong>（减刀具与工件摩擦）、<strong>主偏角</strong>（改变切削力分布）、<strong>副偏角</strong>（减小已加工面残留面积）、<strong>刃倾角</strong>（控制切屑流向）。" },
        { q: "积屑瘤产生原因与消除（精简背）", a: "原因是切削塑性材料时，切屑与前刀面冷焊粘连；消除：提高切削速度 / 降低进给量、增大前角、使用切削液、选用耐磨刀具材料。" },
        { q: "六点定位原理与四种定位（精简背）", a: "原理是用 6 个支承点限制工件 6 个自由度；四种定位：完全定位、不完全定位、过定位（超定位）、欠定位（不允许）。" },
        { q: "粗精基准选择原则（精简背）", a: "<strong>粗基准</strong>：选未加工面、保证加工面余量均匀、避免重复使用；<strong>精基准</strong>：基准重合、基准统一、自为基准、互为基准。" },
        { q: "粗精加工切削用量选择（精简背）", a: "粗加工：优先选大背吃刀量，次选大进给量，最后定合理切削速度（追求效率）；精加工：选小背吃刀量、小进给量、高切削速度（保证精度与表面质量）。" },
        { q: "顺铣与逆铣区别（精简背）", a: "顺铣：刀齿旋转方向与工件进给方向相同，切削力小、表面质量好，易啃刀；逆铣：方向相反，切削力大、有硬化层，稳定性好，应用更广。" },
        { q: "切削力来源及影响因素（精简背）", a: "来源：切削层变形抗力、刀具与工件 / 切屑间摩擦；影响因素：工件材料（硬度越高力越大）、切削用量（背吃刀量影响最显著）、刀具角度、刀具材料与磨损。" },
        { q: "定位误差组成（精简背）", a: "基准不重合误差（设计基准与定位基准不一致）、基准位移误差（定位基准自身位置变动）。" },
        { q: "表面质量及其影响（精简背）", a: "表面质量含表面粗糙度、加工硬化、残余应力等；影响：耐磨性、耐腐蚀性、疲劳强度、配合精度。" },
        { q: "典型零件工艺路线（精简背）", a: "轴类：下料→锻造→退火→粗车→调质→半精车→磨外圆→精加工（铣键槽）；<br>箱体类：下料→铸造→时效处理→粗加工（铣平面、镗孔）→半精加工→精加工（刮研、精镗）。" },
        { q: "What's your major? (英语面试)", a: "My major is Mechanical Engineering." },
        { q: "Why do you choose our university? (英语面试)", a: "I like the strong practical training and mechanical major." },
        { q: "Introduce yourself briefly. (英语面试)", a: "简单版：姓名+学校+专业+爱好机械。" }
    ];

    const totalQ = questionBank.length;
    document.getElementById('totalCountSpan').innerText = totalQ;
    document.getElementById('fullCount').innerText = totalQ;

    function escapeHtml(plainText) {
        if (!plainText) return '';
        return plainText.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- 笔记存储功能 ----------
    const NOTE_PREFIX = "me_note_";
    function getNoteKey(index) { return NOTE_PREFIX + index; }
    function loadNote(index) { return localStorage.getItem(getNoteKey(index)) || ""; }
    function saveNote(index, content) { localStorage.setItem(getNoteKey(index), content); }

    function bindNoteForCard(cardIndex, textareaElement, statusSpan = null) {
        if (!textareaElement) return;
        textareaElement.value = loadNote(cardIndex);
        let timeoutId = null;
        textareaElement.addEventListener('input', () => {
            if (timeoutId) clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                saveNote(cardIndex, textareaElement.value);
                if (statusSpan) {
                    statusSpan.innerText = "已保存";
                    setTimeout(() => { if(statusSpan) statusSpan.innerText = "已同步"; }, 800);
                }
            }, 400);
        });
        if (statusSpan) statusSpan.innerText = "已同步";
    }

    // 渲染完整题库（所有卡片默认答案模糊+笔记隐藏）
    function renderFullLibrary() {
        const container = document.getElementById('questionsGridContainer');
        let html = '';
        for (let i = 0; i < questionBank.length; i++) {
            const item = questionBank[i];
            html += `
                <div class="question-item" data-qidx="${i}">
                    <div class="item-question">${escapeHtml(item.q)}</div>
                    <div class="item-answer" data-answer-idx="${i}">
                        <div class="answer-header-sm">
                            <span>📖 参考答案</span>
                            <span class="tap-hint">点击切换显示/隐藏</span>
                        </div>
                        <div class="answer-content-sm blur-answer answer-text-${i}">
                            ${item.a}
                        </div>
                    </div>
                    <div class="note-area note-hidden">
                        <div class="note-header">
                            <span>📝 我的笔记（自动保存）</span>
                            <span class="note-save-status" id="noteStatus-${i}">已同步</span>
                        </div>
                        <textarea class="note-textarea note-${i}" rows="2" placeholder="记录你的理解、易错点或补充知识... 内容会自动保存在浏览器中"></textarea>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        for (let i = 0; i < questionBank.length; i++) {
            const textarea = document.querySelector(`.note-${i}`);
            const statusSpan = document.getElementById(`noteStatus-${i}`);
            if (textarea) bindNoteForCard(i, textarea, statusSpan);
            const answerDiv = document.querySelector(`.question-item[data-qidx="${i}"] .item-answer`);
            if (answerDiv) {
                const contentDiv = answerDiv.querySelector('.answer-content-sm');
                if (contentDiv) {
                    answerDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (contentDiv.classList.contains('blur-answer')) {
                            contentDiv.classList.remove('blur-answer');
                            contentDiv.classList.add('clear-answer');
                        } else if (contentDiv.classList.contains('clear-answer')) {
                            contentDiv.classList.remove('clear-answer');
                            contentDiv.classList.add('blur-answer');
                        } else {
                            contentDiv.classList.add('blur-answer');
                        }
                    });
                }
            }
        }
    }

    // ---------- 顶部随机抽题模块 ----------
    let currentRandomIndex = 0;
    const topQuestionDisplay = document.getElementById('questionDisplay');
    const topAnswerBlurZone = document.getElementById('topAnswerBlurZone');
    const randomBtn = document.getElementById('randomBtn');
    const topNoteInput = document.getElementById('topNoteInput');
    const topNoteStatus = document.getElementById('topNoteStatus');

    function setRandomQuestion() {
        const newIdx = Math.floor(Math.random() * totalQ);
        currentRandomIndex = newIdx;
        const item = questionBank[newIdx];
        topQuestionDisplay.innerHTML = escapeHtml(item.q);
        topAnswerBlurZone.innerHTML = item.a;
        topAnswerBlurZone.classList.remove('clear-answer');
        topAnswerBlurZone.classList.add('blur-answer');
        topNoteInput.value = loadNote(currentRandomIndex);
        topNoteStatus.innerText = "已同步";
    }

    function bindTopNote() {
        let timeoutId = null;
        topNoteInput.addEventListener('input', () => {
            if (timeoutId) clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                saveNote(currentRandomIndex, topNoteInput.value);
                topNoteStatus.innerText = "已保存";
                setTimeout(() => { topNoteStatus.innerText = "已同步"; }, 800);
            }, 400);
        });
    }

    function bindTopAnswerToggle() {
        const topCard = document.getElementById('topAnswerCard');
        topCard.addEventListener('click', (e) => {
            if (topAnswerBlurZone) {
                if (topAnswerBlurZone.classList.contains('blur-answer')) {
                    topAnswerBlurZone.classList.remove('blur-answer');
                    topAnswerBlurZone.classList.add('clear-answer');
                } else if (topAnswerBlurZone.classList.contains('clear-answer')) {
                    topAnswerBlurZone.classList.remove('clear-answer');
                    topAnswerBlurZone.classList.add('blur-answer');
                }
                e.stopPropagation();
            }
        });
    }

    randomBtn.addEventListener('click', setRandomQuestion);

    function initTopQuestion() {
        currentRandomIndex = 0;
        const firstItem = questionBank[0];
        topQuestionDisplay.innerHTML = escapeHtml(firstItem.q);
        topAnswerBlurZone.innerHTML = firstItem.a;
        topAnswerBlurZone.classList.add('blur-answer');
        topAnswerBlurZone.classList.remove('clear-answer');
        topNoteInput.value = loadNote(0);
        topNoteStatus.innerText = "已同步";
    }

    // ========== 全局爱心：答案+笔记 完全同步显示/隐藏 ==========
    const loveBtn = document.getElementById('globalLoveBtn');
    function toggleAllAnswersAndNotes() {
        // 所有答案区域（顶部+卡片内）
        const allAnswers = [topAnswerBlurZone, ...document.querySelectorAll('.answer-content-sm')];
        const validAnswers = allAnswers.filter(el => el !== null);
        if (validAnswers.length === 0) return;

        // 判断当前是否处于「遮盖」状态（存在任意一个 blur-answer）
        const isCurrentlyBlurred = validAnswers.some(el => el.classList.contains('blur-answer'));

        if (isCurrentlyBlurred) {
            // 当前是遮盖状态 → 全部变为清晰（显示答案），同时显示所有笔记
            validAnswers.forEach(el => {
                el.classList.remove('blur-answer');
                el.classList.add('clear-answer');
            });
            // 显示所有笔记区域
            document.querySelectorAll('.note-area').forEach(area => area.classList.remove('note-hidden'));
        } else {
            // 当前是清晰状态 → 全部变为模糊（遮盖答案），同时隐藏所有笔记
            validAnswers.forEach(el => {
                el.classList.remove('clear-answer');
                el.classList.add('blur-answer');
            });
            // 隐藏所有笔记区域
            document.querySelectorAll('.note-area').forEach(area => area.classList.add('note-hidden'));
        }
    }

    loveBtn.addEventListener('click', (e) => {
        e.preventDefault();
        toggleAllAnswersAndNotes();
    });

    // 初始化：所有答案默认模糊（遮盖），所有笔记默认隐藏（note-hidden），完全同步
    function init() {
        renderFullLibrary();      // 卡片答案模糊 + 笔记隐藏
        initTopQuestion();        // 顶部答案模糊，顶部笔记也隐藏（因为初始有note-hidden类）
        bindTopAnswerToggle();
        bindTopNote();
        // 额外确保顶部笔记初始隐藏（已在HTML中写好note-hidden）
        // 同时确保所有答案都是模糊状态（已满足）
    }
    init();
</script>
</body>
</html>
