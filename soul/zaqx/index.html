        function calculateTotalScore(answers) {
            let totalScore = 0;
            Object.values(answers).forEach(score => {
                totalScore += score;
            });
            // Normalize: Min 30, Max 120. Range 90.
            const normalizedScore = Math.round(((totalScore - 30) / 90) * 100);
            return Math.max(0, Math.min(100, normalizedScore));
        }

        function getResultLevel(score) {
            return RESULT_LEVELS.find(level => score >= level.minScore && score <= level.maxScore) || RESULT_LEVELS[0];
        }

        function calculateDimensionScores(answers) {
            const dimensionTotals = {};
            // Init
            Object.values(Dimension).forEach(dim => {
                dimensionTotals[dim] = { current: 0, max: 0 };
            });

            QUESTIONS.forEach(q => {
                const userScore = answers[q.id] || 0;
                if (!dimensionTotals[q.dimension]) return;
                dimensionTotals[q.dimension].current += userScore;
                dimensionTotals[q.dimension].max += 4;
            });

            return Object.entries(dimensionTotals).map(([key, value]) => ({
                subject: key,
                A: value.max === 0 ? 0 : Math.round((value.current / value.max) * 100)
            }));
        }

        function getAdviceForLowestDimension(answers) {
            const dimensionScores = {};
            // Init
            Object.values(Dimension).forEach(dim => dimensionScores[dim] = 0);
            
            QUESTIONS.forEach(q => {
                const userScore = answers[q.id] || 0;
                dimensionScores[q.dimension] += userScore;
            });

            let minScore = Infinity;
            let lowestDimension = Dimension.SelfAcceptance;

            Object.keys(dimensionScores).forEach(dim => {
                if (dimensionScores[dim] < minScore) {
                    minScore = dimensionScores[dim];
                    lowestDimension = dim;
                }
            });

            return ADVICE_BY_DIMENSION[lowestDimension];
        }

                            <button id="unlock-btn" data-auth-unlock-btn="true" class="mt-4 inline-flex items-center justify-center px-8 py-3 rounded-full bg-rose-500 text-white font-bold shadow-lg shadow-rose-200/70 hover:bg-rose-600 transition-all duration-300 whitespace-nowrap">
                                输入授权码解锁
                            </button>
                            <div class="text-xs text-rose-500/80 mt-2">已购买用户输入授权码即可解锁完整内容</div>
                        </div>

                        <div id="full-report" data-auth-lock="true" style="display: none;">
                            <!-- Radar Chart -->
                            <div class="mb-8 w-full relative">
                                <canvas id="radarChart"></canvas>
                            </div>

                            <div class="space-y-3 mb-8">
                                <h3 class="font-bold text-slate-800 mb-4 px-2 border-l-4 border-rose-400">维度能量分析</h3>
                                ${radarBarsHtml}
                            </div>

                            <!-- Detailed Dimension Analysis -->
                            <div class="space-y-4 mb-8">
                                <h3 class="font-bold text-slate-800 mb-4 px-2 border-l-4 border-rose-400">维度详细解读</h3>
                                <div class="grid grid-cols-1 gap-3">
                                    ${analysisHtml}
                                </div>
                            </div>

                            <!-- Prescription Card -->
                            <div class="mx-0 mt-8 mb-8 relative group">
                                <div class="absolute inset-0 bg-gray-200 transform translate-x-1 translate-y-1 rounded-xl"></div>
                                <div class="relative bg-white border-2 border-dashed border-rose-300 rounded-xl p-6">
                                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-24 h-6 bg-rose-100/80 backdrop-blur-sm rotate-1 shadow-sm border-l border-r border-white/50"></div>
                                    <div class="text-center mb-4">
                                        <h3 class="text-sm text-rose-500 font-bold tracking-widest uppercase">今日自爱处方</h3>
                                        <h4 class="text-xl font-serif font-bold text-slate-700 mt-1">${advice.title}</h4>
                                    </div>
                                    <div class="space-y-4">
                                        <p class="text-xs text-gray-400 text-center mb-4 italic">—— 你亏欠自己的 3 件小事 ——</p>
                                        <ul class="space-y-3">
                                            ${adviceItemsHtml}
                                        </ul>
                                    </div>
                                    <div class="mt-4 pt-3 border-t border-dashed border-gray-200 flex justify-between items-center text-xs text-gray-400 font-mono">
                                        <span>No. ${adviceNo}</span>
                                        <span>有效期：永久</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Soul Compatibility -->
                            <div class="mb-8">
                                <div class="text-center text-sm font-bold tracking-widest uppercase text-rose-400 mb-4">🔮 灵魂默契度 🔮</div>
                                <div class="bg-gradient-to-r from-purple-50 to-indigo-50 border border-indigo-100 rounded-2xl p-5 relative overflow-hidden">
                                    <div class="flex gap-4 mb-4">
                                        <div class="flex-1 bg-white p-3 rounded-xl shadow-sm text-center border border-indigo-50">
                                            <div class="text-xs text-gray-400 uppercase mb-1">最佳拍档星座</div>
                                            <div class="text-lg font-bold text-indigo-700">${resultLevel.compatibleZodiac}</div>
                                        </div>
                                        <div class="flex-1 bg-white p-3 rounded-xl shadow-sm text-center border border-indigo-50">
                                            <div class="text-xs text-gray-400 uppercase mb-1">灵魂共鸣MBTI</div>
                                            <div class="text-lg font-bold text-indigo-700 font-mono">${resultLevel.compatibleMBTI}</div>
                                        </div>
                                    </div>
                                    <div class="text-center">
                                        <p class="text-sm text-indigo-800/80 leading-relaxed font-medium">${resultLevel.compatibilityDesc}</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Flower Reveal -->
                            <div class="mb-8">
                                <div class="text-center text-sm font-bold tracking-widest uppercase text-rose-400 mb-4">✨ 你的本命花 ✨</div>
                                <div class="bg-gradient-to-br from-white to-rose-50 border border-white shadow-lg rounded-2xl p-6 relative overflow-hidden group text-center">
                                    <div class="absolute top-0 right-0 w-24 h-24 bg-rose-200 rounded-full mix-blend-multiply filter blur-xl opacity-50 -translate-y-1/2 translate-x-1/2"></div>
                                    <div class="absolute bottom-0 left-0 w-20 h-20 bg-blue-100 rounded-full mix-blend-multiply filter blur-xl opacity-50 translate-y-1/2 -translate-x-1/2"></div>
                                    <div class="relative z-10">
                                        <div class="text-8xl mb-4 filter drop-shadow-sm transform group-hover:scale-110 transition-transform duration-500">${resultLevel.flowerEmoji}</div>
                                        <h2 class="text-3xl font-serif font-bold text-slate-800 mb-2">${resultLevel.flowerName}</h2>
                                        <p class="text-sm text-rose-600 font-bold mb-4 italic font-serif">"${resultLevel.flowerQuote}"</p>
                                        <div class="flex flex-wrap justify-center gap-2 mb-2">
                                            ${resultLevel.keywords.map(k => `<span class="px-3 py-1 bg-white/80 backdrop-blur-sm rounded-full text-xs font-bold text-gray-500 border border-gray-100 shadow-sm">${k}</span>`).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
	                        <div class="space-y-3 pb-8">
	                            <button id="share-btn" class="w-full py-3 px-8 rounded-full font-bold transition-all duration-300 transform active:scale-95 shadow-lg flex items-center justify-center bg-rose-500 text-white hover:bg-rose-600">
	                                分享结果
	                            </button>
	                            <a href="../tg/index.html" target="_blank" rel="noopener" class="w-full py-3 px-8 rounded-full font-bold transition-all duration-300 transform active:scale-95 shadow-lg flex items-center justify-center bg-white text-rose-600 hover:bg-rose-50 border-2 border-rose-500">
	                                加入测试交流群
	                            </a>
	                            <button id="restart-btn" class="w-full py-3 px-8 rounded-full font-bold transition-all duration-300 transform active:scale-95 shadow-lg flex items-center justify-center bg-transparent border-2 border-rose-500 text-rose-500 hover:bg-rose-50">
	                                再测一次
	                            </button>
	                        </div>
                    </div>
                </div>
            `;

            resultAuthController = null;
            resultAuthInitPromise = null;
            authState.unlocked = false;
            setFullReportVisible(false);
            setupResultGate();

            // Score Animation
            animateScore(totalScore);

            // Bind Restart
            document.getElementById('restart-btn').addEventListener('click', () => {
                state.screen = 'welcome';
                renderWelcome();
            });
            const shareBtn = document.getElementById('share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', shareResult);
            }
        }

        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: '恋爱安全感测试',
                    text: '我刚完成了恋爱安全感测试，你也来试试吧！',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                alert('截屏即可分享结果给朋友哦！');
            }
        }

        function animateScore(target) {
            let current = 0;
            const element = document.getElementById('score-display');
            const duration = 1000;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                current = Math.round(target * ease);
                
                element.innerText = current + '%';
                if (current > 55) element.style.color = 'white';
                
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function initChart(data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: data.map(d => d.subject),
                    datasets: [{
                        label: 'Self Love',
                        data: data.map(d => d.A),
                        backgroundColor: 'rgba(244, 63, 94, 0.4)', // Rose-500 with opacity
                        borderColor: '#f43f5e',
                        pointBackgroundColor: '#f43f5e',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: '#e5e7eb' },
                            grid: { color: '#e5e7eb' },
                            pointLabels: {
                                font: { size: 10 },
                                color: '#64748b'
                            },
                            suggestedMin: 0,
                            suggestedMax: 100,
                            ticks: { display: false } // Hide numbers on axis
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    },
                    maintainAspectRatio: true,
                }
            });
        }

        // --- INIT ---
        initAuth();
        renderWelcome();

    </script>
    <script src="../static/theme/visual-refresh.js" defer></script>
</body>

</html>
