                                            <h4 class="text-sm font-bold text-gray-800 flex items-center">
                                                <span class="w-1.5 h-1.5 rounded-full bg-red-500 mr-2"></span>
                                                雷区警示
                                            </h4>
                                        </div>
                                        <div class="flex flex-wrap gap-2">${forbiddenHtml}</div>
                                    </div>
                                </div>

                                <div class="bg-yellow-50/50 p-6 rounded-xl border border-yellow-100/50 text-center">
                                    <h4 class="text-xs font-bold text-yellow-600 uppercase tracking-widest mb-2">人生建议</h4>
                                    <p class="text-sm text-gray-600 italic">"${resultData.advice}"</p>
                                </div>
                            </div>
                        </div>
                    </div>

	                    <div class="flex flex-col gap-4 pb-10 px-2">
	                        <button onclick="shareNxxgResult()" class="w-full py-4 px-6 rounded-full font-bold text-white bg-gradient-to-r from-pink-500 to-rose-500 shadow-xl shadow-pink-500/30 hover:shadow-pink-500/50 hover:-translate-y-1 transition-all duration-200 uppercase tracking-wider text-sm">
	                            分享结果
	                        </button>
	                        <a href="../tg/index.html" target="_blank" rel="noopener" class="w-full py-4 px-6 rounded-full font-bold text-slate-800 bg-white/90 hover:bg-white shadow-lg hover:-translate-y-1 transition-all duration-200 uppercase tracking-wider text-sm flex items-center justify-center">
	                            加入测试交流群
	                        </a>
	                        <button onclick="resetQuiz()" class="w-full py-4 px-6 rounded-full font-bold text-white bg-black hover:bg-gray-800 shadow-lg uppercase tracking-wider text-sm transition-all">
	                            重新测试
	                        </button>
	                        <p class="text-center text-gray-300 text-[10px] font-mono uppercase tracking-widest">
	                            人格原型分析报告 • 2024
                        </p>
                    </div>
                </div>
            `;
            
            app.appendChild(container);
            window.scrollTo(0, 0);
            setFullReportVisible(false);
            setupAuthGate();
        }

        window.resetQuiz = function() {
            state.answers = {};
            state.focusedIndex = 0;
            state.view = 'LANDING';
            authState.unlocked = false;
            render();
        }

        window.shareNxxgResult = function() {
            if (navigator.share) {
                navigator.share({
                    title: '人格原型分析测试',
                    text: '我刚完成了人格原型分析测试，你也来试试吧！',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                alert('截屏即可分享结果给朋友哦！');
            }
        }

    </script>
    <script
      src="../authorization/authorization-sdk.js"
      data-test-type="nxxg"
      data-auth-context="start"
      data-start-button="#startBtn"
      data-on-authorized="startNxxgQuiz"
      data-session-hours="6"></script>
</body>

</html>
