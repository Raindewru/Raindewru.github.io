            if (authState.unlocked) return;
            authState.unlocked = true;
            setFullReportVisible(true);
            if (latestResult) {
                App.initChart(latestResult);
            }
        }

        async function resolveApiBase() {
            try {
                const res = await fetch('/config/app-config.json', { cache: 'no-store' });
                if (res.ok) {
                    const cfg = await res.json();
                    if (cfg && cfg.apiBase) {
                        return String(cfg.apiBase).trim();
                    }
                }
            } catch (err) {
                console.warn('无法读取 app-config.json，将使用当前域名:', err);
            }
            return window.location.origin;
        }

        async function setupAuthGate() {
            if (!window.AuthorizationSDK) {
                return;
            }
            const unlockButton = document.getElementById('unlock-btn');
            if (!unlockButton) {
                return;
            }
            const apiBase = await resolveApiBase();
            authState.controller = await AuthorizationSDK.init({
                testType: 'nxfg',
                apiBase,
                startButtons: ['#unlock-btn'],
                onAuthorized: unlockFullReport,
                authContext: 'result'
            });
            const config = authState.controller?.state?.config;
            if (config && config.auth_required === 0) {
                unlockFullReport();
                return;
            }
            const mode = (config && config.auth_mode) ? String(config.auth_mode).toLowerCase() : 'start';
            if (mode !== 'result') {
                unlockFullReport();
                return;
            }
            if (authState.controller.isSessionActive()) {
                unlockFullReport();
            }
        }

                state.gameState = 'quiz';

                state.dimScores = { ...INITIAL_DIMENSIONS };
                state.selectedOptions = Array(QUESTIONS.length).fill(null);
                App.render();
            },

            answer: (optionIndex) => {
                state.selectedOptions[state.currentQuestionIndex] = optionIndex;
                App.recalculateScores();
                if (state.currentQuestionIndex === QUESTIONS.length - 1) {
                    state.gameState = 'result';
                    App.render();
                    return;
                }
                state.currentQuestionIndex += 1;
                App.render();
            },

            restart: () => {
                state.gameState = 'welcome';
                state.currentQuestionIndex = 0;
                state.scores = { ...INITIAL_SCORES };
                state.dimScores = { ...INITIAL_DIMENSIONS };
                state.selectedOptions = Array(QUESTIONS.length).fill(null);
                authState.unlocked = false;
                latestResult = null;

                    myChart = null;

            share: () => {

                    navigator.share({
                        title: '女性风格偏向测试',
                        text: shareText,
                        url: window.location.href,
                    }).catch(console.error);
                } else {
                    alert('截屏即可分享结果给朋友哦！');
                }

            getWinner: () => {
                const sorted = Object.entries(state.scores).sort((a, b) => b[1] - a[1]);
                return RESULT_PROFILES[sorted[0][0]];
            },

            recalculateScores: () => {
                state.scores = { ...INITIAL_SCORES };
                state.dimScores = { ...INITIAL_DIMENSIONS };
                state.selectedOptions.forEach((selectedIdx, questionIdx) => {
                    if (selectedIdx === null) return;
                    const question = QUESTIONS[questionIdx];
                    const opt = question.options[selectedIdx];
                    opt.impact.forEach((impact) => {
                        state.scores[impact.type] += impact.value;
                    });
                    opt.dimensionImpact.forEach((dimImpact) => {
                        state.dimScores[dimImpact.type] += dimImpact.value;
                    });
                });
            },

            prevQuestion: () => {
                if (state.currentQuestionIndex === 0) return;
                state.currentQuestionIndex -= 1;
                App.render();

                const answered = state.selectedOptions[state.currentQuestionIndex];

            // MAIN RENDER FUNCTION
            render: () => {
                const appDiv = document.getElementById('app');
                if (state.gameState === 'welcome') {
                    appDiv.innerHTML = App.welcomeTemplate();
                } else if (state.gameState === 'quiz') {
                    appDiv.innerHTML = App.quizTemplate();
                } else if (state.gameState === 'result') {
                    const result = App.getWinner();
                    latestResult = result;
                    authState.unlocked = false;
                    if (myChart) {
                        myChart.destroy();
                        myChart = null;
                    }
                    appDiv.innerHTML = App.resultTemplate(result);
                    setFullReportVisible(false);
                    setupAuthGate();
                }
                const startButton = document.querySelector('#startTest');
                if (startButton && window.AuthorizationSDK && typeof window.AuthorizationSDK.attachStartButtons === "function") {
                    window.AuthorizationSDK.attachStartButtons();
                }
            },

            // CHART LOGIC
            initChart: (result) => {
                const ctx = document.getElementById('radarChart');
                if (!ctx) return;

                // Fixed order for consistency
                const order = ['INNOCENCE', 'EMPATHY', 'DEVOTION', 'INDEPENDENCE', 'PRESENCE', 'WIT'];
                
                // Normalization Calculation
                const FIXED_MAX = 100; // Fixed theoretical max for smoother graphs
                const dataValues = order.map(key => {
                    const val = state.dimScores[key];
                    // Formula: (Score / FixedMax) * 100
                    return Math.min((val / FIXED_MAX) * 100, 100); 
                });

                if (myChart) {
                    myChart.destroy();
                }

                myChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: order.map(k => DIMENSION_LABELS[k]),
                        datasets: [{
                            label: 'Style',
                            data: dataValues,
                            backgroundColor: result.color + '66', // Add opacity
                            borderColor: result.color,
                            borderWidth: 2,
                            pointBackgroundColor: result.color,

                        maintainAspectRatio: false,

                                }
