        const QUESTIONS = [
            { id: 1, scenario: "当你在工作中遭遇不公正的批评，且对方明显带有情绪发泄时，你的第一反应是？", options: [{ id: "A", text: "瞬间被激怒，立刻反唇相讥，绝不让自己受半点委屈。" }, { id: "B", text: "感到极度委屈和自我怀疑，陷入内耗，甚至想逃离这个环境。" }, { id: "C", text: "虽然不悦，但能控制情绪，客观分析对方批评中是否有事实依据，事后再处理情绪。" }, { id: "D", text: "能瞬间洞察对方的情绪触发点和局限性，内心毫无波澜，甚至能以慈悲或幽默化解尴尬。" }] },
            { id: 2, scenario: "当你看到朋友圈里同龄人晒出巨大的成功（升职、暴富、完美的伴侣）时，你内心最真实的声音是？", options: [{ id: "A", text: "凭什么？这一定是假的，或者走了狗屎运/有后台。" }, { id: "B", text: "感到焦虑和自卑，觉得自己很失败，生活无望。" }, { id: "C", text: "会有短暂的羡慕，但随即调整心态，将其作为激励自己努力的动力。" }, { id: "D", text: "发自内心地为对方感到喜悦，并相信每个人都有自己的时区，专注于当下的圆满。" }] },
            { id: 3, scenario: "在一段亲密关系中，如果伴侣长时间没有回复你的消息，你会？", options: [{ id: "A", text: "夺命连环call，如果不接就发脾气，甚至以此作为分手的筹码。" }, { id: "B", text: "胡思乱想，觉得对方不爱我了，或者出事了，陷入极度的不安全感中。" }, { id: "C", text: "专注于自己的事情，认为对方可能在忙，等忙完自然会回。" }, { id: "D", text: "享受独处的时光，信任彼此的连接，不需要通过即时回复来确认关系的安全感。" }] },
            { id: 4, scenario: "面对一个全新的、高难度的任务，你通常会？", options: [{ id: "A", text: "直接拒绝或推卸责任，认为这不是我该干的事，或者太麻烦。" }, { id: "B", text: "担心做不好被责备，拖延到最后一刻才开始行动。" }, { id: "C", text: "评估资源和风险，制定计划，按部就班地推进，遇到困难解决困难。" }, { id: "D", text: "感到兴奋，视为拓展自我的机会，享受挑战未知的过程，对结果保持开放心态。" }] },
            { id: 5, scenario: "当你发现自己犯了一个比较严重的错误时，你会？", options: [{ id: "A", text: "第一反应是找借口掩盖，或者甩锅给别人，极力撇清责任。" }, { id: "B", text: "陷入深深的自责和羞愧中，觉得自己一无是处，不敢面对。" }, { id: "C", text: "坦诚承认错误，分析原因，并迅速提出补救方案，止损是第一位的。" }, { id: "D", text: "完全接纳自己的不完美，将错误视为宝贵的反馈，从中汲取智慧并继续前行。" }] },
            { id: 6, scenario: "在团队讨论中，如果有人提出了一个和你完全相反且你认为很荒谬的观点，你会？", options: [{ id: "A", text: "直接打断，嘲讽对方的无知，强行输出自己的观点。" }, { id: "B", text: "心里很不屑但不敢说，默默翻白眼，或者私下吐槽。" }, { id: "C", text: "礼貌地听完，然后列举数据和逻辑来反驳，试图达成共识。" }, { id: "D", text: "好奇对方为什么会有这种视角，探寻其背后的逻辑，试图整合双方观点的合理之处。" }] },
            { id: 7, scenario: "当你独处时，你的精神状态通常是？", options: [{ id: "A", text: "必须找点乐子（刷剧、游戏、刷视频），无法忍受安静。" }, { id: "B", text: "感到孤独和空虚，渴望有人陪伴或聊天。" }, { id: "C", text: "利用这段时间休息、充电或处理个人事务，感到放松。" }, { id: "D", text: "享受高质量的独处，能与自己深度对话，感受到内在的宁静和充盈。" }] },
            { id: 8, scenario: "遇到堵车导致你可能会迟到一个重要会议，你会？", options: [{ id: "A", text: "疯狂按喇叭，咒骂路况和前车，情绪极其暴躁。" }, { id: "B", text: "焦虑得满头大汗，不断看表，担心迟到的后果，手足无措。" }, { id: "C", text: "立即联系会议方说明情况，利用堵车时间通过电话/网络提前介入会议。" }, { id: "D", text: "接纳当下的不可控，利用这段时间听书或冥想，相信一切都是最好的安排。" }] },
            { id: 9, scenario: "对于“金钱”这一概念，你最底层的信念是？", options: [{ id: "A", text: "钱就是一切，为了钱可以不择手段，没钱就被看不起。" }, { id: "B", text: "钱很难挣，总是担心钱不够花，对消费充满负罪感或极度吝啬。" }, { id: "C", text: "钱是交换价值的工具，通过提升能力来获取财富，理性规划理财。" }, { id: "D", text: "金钱是能量的流动，感恩金钱带来的体验，确信内在丰盛会显化外在富足。" }] },
            { id: 10, scenario: "当你的生活发生巨大变故（失业、失恋等）时，你会？", options: [{ id: "A", text: "怨天尤人，觉得世界对自己不公，沉溺于受害者角色，甚至报复社会。" }, { id: "B", text: "彻底崩溃，长时间一蹶不振，需要依靠他人才能勉强维持生活。" }, { id: "C", text: "允许自己难过一段时间，然后积极寻求帮助和解决方案，重建生活。" }, { id: "D", text: "视其为灵魂的试炼和重生的契机，在痛苦中觉察，快速完成蜕变。" }] },
            { id: 11, scenario: "关于“命运”，你更倾向于相信？", options: [{ id: "A", text: "命苦不能怪政府，都是别人害的；或者完全迷信，试图通过旁门左道改命。" }, { id: "B", text: "觉得命运捉弄人，自己无力改变现状，只能随波逐流。" }, { id: "C", text: "三分天注定，七分靠打拼，相信通过努力可以改变大部分境遇。" }, { id: "D", text: "命是剧本，运是演技。我是自己实相的创造者，每一个当下都在创造未来。" }] },
            { id: 12, scenario: "在社交场合中，你通常的表现是？", options: [{ id: "A", text: "哗众取宠，极力表现自己，或者攻击他人来抬高自己。" }, { id: "B", text: "极度拘谨，害怕说错话，总是躲在角落，担心别人的眼光。" }, { id: "C", text: "得体大方，能照顾到大多数人的情绪，进行有效的社交互动。" }, { id: "D", text: "真实自然，不卑不亢，能与他人建立深度的灵魂链接，也能安于旁观。" }] },
            { id: 13, scenario: "当别人向你寻求建议，但你发现他们根本不听时，你会？", options: [{ id: "A", text: "非常生气，骂他们不知好歹，下次绝不再管。" }, { id: "B", text: "感到挫败，怀疑自己的建议是否真的有用。" }, { id: "C", text: "尊重他们的选择，毕竟每个人都要为自己负责，不再强求。" }, { id: "D", text: "理解每个人都有自己的成长节奏，无论他们听与不听，都送上祝福。" }] },

        function setFullReportVisible(isVisible) {
            const fullReport = document.getElementById('full-report');
            if (fullReport) {
                fullReport.classList.toggle('is-unlocked', isVisible);
                fullReport.classList.toggle('is-locked', !isVisible);
            }
        }

        function unlockFullReport() {
            if (authState.unlocked) return;
            authState.unlocked = true;
            setFullReportVisible(true);
        }

        async function resolveApiBase() {
            try {
                const res = await fetch('/config/app-config.json', { cache: 'no-store' });
                if (res.ok) {
                    const cfg = await res.json();
                    if (cfg && cfg.apiBase) {
                        return String(cfg.apiBase).trim();
                    }
                }
            } catch (err) {
                console.warn('无法读取 app-config.json，将使用当前域名:', err);
            }
            return window.location.origin;
        }

        async function setupAuthGate() {
            if (!window.AuthorizationSDK) {
                return;
            }
            const unlockButton = document.getElementById('unlock-btn');
            if (!unlockButton) {
                return;
            }
            const apiBase = await resolveApiBase();
            authState.controller = await AuthorizationSDK.init({
                testType: 'mbtia',
                apiBase,
                startButtons: ['#unlock-btn'],
                onAuthorized: unlockFullReport,
                authContext: 'result'
            });
            const config = authState.controller?.state?.config;
            if (config && config.auth_required === 0) {
                unlockFullReport();
                return;
            }
            const mode = (config && config.auth_mode) ? String(config.auth_mode).toLowerCase() : 'start';
            if (mode !== 'result') {
                unlockFullReport();
                return;
            }
            if (authState.controller.isSessionActive()) {
                unlockFullReport();
            }
        }

        function calculateResults() {
            let rawScore = 0;
            
            state.answers.forEach(pair => {
                if (!pair) return;
                if (pair.optionId === "A" || pair.optionId === "B") rawScore += 1;
                else if (pair.optionId === "C") rawScore += 3;
                else if (pair.optionId === "D") rawScore += 5;
            });

            // Normalize 40-200 to 0-100
            let score = Math.round(((rawScore - 40) / 160) * 100);
            score = Math.max(0, Math.min(100, score));

            // Determine Tier
            let tier = MindTier.Unawakened;
            if (score >= 80) tier = MindTier.High;
            else if (score >= 60) tier = MindTier.Mid;
            else if (score >= 40) tier = MindTier.Low;

            // Generate Profile
            const base = MBTI_BASE_DATA[state.mbti];
            const { dom, aux, inf } = base.functions;
            const domName = FUNCTION_CN_MAP[dom];
            const auxName = FUNCTION_CN_MAP[aux];
            const infName = FUNCTION_CN_MAP[inf];
            const tertName = FUNCTION_CN_MAP[base.functions.tert];

            // Descriptions
            const tierConfigs = {
                [MindTier.Unawakened]: {
                    keywords: ["能量受阻", "被动防御", "迷茫困顿"],
                    quote: "迷雾遮住了双眼，只有打破内心的墙，光才能照进来。",
                    stageDesc: "检测显示，你的心智能量目前处于未觉醒阶段。你可能感到生活充满了阻力，经常陷入内耗或情绪的漩涡。",
                    dilemma: `${dom}-${base.functions.tert} Loop (内耗循环)`,
                    dilemmaDesc: `你可能正陷入${domName}与${tertName}的死循环中，切断了与外界真实信息的交换。`,
                    prescription: `强制激活你的辅助功能【${auxName}】。打破物理环境的静止，去接触新的人或事。`
                },
                [MindTier.Low]: {
                    keywords: ["自我挣扎", "情绪起伏", "渴望突破"],
                    quote: "在裂缝中寻找阳光，痛苦是成长的催化剂。",
                    stageDesc: "你处于低阶挣扎期。你已经意识到了现状的不完美，并试图改变，但旧的思维惯性依然强大。",
                    dilemma: `${inf} Grip (劣势功能抓取)`,
                    dilemmaDesc: `在压力下，你那平时不成熟的【${infName}】功能会突然接管你的大脑。`,
                    prescription: `接纳当下的不完美。不要对抗你的劣势功能，而是像对待孩子一样安抚它。`
                },
                [MindTier.Mid]: {
                    keywords: ["稳步前行", "理性适应", "积蓄力量"],
                    quote: "生活是一场马拉松，你已经找到了属于自己的节奏。",
                    stageDesc: "你已进入中阶稳定期。你能够熟练运用你的主导和辅助功能来处理工作和生活。",
                    dilemma: "平庸的舒适区",
                    dilemmaDesc: "虽然生活平稳，但你可能隐约感到缺乏激情。你过度依赖已有的成功路径，害怕打破现状。",
                    prescription: `主动引入“可控的混乱”。去学习一个完全陌生的技能，激活你的成长动能。`
                },
                [MindTier.High]: {
                    keywords: ["智慧整合", "慈悲观察", "万物互联"],
                    quote: "你本具足，无需外求。你就是那个照亮他人的光源。",
                    stageDesc: "恭喜，你已达到高阶觉醒状态。你整合了所有的认知功能，主导功能的优势发挥到了极致。",
                    dilemma: "高处不胜寒",
                    dilemmaDesc: "能够深刻理解你的人越来越少，你可能需要面对精神上的孤独。",
                    prescription: `做一座灯塔。将你的智慧转化为对他人的服务与慈悲。`
                }
            };
            const currentTier = tierConfigs[tier];

            // Soulmates
            let tierMultiplier = tier === MindTier.High ? 1.0 : tier === MindTier.Mid ? 0.92 : tier === MindTier.Low ? 0.82 : 0.70;
            const soulmates = base.soulmates.map((type, idx) => {
                const baseMatch = idx === 0 ? 98 : idx === 1 ? 92 : 88;
                return { type, score: Math.min(100, Math.round(baseMatch * tierMultiplier + (score % 5))) };
            });

            // Radar Chart Logic - Correlated with Total Score
            const isT = state.mbti.includes("T");
            const isE = state.mbti.includes("E");
            const isJ = state.mbti.includes("J");
            const isP = state.mbti.includes("P");
            const isI = state.mbti.includes("I");

            const getVal = (base, mod) => {
                const noise = (score % 7) - 3; 
                let val = base + mod + noise;
                return Math.min(100, Math.max(10, val));
            };

            const radarChart = [
                { subject: '理性决策', A: getVal(score, isT ? 5 : -5) },
                { subject: '自我接纳', A: getVal(score, isI ? 5 : 0) },
                { subject: '情绪稳定', A: getVal(score, isJ ? 3 : -3) },
                { subject: '社会适应', A: getVal(score, isE ? 5 : -5) },
                { subject: '人生格局', A: getVal(score, isP ? 3 : 0) },
            ];

            return {
                tier, score, mbti: state.mbti,
                keywords: currentTier.keywords,
                quote: currentTier.quote,
                radarChart,
                careers: base.careers,
                soulmates,
                manual: {
                    talentSource: `作为${state.mbti}（${base.nickname}），你的核心原力源自【${domName}】。${getFunctionDesc(dom, 'dom', MindTier.High)} 同时，【${auxName}】为你提供了支持，${getFunctionDesc(aux, 'aux', tier)}`,
                    blindSpots: `你的劣势功能【${infName}】往往是绊脚石。${getFunctionDesc(inf, 'inf', tier)} 需警惕${domName}的过度使用。`,
                    evolutionList: [`觉察${auxName}的使用。`, "记录情绪爆发背后的需求。", "尝试向陌生人表达善意。"]
                },
                diagnosis: {
                    stageDescription: currentTier.stageDesc,
                    coreDilemma: { title: currentTier.dilemma, description: currentTier.dilemmaDesc },
                    prescription: currentTier.prescription
                }
            };
        }

        function renderResult() {

            };
            const bgGradient = tierColors[r.tier];

            // Manual SVG Radar Chart
            // Center 150,120. Radius 80.
            const cx = 150, cy = 120, radius = 80;
            const points = r.radarChart.map((item, i) => {
                const angle = (Math.PI / 2) - (i * 2 * Math.PI / 5); // Start top, go counter-clockwise
                const valR = (item.A / 100) * radius;
                const x = cx + valR * Math.cos(angle);
                const y = cy - valR * Math.sin(angle); // SVG y is down
                return `${x},${y}`;
            }).join(" ");
            
            // Grid lines (Pentagons)
            const gridLevels = [1, 0.75, 0.5, 0.25];
            const grids = gridLevels.map(level => {
                 return r.radarChart.map((_, i) => {
                    const angle = (Math.PI / 2) - (i * 2 * Math.PI / 5);
                    const r = radius * level;
                    return `${cx + r * Math.cos(angle)},${cy - r * Math.sin(angle)}`;
                 }).join(" ");
            });

            // Axis Lines
            const axes = r.radarChart.map((_, i) => {
                 const angle = (Math.PI / 2) - (i * 2 * Math.PI / 5);
                 return {
                    x2: cx + radius * Math.cos(angle),
                    y2: cy - radius * Math.sin(angle)
                 };

                                    <!-- Axes -->
                                    ${axes.map(a => `<line x1="${cx}" y1="${cy}" x2="${a.x2}" y2="${a.y2}" stroke="#e5e7eb" stroke-width="1"/>`).join('')}
                                    <!-- Radar Shape -->
                                    <polygon points="${points}" fill="rgba(139, 92, 246, 0.5)" stroke="#8b5cf6" stroke-width="2"/>
                                    <!-- Labels -->

                                </div>
                                <div class="flex flex-wrap gap-2">

                                </div>

                                    ${r.soulmates.map(sm => `

                                 </h4>

                        <div class="bg-white rounded-2xl p-6 shadow-sm mb-4">
                             <div class="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
                                 <div class="w-4 h-4 text-purple-600">${Icons.HeartPulse}</div> 状态诊断

        // ==========================================
        // 5. APP CONTROLLER
        // ==========================================

        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            if (state.step === 'intro') {
                app.innerHTML = renderIntro();
                // Attach event to Select
                const select = document.getElementById('mbti-select');
                const btn = document.getElementById('startBtn');
                select.addEventListener('change', (e) => {
                    state.mbti = e.target.value;
                    if(state.mbti) {
                        btn.disabled = false;
                        btn.classList.remove('bg-gray-700', 'cursor-not-allowed', 'opacity-50');
                        btn.classList.add('bg-gradient-to-r', 'from-purple-600', 'to-indigo-600', 'shadow-lg');
                    }
                });
                if (window.AuthorizationSDK && typeof window.AuthorizationSDK.attachStartButtons === "function") {
                    window.AuthorizationSDK.attachStartButtons();
                }
            } else if (state.step === 'quiz') {
                app.innerHTML = renderQuiz();
            } else if (state.step === 'analyzing') {
                app.innerHTML = renderAnalyzing();
                setTimeout(() => {
                    const result = calculateResults();
                    setState({ result: result, step: 'result' });
                }, 2000);
            } else if (state.step === 'result') {
                app.innerHTML = renderResult();
                authState.unlocked = false;
                setFullReportVisible(false);
                setupAuthGate();
                window.scrollTo(0, 0);
            }
        }

        // Global Window Functions for HTML Click Handlers
        window.startQuiz = () => {
            const firstQ = QUESTIONS[0];
            setState({ 
                step: 'quiz', 
                currentQuestionIndex: 0, 
                answers: [],
                shuffledOptions: firstQ.options 
            });
        };

        window.selectAnswer = (text, id) => {
            // Visual Feedback
            const clickedBtn = document.querySelector(`button[data-id="${id}"]`);
            if(clickedBtn) {
                clickedBtn.classList.add('bg-purple-600/20', 'border-purple-500', 'text-white');
                clickedBtn.classList.remove('bg-gray-800/40', 'border-gray-700', 'text-gray-300');
                clickedBtn.querySelector('.check-icon').classList.remove('hidden');
                clickedBtn.querySelector('.uncheck-icon').classList.add('hidden');
            }

            const currentScenario = QUESTIONS[state.currentQuestionIndex].scenario;
            const newAnswers = [...state.answers];
            newAnswers[state.currentQuestionIndex] = { question: currentScenario, answer: text, optionId: id };

            setTimeout(() => {
                if (state.currentQuestionIndex < QUESTIONS.length - 1) {
                    const nextIndex = state.currentQuestionIndex + 1;
                    setState({ 
                        answers: newAnswers, 
                        currentQuestionIndex: nextIndex,
                        shuffledOptions: QUESTIONS[nextIndex].options
                    });
                } else {
                    state.answers = newAnswers; // Update final answer
                    setState({ step: 'analyzing' });
                }
            }, 400);
        };

        window.goPrev = () => {
            if (state.currentQuestionIndex === 0) return;
            const prevIndex = state.currentQuestionIndex - 1;
            setState({
                currentQuestionIndex: prevIndex,
                shuffledOptions: QUESTIONS[prevIndex].options
            });
        };

        window.shareMbtiaResult = () => {
            const title = '心智阶位测评';
            const text = state.result
                ? `我的心智阶位是${state.result.tier}（${state.mbti}），快来测测你的MindTier！`
                : '我刚完成了心智阶位测评，快来试试吧！';
            if (navigator.share) {
                navigator.share({
                    title,
                    text,
                    url: window.location.href,
                }).catch(console.error);
            } else {
                alert('截屏即可分享结果给朋友哦！');
            }
        };

        // Initialize
        renderApp();

    </script>
    <script
      src="../authorization/authorization-sdk.js"
      data-test-type="mbtia"
      data-auth-context="start"
      data-start-button="#startBtn"
      data-on-authorized="startQuiz"
      data-session-hours="6"></script>
