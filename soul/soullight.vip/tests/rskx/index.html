    <script type="text/babel" data-presets="react">
        /********************************************************************************
         * Constants & Helpers
         ********************************************************************************/
        const LoadingState = {
            IDLE: 'IDLE',
            LOADING: 'LOADING',
            SUCCESS: 'SUCCESS',
            ERROR: 'ERROR'
        };

        // Access globals provided by scripts
        const { Solar, Lunar } = window;

        const GAN_WU_XING = {
            "甲": "木", "乙": "木", "丙": "火", "丁": "火", "戊": "土",
            "己": "土", "庚": "金", "辛": "金", "壬": "水", "癸": "水"
        };

        const ZHI_WU_XING = {
            "子": "水", "丑": "土", "寅": "木", "卯": "木", "辰": "土", "巳": "火",
            "午": "火", "未": "土", "申": "金", "酉": "金", "戌": "土", "亥": "水"
        };

        const RELATIONSHIP = {
            "木": ["火"],
            "火": ["土"],
            "土": ["金"],
            "金": ["水"],
            "水": ["木"]
        };

        const CONTROL = {
            "木": "土",
            "土": "水",
            "水": "火",
            "火": "金",
            "金": "木"
        };

        const getElement = (char) => {
            return GAN_WU_XING[char] || ZHI_WU_XING[char] || "土";
        };

        const calculateStrength = (dm, monthZhi) => {
            const dmEl = getElement(dm);
            const monthEl = getElement(monthZhi);
            if (dmEl === monthEl) return "Strong";
            if (RELATIONSHIP[monthEl]?.includes(dmEl)) return "Strong";
            return "Weak";
        };

        const getFavoredElements = (strength, dmEl) => {
            const allElements = ["金", "木", "水", "火", "土"];
            if (strength === "Weak") {
                const resource = allElements.find(e => RELATIONSHIP[e]?.includes(dmEl)) || "";
                return [dmEl, resource];
            } else {
                return allElements.filter(e => e !== dmEl && !RELATIONSHIP[e]?.includes(dmEl));
            }
        };

        /********************************************************************************
         * Services
         ********************************************************************************/
        const generateBaziAnalysis = async (input) => {
            return new Promise((resolve, reject) => {
                try {
                    let solar;
                    const year = parseInt(input.birthYear);
                    const month = parseInt(input.birthMonth);
                    const day = parseInt(input.birthDay);
                    const hour = parseInt(input.birthHour);

                    if (input.calendarType === 'lunar') {
                        const lunar = Lunar.fromYmdHms(year, month, day, hour, 0, 0);
                        solar = lunar.getSolar();
                    } else {
                        solar = Solar.fromYmdHms(year, month, day, hour, 0, 0);
                    }

                    const lunarObj = solar.getLunar();
                    const baZi = lunarObj.getEightChar();
                    const dayGan = baZi.getDayGan();

                    const tenGodMap = {
                        "甲": { "甲": "比肩", "乙": "劫财", "丙": "食神", "丁": "伤官", "戊": "偏财", "己": "正财", "庚": "七杀", "辛": "正官", "壬": "偏印", "癸": "正印" },
                        "乙": { "乙": "比肩", "甲": "劫财", "丁": "食神", "丙": "伤官", "己": "偏财", "戊": "正财", "辛": "七杀", "庚": "正官", "癸": "偏印", "壬": "正印" },
                        "丙": { "丙": "比肩", "丁": "劫财", "戊": "食神", "己": "伤官", "庚": "偏财", "辛": "正财", "壬": "七杀", "癸": "正官", "甲": "偏印", "乙": "正印" },
                        "丁": { "丁": "比肩", "丙": "劫财", "己": "食神", "戊": "伤官", "辛": "偏财", "庚": "正财", "癸": "七杀", "壬": "正官", "乙": "偏印", "甲": "正印" },
                        "戊": { "戊": "比肩", "己": "劫财", "庚": "食神", "辛": "伤官", "壬": "偏财", "癸": "正财", "甲": "七杀", "乙": "正官", "丙": "偏印", "丁": "正印" },
                        "己": { "己": "比肩", "戊": "劫财", "辛": "食神", "庚": "伤官", "癸": "偏财", "壬": "正财", "乙": "七杀", "甲": "正官", "丁": "偏印", "丙": "正印" },
                        "庚": { "庚": "比肩", "辛": "劫财", "壬": "食神", "癸": "伤官", "甲": "偏财", "乙": "正财", "丙": "七杀", "丁": "正官", "戊": "偏印", "己": "正印" },
                        "辛": { "辛": "比肩", "庚": "劫财", "癸": "食神", "壬": "伤官", "乙": "偏财", "甲": "正财", "丁": "七杀", "丙": "正官", "己": "偏印", "戊": "正印" },
                        "壬": { "壬": "比肩", "癸": "劫财", "甲": "食神", "乙": "伤官", "丙": "偏财", "丁": "正财", "戊": "七杀", "己": "正官", "庚": "偏印", "辛": "正印" },
                        "癸": { "癸": "比肩", "壬": "劫财", "乙": "食神", "甲": "伤官", "丁": "偏财", "丙": "正财", "己": "七杀", "戊": "正官", "辛": "偏印", "庚": "正印" },
                    };

                    const getTenGod = (target) => tenGodMap[dayGan]?.[target] || "";
                    const zhiMainQi = {
                        "子": "癸", "丑": "己", "寅": "甲", "卯": "乙", "辰": "戊", "巳": "丙",
                        "午": "丁", "未": "己", "申": "庚", "酉": "辛", "戌": "戊", "亥": "壬"
                    };

                    const pillars = {
                        year: {
                            gan: baZi.getYearGan(),
                            zhi: baZi.getYearZhi(),
                            ganShiShen: getTenGod(baZi.getYearGan()),
                            zhiShiShen: getTenGod(zhiMainQi[baZi.getYearZhi()]),
                            naYin: baZi.getYearNaYin(),
                            wuXing: getElement(baZi.getYearGan()) + getElement(baZi.getYearZhi())
                        },
                        month: {
                            gan: baZi.getMonthGan(),
                            zhi: baZi.getMonthZhi(),
                            ganShiShen: getTenGod(baZi.getMonthGan()),
                            zhiShiShen: getTenGod(zhiMainQi[baZi.getMonthZhi()]),
                            naYin: baZi.getMonthNaYin(),
                            wuXing: getElement(baZi.getMonthGan()) + getElement(baZi.getMonthZhi())
                        },
                        day: {
                            gan: baZi.getDayGan(),
                            zhi: baZi.getDayZhi(),
                            ganShiShen: "日主", 
                            zhiShiShen: getTenGod(zhiMainQi[baZi.getDayZhi()]),
                            naYin: baZi.getDayNaYin(),
                            wuXing: getElement(baZi.getDayGan()) + getElement(baZi.getDayZhi())
                        },
                        hour: {
                            gan: baZi.getTimeGan(),
                            zhi: baZi.getTimeZhi(),
                            ganShiShen: getTenGod(baZi.getTimeGan()),
                            zhiShiShen: getTenGod(zhiMainQi[baZi.getTimeZhi()]),
                            naYin: baZi.getTimeNaYin(),
                            wuXing: getElement(baZi.getTimeGan()) + getElement(baZi.getTimeZhi())
                        }
                    };

                    const allChars = [
                        pillars.year.gan, pillars.year.zhi,
                        pillars.month.gan, pillars.month.zhi,
                        pillars.day.gan, pillars.day.zhi,
                        pillars.hour.gan, pillars.hour.zhi
                    ];
                    
                    const wxCounts = { "木": 0, "火": 0, "土": 0, "金": 0, "水": 0 };
                    allChars.forEach(char => {
                        const el = getElement(char);
                        if (wxCounts[el] !== undefined) wxCounts[el]++;
                    });

                    const wuXing = {
                        wood: wxCounts["木"],
                        fire: wxCounts["火"],
                        earth: wxCounts["土"],
                        metal: wxCounts["金"],
                        water: wxCounts["水"]
                    };

                    const missingElements = Object.keys(wxCounts).filter(k => wxCounts[k] === 0);
                    const dominantElements = Object.keys(wxCounts).filter(k => wxCounts[k] >= 3);

                    const monthZhi = baZi.getMonthZhi();
                    const strength = calculateStrength(dayGan, monthZhi);
                    const dayMasterElement = getElement(dayGan);
                    const favoredElements = getFavoredElements(strength, dayMasterElement);
                    const wealthElement = CONTROL[dayMasterElement]; 
                    const wealthCount = wxCounts[wealthElement];

                    let baseSummaryScore = 8;
                    if (missingElements.length > 0) baseSummaryScore -= missingElements.length * 0.5;
                    if (dominantElements.length > 0) baseSummaryScore -= dominantElements.length * 0.3;
                    const summaryScore = Math.max(4, Math.min(10, Math.round(baseSummaryScore * 10) / 10));

                    let personalityScore = 7;
                    if (strength === "Strong") personalityScore += 1;
                    if (missingElements.length === 0) personalityScore += 1;
                    
                    let industryScore = 6;
                    let favoredCount = 0;
                    favoredElements.forEach(f => favoredCount += wxCounts[f]);
                    industryScore += Math.min(3, favoredCount * 0.5);

                    let wealthScore = 6;
                    if (wealthCount > 0) {
                        if (strength === "Strong") wealthScore += Math.min(3, wealthCount); 
                        else wealthScore -= 0.5; 
                    } else {
                        wealthScore -= 1; 
                    }
                    if (favoredElements.includes(wealthElement)) wealthScore += 1;
                    wealthScore = Math.max(3, Math.min(9.5, wealthScore));

                    let marriageScore = 6;
                    const spouseElement = getElement(pillars.day.zhi);
                    if (favoredElements.includes(spouseElement)) marriageScore += 2; 
                    else if (spouseElement === dayMasterElement) marriageScore += 0.5; 
                    else marriageScore -= 1; 
                    marriageScore = Math.max(4, Math.min(9, marriageScore));

                    let healthScore = 8;
                    healthScore -= (missingElements.length * 1);
                    healthScore -= (dominantElements.length * 0.5);
                    healthScore = Math.max(4, Math.min(9, healthScore));

                    let fengShuiScore = 7.5; 

                    const summary = `本命日元为【${dayGan}${dayMasterElement}】，生于【${monthZhi}】月，格局为【${strength === "Strong" ? "身强" : "身弱"}】。
                    五行分布：${missingElements.length > 0 ? "缺" + missingElements.join("、") : "五行俱全"}。
                    ${dominantElements.length > 0 ? dominantElements.join("、") + "气势过旺，需注意平衡。" : "五行流转相对平稳。"}
                    喜用神为：${favoredElements.join("、")}。一生运势起伏在于能否行至喜用之地。`;

                    const personalityText = `命主${dayMasterElement}型人，${strength === "Strong" ? "个性鲜明，意志坚定，" : "性情温和，善于变通，"}
                    ${wxCounts["火"] > 2 ? "性格略急躁热情，" : ""}
                    ${wxCounts["水"] > 2 ? "足智多谋但多思多虑，" : ""}
                    ${wxCounts["木"] > 2 ? "仁慈但易固执，" : ""}
                    ${wxCounts["金"] > 2 ? "讲义气但好面子，" : ""}
                    ${wxCounts["土"] > 2 ? "敦厚诚信但不知变通，" : ""}
                    整体而言，${missingElements.length > 0 ? "需补足" + missingElements.join("") + "的特性以完善自我。" : "性格较为圆满。"}
                    `;

                    const fengShuiText = `首选发展方位：${favoredElements.includes("火") ? "南方" : favoredElements.includes("水") ? "北方" : favoredElements.includes("木") ? "东方" : favoredElements.includes("金") ? "西方" : "本地/中央"}。
                    建议生活环境中多采用${favoredElements.join("、")}属性的色彩（如${favoredElements.includes("火") ? "红紫" : favoredElements.includes("木") ? "青绿" : favoredElements.includes("金") ? "白金" : favoredElements.includes("水") ? "黑蓝" : "黄褐"}）。
                    ${missingElements.length > 0 ? "因命中缺" + missingElements[0] + "，居家可摆放相关饰物补气。" : "五行流通，居家保持整洁明亮即可。"}`;

                    const wealthText = wealthCount > 0 
                        ? `命中带财（${wealthCount}个财星），${strength === "Strong" ? "且身强能任财，财运机缘深厚，易聚财。" : "但身弱财旺，易为钱财奔波，建议理财保守，多储蓄。"}`
                        : "命中财星不显，正财运为主，适合技艺谋身，不宜过度投机，需待大运流年补足财库。";

                    const genderNum = input.gender === 'male' ? 1 : 0;
                    const yun = baZi.getYun(genderNum);
                    
                    const chartPoints = [];
                    const startYear = solar.getYear(); 
                    const daYunArr = yun.getDaYun(); 
                    let currentDaYunStr = "童限";
                    
                    let currentScore = 35 + (Math.random() * 15); 

                    for (let i = 0; i < 100; i++) {
                        const age = i + 1;
                        const currentYear = startYear + i;
                        
                        for (const dy of daYunArr) {
                            if (age >= dy.getStartAge()) {
                                currentDaYunStr = dy.getGanZhi();
                            }
                        }
                        
                        const yearLunar = Lunar.fromYmd(currentYear, 6, 1);
                        const yearGanZhi = yearLunar.getYearInGanZhi();
                        const yearGanChar = yearGanZhi.charAt(0);
                        const yearZhiChar = yearGanZhi.charAt(1);
                        
                        const yearGanEl = getElement(yearGanChar);
                        const yearZhiEl = getElement(yearZhiChar);
                        
                        let yearlyChange = 0;
                        let reason = "";
                        
                        let favorableCount = 0;
                        if (favoredElements.includes(yearGanEl)) favorableCount++;
                        if (favoredElements.includes(yearZhiEl)) favorableCount++;
                        
                        if (favorableCount === 2) {
                            yearlyChange = 3 + Math.random() * 3; 
                            reason = "干支双喜，运势大吉";
                        } else if (favorableCount === 1) {
                            yearlyChange = 1 + Math.random() * 2; 
                            reason = "五行半利，平稳向上";
                        } else {
                            yearlyChange = -2 - Math.random() * 3; 
                            reason = "五行受阻，宜守不宜攻";
                        }

                        if (["子", "午", "卯", "酉"].includes(yearZhiChar)) {
                            reason += " [桃花]";
                            yearlyChange += (Math.random() > 0.5 ? 1 : -0.5);
                        }
                        if (["寅", "申", "巳", "亥"].includes(yearZhiChar)) {
                            reason += " [驿马]";
                            yearlyChange += (Math.random() > 0.5 ? 1 : -1);
                        }

                        const open = currentScore;
                        currentScore = Math.max(15, Math.min(90, currentScore + yearlyChange));
                        const close = currentScore;
                        
                        const volatility = Math.abs(yearlyChange) + 1.5;
                        const rawHigh = Math.max(open, close) + Math.random() * volatility;
                        const rawLow = Math.min(open, close) - Math.random() * volatility;
                        
                        const high = Math.min(100, rawHigh); 
                        const low = Math.max(0, rawLow);     

                        chartPoints.push({
                            age,
                            year: currentYear,
                            daYun: currentDaYunStr,
                            ganZhi: yearGanZhi,
                            open: Math.round(open),
                            close: Math.round(close),
                            high: Math.round(high),
                            low: Math.round(low),
                            score: Math.round(close),
                            reason: reason
                        });
                    }

                    resolve({
                        bazi: [pillars.year.gan+pillars.year.zhi, pillars.month.gan+pillars.month.zhi, pillars.day.gan+pillars.day.zhi, pillars.hour.gan+pillars.hour.zhi],
                        pillars, 
                        wuXing,
                        summary: summary,
                        summaryScore: summaryScore,
                        personality: personalityText,
                        personalityScore: Math.round(personalityScore * 10) / 10,
                        industry: strength === "Strong" ? "身强喜克泄，适合从事管理、创业、或五行属" + favoredElements[0] + "的行业，承担责任。" : "身弱喜印比，适合从事技术、文职、或五行属" + favoredElements[0] + "的稳定工作，依托平台。",
                        industryScore: Math.round(industryScore * 10) / 10,
                        fengShui: fengShuiText,
                        fengShuiScore: fengShuiScore,
                        wealth: wealthText,
                        wealthScore: Math.round(wealthScore * 10) / 10,
                        marriage: `配偶宫坐${baZi.getDayZhi()}（${spouseElement}），${favoredElements.includes(spouseElement) ? "为喜用神，得配偶得力相助，婚姻美满。" : "非喜用，夫妻间需多包容沟通，经营感情。"}`,
                        marriageScore: Math.round(marriageScore * 10) / 10,
                        health: `五行${missingElements.length > 0 ? "缺"+missingElements.join("、") : "平衡"}，需注意${missingElements.includes("水")?"肾脏泌尿":missingElements.includes("火")?"心血管":missingElements.includes("木")?"肝胆":missingElements.includes("土")?"脾胃":"呼吸系统"}方面的保养。`,
                        healthScore: Math.round(healthScore * 10) / 10,
                        family: "年柱为根，月柱为苗。祖业" + (strength === "Strong" ? "平平，多靠个人奋斗，白手起家。" : "有靠，可得长辈荫庇，少年运顺遂。"),
                        familyScore: 7,
                        chartPoints
                    });
                } catch (e) {
                    reject(e);
                }
            });
        };

        const generateMonthlyAnalysis = (year, input) => {
            const months = [];
            let currentScore = 50; 
            
            for (let m = 1; m <= 12; m++) {
                const d = Lunar.fromYmd(year, m, 15);
                const gz = d.getMonthInGanZhi();
                const monthZhi = gz.charAt(1);
                
                let change = (Math.random() - 0.5) * 10; 
                let reason = "";
                
                if (["巳","午","未"].includes(monthZhi)) {
                    change += 1;
                    reason = "火旺之月";
                } else if (["亥","子","丑"].includes(monthZhi)) {
                    change -= 1; 
                    reason = "水寒之月";
                } else if (["寅","卯"].includes(monthZhi)) {
                    reason = "木气生发";
                } else if (["申","酉"].includes(monthZhi)) {
                    reason = "金气肃杀";
                } else {
                    reason = "土气厚重";
                }

                const open = currentScore;
                currentScore = Math.max(20, Math.min(80, currentScore + change));
                const close = currentScore;
                const rawHigh = Math.max(open, close) + Math.abs(change/2) + 2;
                const rawLow = Math.min(open, close) - Math.abs(change/2) - 2;
                
                const high = Math.min(100, rawHigh);
                const low = Math.max(0, rawLow);

                months.push({
                    month: m,
                    ganZhi: gz,
                    open: Math.round(open),
                    close: Math.round(close),
                    high: Math.round(high),
                    low: Math.round(low),
                    score: Math.round(close),
                    reason: `${reason}`
                });
            }
            return months;
        };

        /********************************************************************************
         * components/BaziForm
         ********************************************************************************/
        const BaziForm = ({ onSubmit, isLoading }) => {
            const [formData, setFormData] = React.useState({
                birthYear: '1990',
                birthMonth: '1',
                birthDay: '1',
                birthHour: '12',
                gender: 'male',
                calendarType: 'solar',
                isLeap: false
            });

            const handleChange = (e) => {
                const target = e.target;
                const name = target.name;
                const value = target.value;
                const type = target.type;
                const checked = target.checked;
                
                setFormData(prev => ({ 
                    ...prev, 
                    [name]: type === 'checkbox' ? checked : value 
                }));
            };

            const handleCalendarChange = (type) => {
                setFormData(prev => ({ ...prev, calendarType: type }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            const currentYear = new Date().getFullYear();
            const years = Array.from({ length: 100 }, (_, i) => currentYear - i);
            const months = Array.from({ length: 12 }, (_, i) => i + 1);

        /********************************************************************************
         * components/VerticalLifeChart
         ********************************************************************************/
        const VerticalLifeChart = ({ data, isDetailed, onYearClick }) => {
            const svgRef = React.useRef(null);
            const containerRef = React.useRef(null);
            const [containerWidth, setContainerWidth] = React.useState(0);

            React.useEffect(() => {
                if (!containerRef.current) return;
                const resizeObserver = new ResizeObserver((entries) => {
                    if (entries[0]) {
                        setContainerWidth(entries[0].contentRect.width);
                    }
                });
                resizeObserver.observe(containerRef.current);
                return () => resizeObserver.disconnect();
            }, []);

            React.useEffect(() => {
                if (!data || data.length === 0) return;
                if (!svgRef.current) return;
                if (containerWidth === 0) return;

                d3.select(svgRef.current).selectAll("*").remove();
                if (containerRef.current) {
                    d3.select(containerRef.current).selectAll(".chart-tooltip").remove();
                }

                const isMobile = containerWidth < 600;
                const margin = { top: 40, right: isMobile ? 10 : 30, bottom: 60, left: isMobile ? 30 : 40 };
                
                let width = containerWidth;
                let stepX = 0;
                let candleWidth = 0;

                const innerWidthFixed = containerWidth - margin.left - margin.right;

                if (isDetailed) {
                    stepX = isMobile ? 30 : 40; 
                    width = Math.max(containerWidth, data.length * stepX + margin.left + margin.right);
                    candleWidth = isMobile ? 8 : 12;
                } else {
                    stepX = innerWidthFixed / data.length;
                    width = containerWidth;
                    candleWidth = Math.max(1, stepX * 0.6);
                }
                
                const height = 450; 
                const innerWidth = width - margin.left - margin.right;
                const innerHeight = height - margin.top - margin.bottom;

                const svg = d3.select(svgRef.current)
                .attr("width", width)
                .attr("height", height)
                .attr("class", "bg-slate-900 select-none");

                const g = svg.append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

                const xScale = d3.scaleLinear()
                .domain([d3.min(data, d => d.age) || 1, d3.max(data, d => d.age) || 100])
                .range([0, innerWidth]);

                const yScale = d3.scaleLinear()
                .domain([0, 100])
                .range([innerHeight, 0]);

                const yGrid = d3.axisLeft(yScale)
                .tickSize(-innerWidth)
                .tickFormat(() => "")
                .ticks(10);
                
                g.append("g")
                .attr("class", "grid-lines opacity-10")
                .call(yGrid)
                .selectAll("line")
                .attr("stroke", "#94a3b8");

                const xTicks = isDetailed ? data.length / 5 : (isMobile ? 5 : 10);
                const xAxis = d3.axisBottom(xScale).ticks(xTicks).tickFormat(d => `${d}岁`);

                const xAxisGroup = g.append("g")
                .attr("class", "x-axis text-slate-400 font-mono")
                .attr("transform", `translate(0, ${innerHeight})`)
                .call(xAxis);
                xAxisGroup.select(".domain").attr("stroke", "#475569");
                xAxisGroup.selectAll("line").attr("stroke", "#475569");
                
                if (isMobile) {
                    xAxisGroup.selectAll("text").attr("font-size", "10px");
                }

                const yAxis = d3.axisLeft(yScale).ticks(5);
                const yAxisGroup = g.append("g")
                .attr("class", "y-axis text-slate-400 font-mono")
                .call(yAxis);
                yAxisGroup.select(".domain").remove();

                let currentDaYun = data[0]?.daYun;
                const daYunChanges = [];
                if (currentDaYun) daYunChanges.push({ daYun: currentDaYun, x: xScale(data[0].age) });

                data.forEach(d => {
                if (d.daYun !== currentDaYun) {
                    currentDaYun = d.daYun;
                    daYunChanges.push({ daYun: currentDaYun, x: xScale(d.age) });
                }
                });

                const daYunGroup = g.append("g").attr("class", "dayun-layer");
                daYunChanges.forEach((change) => {
                daYunGroup.append("line")
                    .attr("x1", change.x)
                    .attr("x2", change.x)
                    .attr("y1", 0)
                    .attr("y2", innerHeight + 20)
                    .attr("stroke", "#a855f7")
                    .attr("stroke-width", 1)
                    .attr("stroke-dasharray", "4,4")
                    .attr("opacity", 0.3);

                daYunGroup.append("text")
                    .attr("x", change.x + (isDetailed ? 5 : 2))
                    .attr("y", 15)
                    .attr("fill", "#d8b4fe")
                    .attr("font-size", isDetailed ? "12px" : (isMobile ? "8px" : "10px"))
                    .attr("font-weight", "bold")
                    .text(isDetailed ? `大运: ${change.daYun}` : change.daYun);
                });

                const candleGroup = g.append("g").attr("class", "candles");
                
                const tooltip = d3.select(containerRef.current)
                    .append("div")
                    .attr("class", "chart-tooltip absolute z-50 bg-slate-800 border border-amber-500/50 p-3 rounded shadow-xl text-xs pointer-events-none opacity-0 transition-opacity")
                    .style("top", "0")
                    .style("left", "0");

                data.forEach((d) => {
                const x = xScale(d.age);
                const openY = yScale(d.open);
                const closeY = yScale(d.close);
                const highY = yScale(d.high);
                const lowY = yScale(d.low);
                const isUp = d.close >= d.open;
                const color = isUp ? "#ef4444" : "#22c55e";

                candleGroup.append("line")
                    .attr("x1", x)
                    .attr("x2", x)
                    .attr("y1", highY)
                    .attr("y2", lowY)
                    .attr("stroke", color)
                    .attr("stroke-width", isDetailed ? 1 : 0.5);

                candleGroup.append("rect")
                    .attr("x", x - candleWidth / 2)
                    .attr("y", Math.min(openY, closeY))
                    .attr("width", candleWidth)
                    .attr("height", Math.max(1, Math.abs(openY - closeY)))
                    .attr("fill", color)
                    .attr("class", "cursor-pointer hover:opacity-80 transition-opacity")
                    .on("click", () => onYearClick(d.year))
                    .on("mouseenter", () => {
                        tooltip.style("opacity", 1)
                                .html(`
                                <div class="font-bold text-amber-500 text-sm mb-1">${d.year} (${d.ganZhi}) - ${d.age}岁</div>
                                <div class="grid grid-cols-2 gap-2 mb-1">
                                    <span>高: ${Math.round(d.high)}</span>
                                    <span>低: ${Math.round(d.low)}</span>
                                    <span>开: ${d.open}</span>
                                    <span>收: ${d.close}</span>
                                </div>
                                <div class="text-slate-300 border-t border-slate-600 pt-1 mt-1">${d.reason}</div>
                                <div class="text-green-400 mt-1 italic">点击查看流月详情</div>
                            `);
                    })
                    .on("mousemove", (event) => {
                        const [mx, my] = d3.pointer(event, containerRef.current);
                        let leftPos = mx + 15;
                        if (leftPos + 180 > containerWidth) leftPos = mx - 180 - 15;
                        tooltip.style("left", `${leftPos}px`).style("top", `${my + 10}px`);
                    })
                    .on("mouseleave", () => tooltip.style("opacity", 0));

                if (isDetailed) {
                    g.append("text")
                        .attr("transform", `translate(${x}, ${innerHeight + 35}) rotate(45)`)
                        .attr("text-anchor", "start")
                        .attr("fill", "#64748b")
                        .attr("font-size", isMobile ? "8px" : "9px")
                        .text(d.ganZhi);
                        
                    const reasonY = highY - 10;
                    g.append("text")
                        .attr("transform", `translate(${x}, ${reasonY}) rotate(-90)`)
                        .attr("text-anchor", "start") 
                        .attr("fill", "#475569")
                        .attr("font-size", "8px")
                        .style("opacity", 0.7)
                        .text(d.reason.substring(0, 8) + (d.reason.length > 8 ? "..." : ""));
                }
                });

            }, [data, containerWidth, isDetailed, onYearClick]);

            return (
                <div className="w-full h-full relative group" ref={containerRef}>
                <div className={`h-full custom-scrollbar border border-slate-700 rounded-lg bg-slate-900/50 ${isDetailed ? 'overflow-x-auto' : 'overflow-hidden'}`}>
                    <svg ref={svgRef} className="block"></svg>
                </div>
                </div>
            );
        };

        /********************************************************************************
         * components/WuXingRadar
         ********************************************************************************/
        const WuXingRadar = ({ data }) => {
            const svgRef = React.useRef(null);

            React.useEffect(() => {
                if (!svgRef.current || !data) return;
                d3.select(svgRef.current).selectAll("*").remove();

                const width = 250;
                const height = 220;
                const margin = 30;
                const radius = Math.min(width, height) / 2 - margin;

                const svg = d3.select(svgRef.current)
                .attr("width", width)
                .attr("height", height);

                const g = svg.append("g")
                .attr("transform", `translate(${width / 2},${height / 2})`);

                const elements = ["wood", "fire", "earth", "metal", "water"];
                const labels = { "wood": "木", "fire": "火", "earth": "土", "metal": "金", "water": "水" };
                const colors = { "wood": "#22c55e", "fire": "#ef4444", "earth": "#eab308", "metal": "#94a3b8", "water": "#3b82f6" };

                const maxValue = Math.max(...Object.values(data), 4); 
                
                const rScale = d3.scaleLinear().domain([0, maxValue]).range([0, radius]);
                const angleSlice = (Math.PI * 2) / 5;

                [0.25, 0.5, 0.75, 1].forEach(p => {
                    g.append("circle")
                    .attr("r", radius * p)
                    .attr("fill", "none")
                    .attr("stroke", "#475569")
                    .attr("stroke-dasharray", "3,3")
                    .attr("opacity", 0.5);
                });

                const axisGrid = g.append("g").attr("class", "axisWrapper");
                
                elements.forEach((el, i) => {
                    const angle = angleSlice * i - Math.PI / 2; 
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    
                    axisGrid.append("line")
                        .attr("x1", 0)
                        .attr("y1", 0)
                        .attr("x2", x)
                        .attr("y2", y)
                        .attr("stroke", "#475569")
                        .attr("stroke-width", 1);

                    const labelX = Math.cos(angle) * (radius + 20);
                    const labelY = Math.sin(angle) * (radius + 20);
                    
                    axisGrid.append("text")
                        .attr("x", labelX)
                        .attr("y", labelY)
                        .attr("dy", "0.35em")
                        .attr("text-anchor", "middle")
                        .attr("fill", colors[el])
                        .attr("font-weight", "bold")
                        .text(`${labels[el]} (${data[el]})`);
                });

                const radarLine = d3.lineRadial()
                    .radius(d => rScale(d.value))
                    .angle((d, i) => i * angleSlice)
                    .curve(d3.curveLinearClosed);

                const points = elements.map(el => ({ axis: el, value: data[el] }));

                g.append("path")
                    .datum(points)
                    .attr("d", radarLine)
                    .attr("fill", "rgba(245, 158, 11, 0.2)") 
                    .attr("stroke", "#f59e0b")
                    .attr("stroke-width", 2);

                g.selectAll(".dot")
                    .data(points)
                    .enter()
                    .append("circle")
                    .attr("cx", (d, i) => rScale(d.value) * Math.cos(angleSlice * i - Math.PI / 2))
                    .attr("cy", (d, i) => rScale(d.value) * Math.sin(angleSlice * i - Math.PI / 2))
                    .attr("r", 4)
                    .attr("fill", "#f59e0b");

            }, [data]);

            return (
                <div className="flex flex-col items-center justify-center bg-slate-800 border border-slate-700 rounded-xl p-4">
                    <h3 className="text-amber-500 font-serif font-bold mb-2">五行能量</h3>
                    <svg ref={svgRef}></svg>
                </div>
            );
        };

                    .attr("class", "monthly-tooltip absolute z-50 bg-slate-800 border border-green-500/50 p-2 rounded shadow-xl text-xs pointer-events-none opacity-0 transition-opacity")
                    .style("top", "0")
                    .style("left", "0");

                const candleWidth = xScale.bandwidth();

                data.forEach((d) => {
                const x = xScale(String(d.month));
                if (x === undefined) return;
                
                const openY = yScale(d.open);
                const closeY = yScale(d.close);
                const highY = yScale(d.high);
                const lowY = yScale(d.low);
                const isUp = d.close >= d.open;
                const color = isUp ? "#ef4444" : "#22c55e";

                const centerX = x + candleWidth / 2;

                g.append("line")
                    .attr("x1", centerX)
                    .attr("x2", centerX)
                    .attr("y1", highY)
                    .attr("y2", lowY)
                    .attr("stroke", color)
                    .attr("stroke-width", 1);

                g.append("rect")
                    .attr("x", x)
                    .attr("y", Math.min(openY, closeY))
                    .attr("width", candleWidth)
                    .attr("height", Math.max(1, Math.abs(openY - closeY)))
                    .attr("fill", color)

                    g.append("text")
                        .attr("x", centerX)
                        .attr("y", innerHeight + 25)
                        .attr("text-anchor", "middle")
                        .attr("fill", "#64748b")
                        .attr("font-size", isMobile ? "8px" : "10px")
                        .text(d.ganZhi);
