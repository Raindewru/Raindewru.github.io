<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入微信群</title>
  <link rel="icon" href="../static/images/favicon.png" type="image/png">
  <style>
    :root {
      --primary: #12b7f5;
      --primary-dark: #0ea5e9;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .qr-container {
      background: var(--bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .qr-code {
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 12px;
    }

    .group-info {
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .group-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .group-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-dark);
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
    }

    .copy-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn:active {
      transform: translateY(0);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .feature {
      text-align: center;
    }

    .feature-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 12px;
      color: var(--muted);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 12px 24px;
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      margin-top: 16px;
    }

    .back-btn:hover {
      background: var(--border);
      color: var(--text);
      transform: translateY(-1px);
    }

    .back-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }

      .title {
        font-size: 24px;
      }

      .qr-code {
        width: 180px;
        height: 180px;
      }

      .features {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
    <link rel="stylesheet" href="../static/theme/visual-refresh.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">💬</div>
      <h1 class="title">加入微信群</h1>
      <p class="subtitle">扫码或点击下方按钮加入我们的微信群<br>免费获取最新测试授权码和更多福利</p>

      <div class="qr-container">
        <img src="qqun.jpg" alt="微信群二维码" class="qr-code">
      </div>

      <div class="group-info">
        
        
      </div>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">📢</div>
          <div class="feature-text">最新资讯</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🎁</div>
          <div class="feature-text">专属福利</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🤝</div>
          <div class="feature-text">交流互动</div>
        </div>
      </div>

      <a href="../../index.html" class="back-btn">
        <span>🏠</span>
        返回首页
      </a>

      <div class="footer">
        
      </div>
    </div>
  </div>

  <script>
    const groupNumber = '2172083910';
    
    document.querySelector('.group-number').textContent = groupNumber;

    function copyGroupNumber() {
      navigator.clipboard.writeText(groupNumber).then(() => {
        const btn = document.querySelector('.copy-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span>✅</span> 已复制';
        btn.style.background = '#22c55e';
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.style.background = '';
        }, 2000);
      }).catch(err => {
        alert('复制失败，请手动复制群号');
      });
    }
  </script>
    <script src="../static/theme/visual-refresh.js" defer></script>
</body>

</html>
