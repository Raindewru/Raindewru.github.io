        { id: 101, dimensionId: 1, text: "如果世界是一幅巨大的油画，而你发现画面上出现一块“不协调的色块”，你会？", options: [{ label: "A", text: "视其为瑕疵，必须被修正以恢复秩序。", score: 1 }, { label: "B", text: "尝试理解它，或许能融入成为新背景。", score: 2 }, { label: "C", text: "欣赏这意外，它为画面注入了张力。", score: 3 }, { label: "D", text: "接纳这存在，完美本就包含不和谐。", score: 4 }] },
        { id: 102, dimensionId: 1, text: "你发现一朵花同时开着盛放的花瓣与枯萎的边缘，你会怎么解读？", options: [{ label: "A", text: "一种衰败的征兆，美正在消逝。", score: 1 }, { label: "B", text: "一场静默的争战，在枝头进行。", score: 2 }, { label: "C", text: "一种完整的真实，同时蕴含生与死。", score: 3 }, { label: "D", text: "一种存在的证明，生命无需完美。", score: 4 }] },
        { id: 103, dimensionId: 1, text: "海面与天空在黎明前混成一片，你分不清哪一侧是海、哪一侧是天。你会觉得？", options: [{ label: "A", text: "熟悉的规则消失，世界陷入混沌。", score: 1 }, { label: "B", text: "瑰丽却令人困惑，渴望一条地平线。", score: 2 }, { label: "C", text: "万物在温柔交融，边界失去了意义。", score: 3 }, { label: "D", text: "看见了终极和谐，划分本是徒劳。", score: 4 }] },
        { id: 104, dimensionId: 1, text: "你看到一条河流一半平静、一半湍急，你会怎么形容它？", options: [{ label: "A", text: "一种迷失的状态，源于内在的矛盾。", score: 1 }, { label: "B", text: "一种临时的混乱，由外力所塑造。", score: 2 }, { label: "C", text: "一段必要的旅程，介于两种状态之间。", score: 3 }, { label: "D", text: "一种共生的真实，动与静本为一体。", score: 4 }] },
        { id: 105, dimensionId: 1, text: "一座古老的石像，在风雨中同时显现出神圣的轮廓与残破的裂痕。你如何看待这种并存？", options: [{ label: "A", text: "一种遗憾，时间的暴力摧毁了完美。", score: 1 }, { label: "B", text: "一种过程，从完整走向破碎的证明。", score: 2 }, { label: "C", text: "一种完整，历史与当下在此刻共存。", score: 3 }, { label: "D", text: "一种启示，不朽正存在于衰败之中。", score: 4 }] },
        // 维度二：人设切换力
        { id: 201, dimensionId: 2, text: "当交际场域从知己密谈转向名流晚宴，你内心的姿态更似？", options: [{ label: "A", text: "一棵孤立的树，无法改变生长的朝向。", score: 1 }, { label: "B", text: "一条汇入新河道的支流，缓慢地与水温交融。", score: 2 }, { label: "C", text: "一位训练有素的舞者，能踏准每一支舞曲的节奏。", score: 3 }, { label: "D", text: "水本身，倒入任何容器便成为其形状。", score: 4 }] },
        { id: 202, dimensionId: 2, text: "当你的心境需要在“纵情山水的诗人”与“精研尺规的学者”两种状态间快速切换，你感觉？", options: [{ label: "A", text: "一种自我的撕裂，一种情怀正在辜负另一种。", score: 1 }, { label: "B", text: "一种精力的耗竭，心神在两种频率间疲惫奔波。", score: 2 }, { label: "C", text: "一种从容的转换，如同调整呼吸的节奏般自然。", score: 3 }, { label: "D", text: "一种本然的流露，感性与理性本就是我的一体两面。", score: 4 }] },
        { id: 203, dimensionId: 2, text: "当你需要融入一个氛围、话题都与自己日常完全不同的社交圈层，于你而言更像是？", options: [{ label: "A", text: "一片危险的雷区，唯恐暴露自身的浅薄。", score: 1 }, { label: "B", text: "一次礼貌的远征，出于教养而非内心驱动。", score: 2 }, { label: "C", text: "一趟有趣的游历，借此窥见另一座灵魂的宇宙。", score: 3 }, { label: "D", text: "一种自如的呼吸，万物皆可为我所用、所谈。", score: 4 }] },
        { id: 204, dimensionId: 2, text: "有人形容你“见人说人话，见鬼说鬼话”，你视此为何？", options: [{ label: "A", text: "一种对“真诚”的背离，令我感到不安。", score: 1 }, { label: "B", text: "一种生存的技艺，虽必要却略显浮夸。", score: 2 }, { label: "C", text: "一种高效的沟通智慧，是尊重也是能力。", score: 3 }, { label: "D", text: "一种深层的共情，我愿以你的语言与你交谈。", score: 4 }] },
        { id: 205, dimensionId: 2, text: "回顾一日中扮演的诸多角色，你的夜晚常沉浸于何种思绪？", options: [{ label: "A", text: "疲惫与迷失，不知哪一个才是真实的自己。", score: 1 }, { label: "B", text: "短暂的放空，等待真实的情绪缓缓归位。", score: 2 }, { label: "C", text: "平静与满足，每个角色都是我拼图的一片。", score: 3 }, { label: "D", text: "清醒的观察，我选择成为任何需要成为的样子。", score: 4 }] },
        // 维度三：利益计算力
        { id: 301, dimensionId: 3, text: "当一位同行的旅人屡次偏离航向，使你们的共同旅程陷入迷途，你会？", options: [{ label: "A", text: "依旧并肩前行，相信情谊本身就是最美的风景。", score: 1 }, { label: "B", text: "在挽留与放手之间徘徊，如同被两股相反的季风撕扯。", score: 2 }, { label: "C", text: "调整同行距离，保持既相互牵引又不彼此束缚。", score: 3 }, { label: "D", text: "选择分道扬镳，让旅途归旅途，故人归故人。", score: 4 }] },
        { id: 302, dimensionId: 3, text: "面对一个能带来丰硕收获却需要越过内心某种准则的抉择，你视其为？", options: [{ label: "A", text: "无需犹豫的放弃，灵魂的洁净比尘世的收获更为珍贵。", score: 1 }, { label: "B", text: "一场内心的拉锯战，天平的两端都承载着千钧之重。", score: 2 }, { label: "C", text: "一次重新审视准则的机会，看它是永恒的灯塔还是可移动的界碑。", score: 3 }, { label: "D", text: "一个清晰的信号，表明成长有时需要与过去的自己温和地告别。", score: 4 }] },
        { id: 303, dimensionId: 3, text: "“永恒的星光下，没有不变的盟友，只有永恒的星轨运行法则”，你对此的感悟是？", options: [{ label: "A", text: "这是一种对人性的悲观，忽略了情感联结的温暖光芒。", score: 1 }, { label: "B", text: "这是一种现实的映射，在某些领域的夜空中的确如此。", score: 2 }, { label: "C", text: "这是一面多棱镜，折射出人际关系中某个角度的真相。", score: 3 }, { label: "D", text: "这是一种深刻的宇宙观，揭示了万物运作的底层逻辑。", score: 4 }] },
        { id: 304, dimensionId: 3, text: "当需要分享共同收获的果实时，你的分配哲学倾向于？", options: [{ label: "A", text: "如春雨润物无声，让他人多得一份，滋养关系的土壤。", score: 1 }, { label: "B", text: "如工匠打造天平，追求每一克重量都精确无误的公正。", score: 2 }, { label: "C", text: "如自然孕育万物，按照各自贡献的阳光雨露来给予回馈。", score: 3 }, { label: "D", text: "如农人播种希望，思考如何分配能让下一次的丰收更加丰硕。", score: 4 }] },
        { id: 305, dimensionId: 3, text: "当心灵的向往（玫瑰）与现实的效用（麦穗）不能两全时，你通常？", options: [{ label: "A", text: "永远追随玫瑰的芬芳，心灵的满足是唯一的航标。", score: 1 }, { label: "B", text: "在玫瑰园与麦田之间久久徘徊，难以抉择。", score: 2 }, { label: "C", text: "谨慎权衡，在大多数十字路口选择滋养生命的麦穗。", score: 3 }, { label: "D", text: "学习将麦穗编织成冠冕，在现实的土壤中培育出诗意。", score: 4 }] },
        // 维度四：潜台词解码力
        { id: 401, dimensionId: 4, text: "当听到“这片海很美，但此刻风浪太大”，你领悟到的是？", options: [{ label: "A", text: "对海洋景观的客观描述与安全提醒。", score: 1 }, { label: "B", text: "说话者内心的犹豫与潜在担忧。", score: 2 }, { label: "C", text: "一个隐喻，暗示当前并非最佳时机。", score: 3 }, { label: "D", text: "邀请你共同寻找平息风浪的方法。", score: 4 }] },
        { id: 402, dimensionId: 4, text: "若家中长辈说“现在的年轻人都有自己的主意了”，你会理解为？", options: [{ label: "A", text: "对时代进步的客观观察。", score: 1 }, { label: "B", text: "对某些具体行为的轻微不满。", score: 2 }, { label: "C", text: "期待你能主动征询他们的建议。", score: 3 }, { label: "D", text: "一个需要深入探讨的代际话题的开端。", score: 4 }] },
        { id: 403, dimensionId: 4, text: "深夜长谈后，在你记忆的深谷里最常回响的是？", options: [{ label: "A", text: "那些如清泉般明澈的语句本身。", score: 1 }, { label: "B", text: "弥漫在对话间的温度与情感底色。", score: 2 }, { label: "C", text: "那些如夜鸟掠过般的短暂沉默与弦外之音。", score: 3 }, { label: "D", text: "整场对话的隐秘脉络与未抵达唇边的真意。", score: 4 }] },
        { id: 404, dimensionId: 4, text: "阅读一封辞藻优美的书信时，你的目光会穿越文字看见？", options: [{ label: "A", text: "笔墨间绽放的文学之花与修辞艺术。", score: 1 }, { label: "B", text: "信笺承载的显性信息与表面叙事。", score: 2 }, { label: "C", text: "字里行间精心构筑的叙事意图与侧重。", score: 3 }, { label: "D", text: "那些在空白处呼吸的未尽之言与真实诉求。", score: 4 }] },
        { id: 405, dimensionId: 4, text: "当接收到带着闪烁眼神的赞美时，你的直觉告诉你？", options: [{ label: "A", text: "欣然收下这份善意，如同接纳阳光。", score: 1 }, { label: "B", text: "感到微妙的不协调，如风中飘忽的旗帜。", score: 2 }, { label: "C", text: "意识到言语与表情之间存在着某种断裂。", score: 3 }, { label: "D", text: "读懂这复杂信号背后的多重可能性与真相。", score: 4 }] },
        // 维度五：边界防御力
        { id: 501, dimensionId: 5, text: "当你的心灵花园被频繁造访甚至践踏，你会如何守护？", options: [{ label: "A", text: "如无设防的花园，任人采撷也保持沉默。", score: 1 }, { label: "B", text: "如摇曳的柳枝，虽有韧性却难抵强风。", score: 2 }, { label: "C", text: "如设有矮篱的庭院，微笑示意“请止步于此”。", score: 3 }, { label: "D", text: "如古老的石砌界墙，以存在的威严诉说界限。", score: 4 }] },
        { id: 502, dimensionId: 5, text: "你如何体验人际关系中的“分寸感”？", options: [{ label: "A", text: "一团模糊的迷雾，总在事后才惊觉越界。", score: 1 }, { label: "B", text: "一根绷紧的丝线，需要小心翼翼地维系。", score: 2 }, { label: "C", text: "一种清醒的自觉，是健康关系的呼吸空间。", score: 3 }, { label: "D", text: "一种内在的律法，由我订立并从容地执行。", score: 4 }] },
        { id: 503, dimensionId: 5, text: "当被提出一个极不情愿的请求，你的内心过程是？", options: [{ label: "A", text: "愧疚的潮水淹没堤坝，最终选择妥协。", score: 1 }, { label: "B", text: "剧烈的内心拉锯，在“不”与“好”之间痛苦摇摆。", score: 2 }, { label: "C", text: "温和而坚定地回应：“抱歉，这不在我的范围内。”", score: 3 }, { label: "D", text: "平静地告知对方其请求不合理，并无需附加理由。", score: 4 }] },
        { id: 504, dimensionId: 5, text: "你如何看待关系中的付出与保留？", options: [{ label: "A", text: "旭日东升，自然将光芒洒向每一寸土地。", score: 1 }, { label: "B", text: "月有圆缺，给予时总带着隐约的亏欠。", score: 2 }, { label: "C", text: "花开半满，留一份余韵滋养自身根茎。", score: 3 }, { label: "D", text: "园丁智慧，懂得每株植物所需的恰切雨露。", score: 4 }] },
        { id: 505, dimensionId: 5, text: "当他人持续试探你划定的界限，你会？", options: [{ label: "A", text: "如退守的潮水，在静默中一再退让。", score: 1 }, { label: "B", text: "如起伏的波浪，情绪在不满与忍耐间波动。", score: 2 }, { label: "C", text: "如坚定的界碑，再次明确标示出边界线。", score: 3 }, { label: "D", text: "如沉稳的山峦，让越界者知难而退。", score: 4 }] },
        // 维度六：权力透视力
        { id: 601, dimensionId: 6, text: "步入一个陌生的社交场合，你首先会感知什么？", options: [{ label: "A", text: "环境的氛围与装饰的风格。", score: 1 }, { label: "B", text: "哪些面孔看起来友善或有趣。", score: 2 }, { label: "C", text: "人群的聚集模式与核心人物所在。", score: 3 }, { label: "D", text: "无形的权力架构、联盟关系与气场流动。", score: 4 }] },
        { id: 602, dimensionId: 6, text: "一项决议看似“集体决策”，你的理解是？", options: [{ label: "A", text: "民主精神的体现，是多数人意志的结果。", score: 1 }, { label: "B", text: "一种组织形式，总需要有人来发起和推动。", score: 2 }, { label: "C", text: "关键人物的意志，通过一套流程获得了合法性。", score: 3 }, { label: "D", text: "各方力量博弈后，达成的动态平衡与妥协产物。", score: 4 }] },
        { id: 603, dimensionId: 6, text: "当资源分配方案公布，你分析的重点在于？", options: [{ label: "A", text: "大家所得的份额是否公平。", score: 1 }, { label: "B", text: "方案的制定标准与流程是否合理。", score: 2 }, { label: "C", text: "哪些人或部门是此次分配的主要受益者。", score: 3 }, { label: "D", text: "此次分配背后体现了怎样的权力意图与战略布局。", score: 4 }] },
        { id: 604, dimensionId: 6, text: "面对一个看似平级的团队，你识别真正影响力的依据是？", options: [{ label: "A", text: "组织架构图上的职位与头衔。", score: 1 }, { label: "B", text: "谁的声音最大，最敢于表达。", score: 2 }, { label: "C", text: "谁的专业能力最强，经验最丰富。", score: 3 }, { label: "D", text: "谁的意见被最终采纳，谁在沉默时被征询。", score: 4 }] },
        { id: 605, dimensionId: 6, text: "面对人际关系中的微妙博弈，你的姿态更似？", options: [{ label: "A", text: "林间的清风，自在来去不问世事。", score: 1 }, { label: "B", text: "溪中的落叶，随波逐流顺势而为。", score: 2 }, { label: "C", text: "岸边的观者，静察水流洞悉暗涌。", score: 3 }, { label: "D", text: "熟练的方舟，知水性能借力前行。", score: 4 }] },
        // 维度七：筹码置换力
        { id: 701, dimensionId: 7, text: "你如何看待社交网络中的“人脉”？", options: [{ label: "A", text: "一种情感的联结，是友谊的自然延伸。", score: 1 }, { label: "B", text: "一种潜在的资源，但主动经营显得功利。", score: 2 }, { label: "C", text: "一个生态系统，需要用心维护与滋养。", score: 3 }, { label: "D", text: "一个价值市场，核心在于能力的互换与利益的共赢。", score: 4 }] },
        { id: 702, dimensionId: 7, text: "当你需要向一位高人请教，你的第一念头是？", options: [{ label: "A", text: "直接求助，相信对方乐于助人。", score: 1 }, { label: "B", text: "不好意思开口，担心被拒绝或欠人情。", score: 2 }, { label: "C", text: "思考如何能让这次交流对对方也有价值。", score: 3 }, { label: "D", text: "准备用自己的独特资源或见解作为交换。", score: 4 }] },
        { id: 703, dimensionId: 7, text: "“天下没有免费的午餐”，你对其的理解是？", options: [{ label: "A", text: "一种过于消极的世界观，忽视了无私的存在。", score: 1 }, { label: "B", text: "一句有益的提醒，告诫人们不要贪图小利。", score: 2 }, { label: "C", text: "一个普遍的社会法则，隐含了价值的流动。", score: 3 }, { label: "D", text: "一切交互的底层逻辑，是构建合作的基础。", score: 4 }] },
        { id: 704, dimensionId: 7, text: "在合作中，你更倾向于扮演何种角色？", options: [{ label: "A", text: "一个顺从的追随者，尽力完成分内之事。", score: 1 }, { label: "B", text: "一个友好的协助者，乐于帮助同伴。", score: 2 }, { label: "C", text: "一个积极的贡献者，主动提供我的价值。", score: 3 }, { label: "D", text: "一个价值的整合者，设计并促成多赢的交换。", score: 4 }] },
        { id: 705, dimensionId: 7, text: "当你拥有他人急需的资源时，你的心态是？", options: [{ label: "A", text: "慷慨赠予，能帮助他人让我感到快乐。", score: 1 }, { label: "B", text: "略有压力，担心处理不当会影响关系。", score: 2 }, { label: "C", text: "视作契机，以此建立更深入的合作关系。", score: 3 }, { label: "D", text: "冷静评估，将其置于更大的价值交换网络中权衡。", score: 4 }] },
        // 维度八：情绪屏蔽力
        { id: 801, dimensionId: 8, text: "当尖刻的批评如箭矢般袭来，你的内心更像什么？", options: [{ label: "A", text: "一张脆弱的纸，被轻易刺穿并撕裂。", score: 1 }, { label: "B", text: "一片动荡的海，风暴清晰地映在海面。", score: 2 }, { label: "C", text: "一口深的古井，波澜被封印在平静之下。", score: 3 }, { label: "D", text: "一面透明的盾，看清来势而不被其撼动。", score: 4 }] },
        { id: 802, dimensionId: 8, text: "在必须出席的场合承载着私人悲痛，你会？", options: [{ label: "A", text: "无法自控，情绪会寻找缝隙决堤。", score: 1 }, { label: "B", text: "强颜欢笑，但悲伤的底色无法掩盖。", score: 2 }, { label: "C", text: "将情绪暂存，如同将雨衣挂在门外。", score: 3 }, { label: "D", text: "与情绪共处，却不让它主导我的言行。", score: 4 }] },
        { id: 803, dimensionId: 8, text: "你如何安置工作中突然涌起的强烈愤怒？", options: [{ label: "A", text: "它是君王，常常直接下令我的行动。", score: 1 }, { label: "B", text: "它是噪音，会持续干扰我的思维频率。", score: 2 }, { label: "C", text: "它是信号，我接受它，但选择理性回应。", score: 3 }, { label: "D", text: "它是能量，我可将其转化用于推进事务。", score: 4 }] },

    function renderRadarChart(scores) {
        const canvas = document.getElementById('radarChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (authState.chartInstance) {
            authState.chartInstance.destroy();
            authState.chartInstance = null;
        }
        authState.chartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: scores.map(s => s.shortName),
                datasets: [{
                    label: '倾向值',
                    data: scores.map(s => s.score),
                    backgroundColor: 'rgba(99, 102, 241, 0.2)',
                    borderColor: '#6366f1',
                    borderWidth: 2,
                    pointBackgroundColor: '#6366f1',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: '#6366f1'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        angleLines: { color: '#e2e8f0' },

    async function resolveApiBase() {
        try {
            const res = await fetch('/config/app-config.json', { cache: 'no-store' });
            if (res.ok) {
                const cfg = await res.json();
                if (cfg && cfg.apiBase) {
                    return String(cfg.apiBase).trim();
                }
            }
        } catch (err) {
            console.warn('无法读取 app-config.json，将使用当前域名:', err);
        }
        return window.location.origin;
    }

    async function initResultAuth() {
        if (resultAuthInitPromise) return resultAuthInitPromise;
        resultAuthInitPromise = (async () => {
            if (!window.AuthorizationSDK) return null;
            try {
                const apiBase = await resolveApiBase();
                resultAuthController = await AuthorizationSDK.init({
                    testType: 'shh',
                    apiBase,
                    startButtons: ['#unlock-btn'],
                    autoRun: false,
                    onAuthorized: unlockFullReport,
                    authContext: 'result'
                });
            } catch (error) {
                console.warn('[auth] result init failed', error);
                resultAuthController = null;
            }
            return resultAuthController;
        })();
        return resultAuthInitPromise;
    }

    async function setupResultGate(attempt = 0) {
        const unlockButton = document.getElementById('unlock-btn');
        if (!unlockButton) return;
        if (!window.AuthorizationSDK) {
            if (attempt < 6) {
                setTimeout(() => setupResultGate(attempt + 1), 80);
            }
            return;
        }
        const controller = resultAuthController || await initResultAuth();
        const config = controller?.state?.config;
        if (config && config.auth_required === 0) {
            unlockFullReport();
            return;
        }
        const mode = (config && config.auth_mode) ? String(config.auth_mode).toLowerCase() : 'start';
        if (mode !== 'result') {
            unlockFullReport();
            return;
        }
        if (controller && controller.isSessionActive()) {
            unlockFullReport();
        }
    }

        lucide.createIcons();

        authState.latestScores = scores;
        authState.unlocked = false;
        if (authState.chartInstance) {
            authState.chartInstance.destroy();
            authState.chartInstance = null;
        }
        resultAuthController = null;
        resultAuthInitPromise = null;
        setFullReportVisible(false);
        setupResultGate();
    }

    // ==========================================
    // 4. 逻辑处理
    // ==========================================

    window.startQuiz = function() {
        state.screen = 'quiz';
        state.answers = {};
        state.currentQuestionIndex = 0;
        state.activeRecord = null;
        state.currentResult = null;
        render();
    }

    window.handleOptionSelect = function(score) {
        const qId = QUESTIONS[state.currentQuestionIndex].id;
        state.answers[qId] = score;

        const card = document.getElementById('quiz-card');
        card.style.opacity = '0';
        card.style.transform = 'translateY(10px)';

        setTimeout(() => {
            if (state.currentQuestionIndex < QUESTIONS.length - 1) {
                state.currentQuestionIndex++;
                render(); 
            } else {
                finalizeResult();
                state.screen = 'result';
                render();
            }
        }, 400);
    }

    window.restartQuiz = function() {
        state.screen = 'welcome';
        state.answers = {};
        state.currentQuestionIndex = 0;
        state.activeRecord = null;
        state.currentResult = null;
        authState.unlocked = false;
        authState.latestScores = null;
        if (authState.chartInstance) {
            authState.chartInstance.destroy();
            authState.chartInstance = null;
        }
        render();
    }

    window.shareResult = function() {
        if (navigator.share) {
            navigator.share({
                title: '社会化罗盘测试',
                text: '我刚完成了社会化罗盘测试，你也来试试吧！',
                url: window.location.href,
            }).catch(console.error);
        } else {
            alert('截屏即可分享结果给朋友哦！');
        }
    }

    window.goToPreviousQuestion = function() {
        if (state.currentQuestionIndex > 0) {
            state.currentQuestionIndex--;
            render();
        }
    }

    window.goToNextQuestion = function() {
        const question = QUESTIONS[state.currentQuestionIndex];
        if (typeof state.answers[question.id] === 'undefined') return;

        if (state.currentQuestionIndex < QUESTIONS.length - 1) {
            state.currentQuestionIndex++;
            render();
        } else if (state.currentQuestionIndex === QUESTIONS.length - 1) {
            finalizeResult();
            state.screen = 'result';
            render();
        }
    }

    window.openRecords = function() {
        state.screen = 'records';
        state.activeRecord = null;
        render();
    }

    window.navigateToWelcome = function() {
        state.screen = 'welcome';
        state.activeRecord = null;
        render();
    }

    window.viewRecord = function(id) {
        const record = state.history.find(r => r.id === id);
        if (record) {
            state.activeRecord = record;
            state.screen = 'result';
            render();
        }
    }

    window.deleteRecord = function(event, id) {
        if (event) event.stopPropagation();
        state.history = state.history.filter(r => r.id !== id);
        if (state.activeRecord && state.activeRecord.id === id) {
            state.activeRecord = null;
        }
        if (state.currentResult && state.currentResult.id === id) {
            state.currentResult = null;
        }
        render();
    }

    function getArchetype(totalAverage) {
        return ARCHETYPES.find(a => totalAverage >= a.range[0] && totalAverage <= a.range[1]) || ARCHETYPES[0];
    }

    function finalizeResult() {
        if (state.currentResult) {
            return state.currentResult;
        }
        const { scores, totalAverage } = calculateResults();
        const archetype = getArchetype(totalAverage);
        const record = {
            id: Date.now(),
            timestamp: new Date().toLocaleString('zh-CN', { hour12: false }),
            scores,
            totalAverage,
            archetype,
            answers: { ...state.answers }
        };
        state.currentResult = record;
        state.history = [record, ...state.history];
        state.activeRecord = null;
        return record;
    }

    function calculateResults() {
        let dimensionScores = {};
        let dimensionCounts = {};

        Object.keys(state.answers).forEach(qIdStr => {
            const qId = parseInt(qIdStr);
            const score = state.answers[qId];
            const q = QUESTIONS.find(q => q.id === qId);
            if (q) {
                dimensionScores[q.dimensionId] = (dimensionScores[q.dimensionId] || 0) + score;
                dimensionCounts[q.dimensionId] = (dimensionCounts[q.dimensionId] || 0) + 1;
            }
        });

        const scores = DIMENSIONS.map(dim => {
            const total = dimensionScores[dim.id] || 0;
            const count = dimensionCounts[dim.id] || 1;
            const avg = total / count;
            const percentage = Math.round(10 + ((avg - 1) / 3) * 90);
            return {
                ...dim,
                score: Math.max(10, Math.min(100, percentage))
            };
        });

        const totalAverage = scores.reduce((acc, curr) => acc + curr.score, 0) / scores.length;
        return { scores, totalAverage };
    }

    function rebindAuthorizationButtons(attempt = 0) {
        if (window.AuthorizationSDK && typeof window.AuthorizationSDK.attachStartButtons === "function") {
            window.AuthorizationSDK.attachStartButtons();
            return;
        }
        if (attempt < 5) {
            setTimeout(() => rebindAuthorizationButtons(attempt + 1), 50);
        }
    }

    // 初始化
    render();
</script>
