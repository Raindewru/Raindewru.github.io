<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市性格匹配测试</title>
    <link rel="stylesheet" href="../authorization/auth-modal.css">
    <style>
        :root {
            --primary-color: #4f46e5; /* Indigo 600 */
            --primary-hover: #4338ca; /* Indigo 700 */
            --bg-gradient-start: #eff6ff;
            --bg-gradient-middle: #eef2ff;
            --bg-gradient-end: #faf5ff;
            --text-main: #1f2937;
            --text-sub: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Roboto, Helvetica, Arial, sans-serif;
            /* Fix: Ensure background covers the whole page and doesn't scroll away */
            background-color: var(--bg-gradient-start); 
            background-image: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-middle), var(--bg-gradient-end));
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed from center to handle long content */
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px; /* Slightly wider for results */
            margin-top: 20px;
            margin-bottom: 40px;
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            padding: 40px;
            transition: transform 0.3s ease;
        }

        @media (max-width: 640px) {
            .glass-card {
                padding: 24px;
            }
        }

        /* Utility Classes */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }
        .mb-8 { margin-bottom: 32px; }
        .mt-4 { margin-top: 16px; }
        .mt-8 { margin-top: 32px; }
        .w-full { width: 100%; }
        
        /* Typography */
        h1 { font-size: 2.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 1rem; }
        h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { line-height: 1.6; color: var(--text-sub); }
        .text-gradient {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 48px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.125rem;
            font-weight: 700;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
        .btn:hover { background-color: var(--primary-hover); transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        
        .btn-secondary {
            background-color: #f3f4f6;
            color: #374151;
            padding: 12px 24px;
            font-size: 1rem;
        }
        .btn-secondary:hover { background-color: #e5e7eb; transform: none; }

        .nav-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }
        .nav-actions__btn {
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .nav-actions__btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(79,70,229,0.12);
        }
        .nav-actions__btn--primary {
            background: linear-gradient(120deg,#4f46e5,#7c3aed);
            color: #fff;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            border: 2px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        .action-btn:hover { transform: translateY(-1px); }
        .action-btn svg { width: 18px; height: 18px; }
        .action-btn--dark {
            background: #f3f4f6;
            border-color: #d1d5db;
            color: #1f2937;
        }
        .action-btn--dark:hover {
            background: #e5e7eb;
            box-shadow: 0 10px 20px rgba(31,41,55,0.08);
        }
        .action-btn--group {
            background: #fff;
            border-color: #c7d2fe;
            color: #4338ca;
        }
        .action-btn--group:hover {
            background: #eef2ff;
            box-shadow: 0 10px 20px rgba(79,70,229,0.12);
        }
        .action-btn--share {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 10px 20px rgba(79,70,229,0.18);
        }
        .action-btn--share:hover {
            background: var(--primary-hover);
            box-shadow: 0 14px 26px rgba(79,70,229,0.22);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }

        /* Quiz Styles */
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #f3f4f6;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to right, #60a5fa, #4f46e5);
            transition: width 0.5s ease-out;
            width: 0%;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.05rem;
            background-color: white;
            color: var(--text-main);
        }
        
        /* Option Colors (simulating the array logic) */
        .opt-0 { background-color: #fdf2f8; border-color: #fce7f3; } /* Pink */
        .opt-0:hover { background-color: #fce7f3; border-color: #f9a8d4; }
        .opt-0.selected { background-color: #fce7f3; border-color: #ec4899; box-shadow: 0 4px 6px rgba(236, 72, 153, 0.1); }

        .opt-1 { background-color: #eff6ff; border-color: #dbeafe; } /* Blue */
        .opt-1:hover { background-color: #dbeafe; border-color: #93c5fd; }
        .opt-1.selected { background-color: #dbeafe; border-color: #3b82f6; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.1); }

        .opt-2 { background-color: #f0fdf4; border-color: #dcfce7; } /* Green */
        .opt-2:hover { background-color: #dcfce7; border-color: #86efac; }
        .opt-2.selected { background-color: #dcfce7; border-color: #22c55e; box-shadow: 0 4px 6px rgba(34, 197, 94, 0.1); }
        
        .opt-3 { background-color: #fefce8; border-color: #fef9c3; } /* Yellow */
        .opt-3:hover { background-color: #fef9c3; border-color: #fde047; }
        .opt-3.selected { background-color: #fef9c3; border-color: #eab308; box-shadow: 0 4px 6px rgba(234, 179, 8, 0.1); }

        .opt-4 { background-color: #faf5ff; border-color: #f3e8ff; } /* Purple */
        .opt-4:hover { background-color: #f3e8ff; border-color: #d8b4fe; }
        .opt-4.selected { background-color: #f3e8ff; border-color: #a855f7; box-shadow: 0 4px 6px rgba(168, 85, 247, 0.1); }

        .opt-5 { background-color: #fff7ed; border-color: #ffedd5; } /* Orange */
        .opt-5:hover { background-color: #ffedd5; border-color: #fdba74; }
        .opt-5.selected { background-color: #ffedd5; border-color: #f97316; box-shadow: 0 4px 6px rgba(249, 115, 22, 0.1); }

        .option-index {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .option-btn.selected .option-index { background: white; color: black; }

        /* Loading View */
        .loader-icon {
            width: 64px; height: 64px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* Results View */
        .result-primary-card {
            background-color: white;
            border-radius: 24px;
            overflow: hidden;
            border: 4px solid #eef2ff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
        }
        .result-header {
            background: linear-gradient(to right, #3b82f6, #4f46e5);
            padding: 40px 20px;
            color: white;
            text-align: center;
            position: relative;
        }
        .result-header-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 20px 20px;
            opacity: 0.3;
        }
        .result-content { padding: 32px; }
        
        .tag {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin: 4px;
        }
        .tag-trait { background-color: #f3f4f6; color: #4b5563; }
        .tag-keyword { background-color: #dbeafe; color: #1e40af; }

        /* Other Cities Grid */
        .other-cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .mini-card {
            background: white;
            border: 1px solid #f3f4f6;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .mini-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #c7d2fe;
        }
        .match-badge {
            position: absolute; top: 10px; left: 10px;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: bold;
        }
        .badge-high { background: #dcfce7; color: #15803d; }
        .badge-medium { background: #fef9c3; color: #a16207; }
        .badge-low { background: #f3f4f6; color: #4b5563; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white;
            width: 90%; max-width: 500px;
            border-radius: 24px;
            padding: 32px;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .close-btn {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none; cursor: pointer;
            color: #9ca3af;
        }
        .close-btn:hover { color: #4b5563; }

        /* Icon SVG helper class */
        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .icon-lg { width: 80px; height: 80px; }
        .icon-md { width: 48px; height: 48px; }

    </style>
<script type="importmap">

<body>

    <div class="container" id="app">
        
        <!-- Landing View -->
        <div id="landing-view" class="fade-in">
            <div class="nav-actions">
                <a href="../index.html" class="nav-actions__btn nav-actions__btn--primary">返回测试合集首页</a>
            </div>
            <div class="text-center" style="margin-bottom: 30px;">
                <div style="position: relative; display: inline-block; margin-bottom: 20px;">
                    <div style="position: absolute; inset: 0; background-color: #60a5fa; filter: blur(40px); opacity: 0.3; border-radius: 50%; animation: float 4s ease-in-out infinite;"></div>
                    <svg class="icon icon-lg animate-float" style="color: var(--primary-color); position: relative; z-index: 10;" viewBox="0 0 24 24"><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/><circle cx="12" cy="10" r="3"/><path d="M12 21.7v-2"/></svg>
                </div>
                
                <h1 class="text-gradient">你的性格<br>天选CP城市<br><span style="color: var(--text-main); font-size: 0.8em;">是哪座？</span></h1>
            </div>

            <div class="glass-card text-center mb-8" style="border-top: 4px solid var(--primary-color);">
                <p style="font-size: 1.1rem; margin-bottom: 24px;">
                    在快节奏的生活里，总有一座城市与你的灵魂同频。<br>
                    可能是杭州的烟雨画桥，也可能是成都的巴适午后。<br>
                    <span style="font-weight: bold; color: var(--text-main);">27道精选题目，AI智能算法匹配。</span>
                </p>

                <div class="flex justify-between gap-2" style="margin-top: 30px;">
                    <div class="text-center" style="flex: 1; background: #eff6ff; padding: 15px; border-radius: 12px;">
                        <svg class="icon" style="color: #2563eb; margin-bottom: 5px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <div style="font-weight: bold;">5分钟</div>
                        <div style="font-size: 0.8rem; color: #6b7280;">轻松完成</div>
                    </div>
                    <div class="text-center" style="flex: 1; background: #eef2ff; padding: 15px; border-radius: 12px;">
                        <svg class="icon" style="color: #4f46e5; margin-bottom: 5px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        <div style="font-weight: bold;">16座城市</div>
                        <div style="font-size: 0.8rem; color: #6b7280;">深度匹配</div>
                    </div>
                    <div class="text-center" style="flex: 1; background: #faf5ff; padding: 15px; border-radius: 12px;">
                        <svg class="icon" style="color: #9333ea; margin-bottom: 5px;" viewBox="0 0 24 24"><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/><circle cx="12" cy="10" r="3"/></svg>
                        <div style="font-weight: bold;">六维性格</div>
                        <div style="font-size: 0.8rem; color: #6b7280;">精准分析</div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button id="start-btn" class="btn">
                    开始探索
                    <svg class="icon" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="glass-card hidden fade-in">
            <div class="mb-6">
                <div class="flex justify-between mb-2" style="font-size: 0.9rem; font-weight: 600; color: #6b7280;">
                    <span>进度</span>
                    <span id="progress-text">1 / 27</span>

                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>

            </div>

            <h2 id="question-text" style="font-size: 1.4rem; color: #1f2937; margin-bottom: 24px; line-height: 1.4;">
                <span style="color: var(--primary-color); margin-right: 8px;">Q1.</span> 题目加载中...
            </h2>

            <div id="options-container">

            </div>

            <div class="flex justify-between mt-8">
                <button id="prev-btn" class="btn btn-secondary" disabled>
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> 上一题
                </button>

            </div>
        </div>

        <!-- Loading View -->
        <div id="loading-view" class="glass-card hidden fade-in text-center" style="min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center;">

                <div style="position: absolute; inset: 0; background-color: #3b82f6; filter: blur(20px); opacity: 0.2; border-radius: 50%;"></div>

            </div>

        <!-- Results View -->

            <div id="primary-result" class="result-primary-card" data-auth-basic="true">

            <div class="text-center" style="margin-top: 40px;">

                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        加入测试交流群

                    <button id="share-btn" type="button" class="action-btn action-btn--share">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                            <path d="M12 16V4"></path>
                            <path d="M7 9l5-5 5 5"></path>
                        </svg>
                        分享结果
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">

        // --- FUNCTIONS ---
        function setFullReportVisible(isVisible) {
            if (ui.fullReport) {
                ui.fullReport.style.display = isVisible ? 'block' : 'none';
            }
            if (ui.unlockCard) {
                ui.unlockCard.style.display = isVisible ? 'none' : 'block';
            }
        }

        function unlockFullReport() {
            if (authState.unlocked) return;
            authState.unlocked = true;
            setFullReportVisible(true);
        }

        async function resolveApiBase() {
            try {
                const res = await fetch('/config/app-config.json', { cache: 'no-store' });
                if (res.ok) {
                    const cfg = await res.json();
                    if (cfg && cfg.apiBase) {
                        return String(cfg.apiBase).trim();
                    }
                }
            } catch (err) {
                console.warn('无法读取 app-config.json，将使用当前域名:', err);
            }
            return window.location.origin;
        }

        async function setupAuthGate() {
            if (!window.AuthorizationSDK || !ui.unlockButton) {
                return;
            }
            if (!authState.controller) {
                const apiBase = await resolveApiBase();
                authState.controller = await AuthorizationSDK.init({
                    testType: 'xgcs',
                    apiBase,
                    startButtons: ['#unlock-btn'],
                    onAuthorized: unlockFullReport,
                    authContext: 'result'
                });
            }
            const config = authState.controller?.state?.config;
            if (config && config.auth_required === 0) {
                unlockFullReport();
                return;
            }
            const mode = (config && config.auth_mode) ? String(config.auth_mode).toLowerCase() : 'start';
            if (mode !== 'result') {
                unlockFullReport();
                return;
            }
            if (authState.controller.isSessionActive()) {
                unlockFullReport();
            }
        }

        function switchView(viewName) {
            // Hide all
            Object.values(views).forEach(el => el.classList.add('hidden'));
            // Show target
            views[viewName].classList.remove('hidden');
            state.view = viewName;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (viewName === 'results') {
                setFullReportVisible(authState.unlocked);
                setupAuthGate();
            }
        }

        function startQuiz() {
            state.currentQuestionIndex = 0;
            state.answers = [];
            renderQuestion();
            switchView('quiz');
        }

        function renderQuestion() {
            const question = QUESTIONS[state.currentQuestionIndex];
            const progressPercent = ((state.currentQuestionIndex + 1) / QUESTIONS.length) * 100;
            
            ui.progressText.innerText = `${state.currentQuestionIndex + 1} / ${QUESTIONS.length}`;
            ui.progressFill.style.width = `${progressPercent}%`;
            
            ui.questionText.innerHTML = `<span style="color: var(--primary-color); margin-right: 8px;">Q${state.currentQuestionIndex + 1}.</span> ${question.text}`;
            
            ui.optionsContainer.innerHTML = '';
            
            question.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                // Cycle through option styles (0-5)
                const styleIndex = idx % 6;
                btn.className = `option-btn opt-${styleIndex}`;
                
                const isSelected = state.answers[state.currentQuestionIndex] === idx;
                if (isSelected) btn.classList.add('selected');

                const letter = String.fromCharCode(65 + idx);
                
                btn.innerHTML = `
                    <div class="flex items-center">
                        <span class="option-index">${letter}</span>
                        <span style="font-weight: 500;">${opt}</span>
                    </div>
                    ${isSelected ? '<svg class="icon" style="color: var(--primary-color);" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                `;
                
                btn.onclick = () => handleAnswer(idx);
                ui.optionsContainer.appendChild(btn);
            });

            // Update Prev Button
            ui.prevBtn.disabled = state.currentQuestionIndex === 0;
            ui.prevBtn.onclick = () => {
                if (state.currentQuestionIndex > 0) {
                    state.currentQuestionIndex--;
                    renderQuestion();
                }
            };
        }

        function handleAnswer(optionIndex) {
            // Save answer
            state.answers[state.currentQuestionIndex] = optionIndex;
            
            // Re-render to show selection state immediately
            renderQuestion();

            // Delay for UX
            setTimeout(() => {
                if (state.currentQuestionIndex < QUESTIONS.length - 1) {
                    state.currentQuestionIndex++;
                    renderQuestion();
                } else {
                    finishQuiz();
                }
            }, 300);
        }

        function finishQuiz() {
            switchView('loading');
            setTimeout(() => {
                calculateAndShowResults();
            }, 2500);
        }

        function calculateAndShowResults() {
            // 1. Calculate Personality Scores
            const scores = {
                [PersonalityType.FIGHT]: 0,
                [PersonalityType.LAZY]: 0,
                [PersonalityType.ART]: 0,
                [PersonalityType.NATURE]: 0,
                [PersonalityType.SOCIAL]: 0,
                [PersonalityType.FASHION]: 0
            };

            state.answers.forEach((optIdx, qIdx) => {
                const q = QUESTIONS[qIdx];
                const type = q.optionTypes[optIdx];
                if (type) scores[type]++;
            });

            // Sort traits high to low
            const userTraitPriority = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .map(entry => entry[0]);

            // 2. Score Cities
            const scoredCities = CITIES.map(city => {
                let matchScore = 0;
                const matchedTraits = [];

                userTraitPriority.forEach((trait, index) => {
                    if (city.personalityTypes.includes(trait)) {
                        // Weighted match: Top user trait matters more
                        const priorityWeight = 100 - (index * 15);
                        matchScore += priorityWeight;
                        matchedTraits.push(trait);
                    }
                });

                // Bonus logic from original
                const baseScore = 30;
                let matchBonus = 0;
                if (matchedTraits.length > 0) {
                    if (matchedTraits.length >= Math.min(3, userTraitPriority.length)) matchBonus = 40;
                    else if (matchedTraits.length >= 2) matchBonus = 25;
                    else matchBonus = 10;

                    if (matchedTraits.includes(userTraitPriority[0])) matchBonus += 20;
                    if (matchedTraits.length >= 2 && matchedTraits.includes(userTraitPriority[1])) matchBonus += 10;
                }

                let finalScore = baseScore + matchScore / 10 + matchBonus;
                finalScore = Math.max(30, Math.round(finalScore));

                return {
                    ...city,
                    originalScore: finalScore,
                    matchedTraits
                };
            });

            // Sort by score
            scoredCities.sort((a, b) => b.originalScore - a.originalScore);

            // Winner
            const maxScore = scoredCities[0].originalScore;
            const topCandidates = scoredCities.filter(c => c.originalScore === maxScore);
            const winner = topCandidates[Math.floor(Math.random() * topCandidates.length)];

            // Normalize scores for display (adding some randomness for flavor)
            const displayMax = 85;
            const displayMin = 60;
            
            const processedCities = scoredCities.map(city => {
                let displayScore = 0;
                if (city.city === winner.city) {
                    displayScore = Math.min(99, Math.max(75, 75 + (Math.random() * 10 - 5)));
                    if (city.matchedTraits.length >= 3) displayScore += 3;
                } else {
                    const ratio = (city.originalScore - 30) / (winner.originalScore - 30 || 1);
                    displayScore = displayMin + ratio * (displayMax - displayMin - 10);
                    displayScore += (Math.random() * 10 - 5);
                }
                
                return {
                    ...city,
                    matchScore: Math.round(displayScore)
                };
            });

            // Determine levels for others
            const others = processedCities.filter(c => c.city !== winner.city).slice(0, 6);
            const otherScores = others.map(c => c.originalScore);
            const uniqueScores = Array.from(new Set(otherScores)).sort((a, b) => b - a);

            const finalizedOthers = others.map(city => {
                const rankIndex = uniqueScores.indexOf(city.originalScore);
                let level = 'low';
                if (uniqueScores.length === 1) level = 'medium';
                else if (uniqueScores.length === 2) level = rankIndex === 0 ? 'high' : 'low';
                else {
                    const p = rankIndex / (uniqueScores.length - 1);
                    if (p < 0.3) level = 'high';
                    else if (p < 0.7) level = 'medium';
                }
                return { ...city, matchLevel: level };
            });

            const finalizedWinner = processedCities.find(c => c.city === winner.city);

            authState.unlocked = false;
            setFullReportVisible(false);
            renderResults(finalizedWinner, finalizedOthers);
            switchView('results');
        }

                let badgeClass = 'badge-low';
                let badgeText = '一般匹配';
                if (city.matchLevel === 'high') { badgeClass = 'badge-high'; badgeText = '高匹配度'; }
                if (city.matchLevel === 'medium') { badgeClass = 'badge-medium'; badgeText = '中匹配度'; }

                card.innerHTML = `
                    <div class="match-badge ${badgeClass}">${badgeText}</div>
                    <h3 style="margin-top: 15px; margin-bottom: 10px; font-size: 1.25rem;">${city.city}</h3>
                    <div class="mb-4">
                         ${city.personalityTypes.slice(0, 2).map(t => `<span style="font-size: 0.75rem; background: #f3f4f6; color: #6b7280; padding: 2px 6px; border-radius: 4px; margin: 2px;">${t}</span>`).join('')}
                    </div>
                    <div>
                        ${city.keywords.slice(0, 2).map(k => `<span style="font-size: 0.75rem; color: #3b82f6; margin: 2px;">#${k}</span>`).join('')}
                    </div>
                `;
                ui.otherResults.appendChild(card);
            });
        }

        function showDetail(city) {
            ui.modalBody.innerHTML = `
                <div class="text-center mb-6">
                    <h2 style="font-size: 2rem; color: #1f2937; margin-bottom: 5px;">${city.city}</h2>
                    <span style="color: var(--primary-color); font-weight: bold; font-size: 1.2rem;">匹配度 ${city.matchScore}%</span>
                </div>
                <div class="text-center mb-6">
                     ${city.keywords.map(k => `<span class="tag tag-keyword">#${k}</span>`).join('')}
                </div>
                <p style="text-align: justify; font-size: 1.05rem; line-height: 1.8;">
                    ${city.analysis}
                </p>
            `;
            ui.detailModal.classList.add('active');
        }

        function closeModal() {
            ui.detailModal.classList.remove('active');
        }

        function shareResult() {
            const city = state.latestWinnerCity || "未知";
            const score = typeof state.latestMatchScore === "number" ? state.latestMatchScore : null;
            const title = "城市性格匹配测试结果";
            const text = score === null
                ? `我的性格天选之城是「${city}」！你也来测测吧～`
                : `我的性格天选之城是「${city}」（匹配度 ${score}%）！你也来测测吧～`;
            if (navigator.share) {
                navigator.share({ title, text, url: window.location.href }).catch(() => {});
            } else {
                alert("截屏即可分享结果给朋友哦！");
            }
        }

        // --- EVENT LISTENERS ---
        document.getElementById('start-btn').onclick = () => {
            if (window.AuthorizationSDK) return;
            startQuiz();
        };
        document.getElementById('retake-btn').onclick = () => {
            switchView('landing');
        };
        document.getElementById('share-btn').onclick = shareResult;
        
        // Close modal when clicking outside
        ui.detailModal.onclick = (e) => {
            if (e.target === ui.detailModal) closeModal();
        };

    </script>
    <script>
        window.startXgcsFlow = function () {
            startQuiz();
        };
    </script>
    <script
      src="../authorization/authorization-sdk.js"
      data-test-type="xgcs"
      data-auth-context="start"
      data-start-button="#start-btn"
      data-on-authorized="startXgcsFlow">
    </script>
    <script src="../static/theme/visual-refresh.js" defer></script>
</body>

</html>
