<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- T型槽加工方法示意图 -->
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">T型槽加工方法</text>
  
  <!-- 步骤1: 划线 -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="120" height="100" fill="#ecf0f1" stroke="#3498db" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#3498db">步骤1: 划线</text>
    <!-- 毛坯 -->
    <rect x="20" y="35" width="80" height="40" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <!-- 划线 -->
    <line x1="60" y1="35" x2="60" y2="75" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="60" y="88" font-size="9" text-anchor="middle" fill="#333">定位基准</text>
  </g>
  
  <!-- 步骤2: 小铣刀开槽 -->
  <g transform="translate(170, 50)">
    <rect x="0" y="0" width="120" height="100" fill="#ecf0f1" stroke="#e67e22" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#e67e22">步骤2: 小铣刀</text>
    <!-- 毛坯 -->
    <rect x="20" y="30" width="80" height="50" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <!-- 小铣刀 -->
    <rect x="50" y="35" width="20" height="30" fill="#27ae60"/>
    <text x="60" y="30" font-size="8" fill="#27ae60">小铣刀</text>
    <!-- 切削 -->
    <rect x="40" y="65" width="40" height="10" fill="#e74c3c" opacity="0.7"/>
    <text x="60" y="88" font-size="9" text-anchor="middle" fill="#333">开槽(预留余量)</text>
  </g>
  
  <!-- 步骤3: 等宽铣刀扩槽 -->
  <g transform="translate(310, 50)">
    <rect x="0" y="0" width="120" height="100" fill="#ecf0f1" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#27ae60">步骤3: 立铣刀</text>
    <!-- 毛坯 -->
    <rect x="20" y="25" width="80" height="55" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <!-- 立铣刀 -->
    <rect x="40" y="30" width="40" height="25" fill="#27ae60"/>
    <text x="60" y="25" font-size="8" fill="#27ae60">立铣刀</text>
    <!-- 直槽 -->
    <rect x="25" y="55" width="70" height="20" fill="#e74c3c" opacity="0.7"/>
    <text x="60" y="88" font-size="9" text-anchor="middle" fill="#333">铣直槽</text>
  </g>
  
  <!-- 步骤4: T型铣刀成型 -->
  <g transform="translate(450, 50)">
    <rect x="0" y="0" width="120" height="100" fill="#ecf0f1" stroke="#9b59b6" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#9b59b6">步骤4: T型铣刀</text>
    <!-- 毛坯 -->
    <rect x="20" y="20" width="80" height="60" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <!-- T型槽 -->
    <path d="M25,45 L95,45 L95,55 L60,55 L60,75 L40,75 L40,55 L25,55 Z" fill="#e74c3c" opacity="0.8"/>
    <text x="60" y="88" font-size="9" text-anchor="middle" fill="#333">T型槽完成</text>
  </g>
  
  <!-- T型槽截面图 -->
  <g transform="translate(150, 170)">
    <text x="150" y="0" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">T型槽截面图</text>
    <!-- 立体图 -->
    <path d="M50,20 L250,20 L250,80 L50,80 Z" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <!-- T型槽 -->
    <path d="M80,20 L220,20 L220,45 L150,45 L150,80 L120,80 L120,45 L80,45 Z" fill="#e74c3c" opacity="0.7" stroke="#c0392b" stroke-width="2"/>
    
    <!-- 尺寸标注 -->
    <line x1="80" y1="10" x2="220" y2="10" stroke="#333" stroke-width="1"/>
    <line x1="80" y1="8" x2="80" y2="12" stroke="#333" stroke-width="1"/>
    <line x1="220" y1="8" x2="220" y2="12" stroke="#333" stroke-width="1"/>
    <text x="150" y="8" font-size="9" text-anchor="middle" fill="#333">开口宽度</text>
    
    <line x1="120" y1="45" x2="120" y2="65" stroke="#333" stroke-width="1"/>
    <line x1="118" y1="45" x2="122" y2="45" stroke="#333" stroke-width="1"/>
    <line x1="118" y1="65" x2="122" y2="65" stroke="#333" stroke-width="1"/>
    <text x="110" y="58" font-size="8" text-anchor="middle" fill="#333" transform="rotate(-90, 110, 58)">底宽</text>
    
    <line x1="230" y1="20" x2="250" y2="20" stroke="#333" stroke-width="1"/>
    <line x1="230" y1="18" x2="230" y2="22" stroke="#333" stroke-width="1"/>
    <line x1="250" y1="18" x2="250" y2="22" stroke="#333" stroke-width="1"/>
    <text x="240" y="15" font-size="8" text-anchor="middle" fill="#333">槽深</text>
  </g>
  
  <!-- 刀具选择说明 -->
  <g transform="translate(30, 300)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#2c3e50">刀具选择要点:</text>
    <text x="0" y="20" font-size="9" fill="#333">• 先用小直径铣刀开槽 → 预留余量</text>
    <text x="0" y="35" font-size="9" fill="#333">• 再用立铣刀铣直槽 → 保证开口尺寸</text>
    <text x="0" y="50" font-size="9" fill="#333">• 最后用T型铣刀 → 成型底部</text>
    <text x="0" y="65" font-size="9" fill="#e74c3c" font-weight="bold">核心: 上宽下窄，分步成型</text>
  </g>
</svg>
