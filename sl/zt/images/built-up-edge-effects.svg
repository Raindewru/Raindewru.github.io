<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <defs>
    <style>
      .t{font:700 20px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .p{font:13px system-ui,Segoe UI,Arial;fill:#1f2937}
      .h{font:700 14px system-ui,Segoe UI,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect x="20" y="20" width="780" height="340" rx="16" fill="#fff" stroke="#e5e7eb"/>
  <text x="410" y="48" class="t" text-anchor="middle">积屑瘤：形成与影响</text>

  <g transform="translate(60,70)">
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#f3f4f6" stroke="#cbd5e1"/>
    <text x="160" y="28" class="h" text-anchor="middle">形成条件</text>
    <g transform="translate(20,54)">
      <rect x="0" y="0" width="280" height="36" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <text x="18" y="24" class="p">切削速度不高</text>
    </g>
    <g transform="translate(20,100)">
      <rect x="0" y="0" width="280" height="36" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <text x="18" y="24" class="p">连续切削、摩擦冷焊</text>
    </g>
    <g transform="translate(20,146)">
      <rect x="0" y="0" width="280" height="36" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <text x="18" y="24" class="p">前刀面三角状硬块</text>
    </g>
  </g>

  <g transform="translate(440,70)">
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#e0f2fe" stroke="#93c5fd"/>
    <text x="160" y="28" class="h" text-anchor="middle">影响</text>
    <g transform="translate(20,54)">
      <rect x="0" y="0" width="280" height="36" rx="8" fill="#fff" stroke="#93c5fd"/>
      <text x="18" y="24" class="p">前角↑ 切削力↓（利）</text>
    </g>
    <g transform="translate(20,100)">
      <rect x="0" y="0" width="280" height="36" rx="8" fill="#fff" stroke="#93c5fd"/>
      <text x="18" y="24" class="p">表面粗糙度↑ 尺寸波动（弊）</text>
    </g>
    <g transform="translate(20,146)">
      <rect x="0" y="0" width="280" height="36" rx="8" fill="#fff" stroke="#93c5fd"/>
      <text x="18" y="24" class="p">精加工不利</text>
    </g>
  </g>

  <g transform="translate(300,320)">
    <rect x="-120" y="-18" width="240" height="36" rx="18" fill="#10b981"/>
    <text x="0" y="6" class="h" fill="#fff" text-anchor="middle">控制：速度/前角/切削液</text>
  </g>
</svg>
