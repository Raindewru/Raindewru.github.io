<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- 积屑瘤示意图 -->
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">积屑瘤</text>
  
  <!-- 主图 -->
  <g transform="translate(50, 50)">
    <!-- 刀具前刀面 -->
    <path d="M0,100 L150,80 L150,200 L0,180 Z" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <text x="75" y="150" font-size="11" text-anchor="middle" fill="white" transform="rotate(-8, 75, 150)">刀具前刀面</text>
    
    <!-- 工件 -->
    <path d="M150,50 L300,50 L300,180 L150,150 Z" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="225" y="115" font-size="11" text-anchor="middle" fill="white">工件</text>
    
    <!-- 积屑瘤 -->
    <path d="M120,85 Q140,60 160,85 Q170,100 150,110 Q130,115 120,100 Z" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
    <text x="145" y="75" font-size="10" font-weight="bold" text-anchor="middle" fill="#92400e">积屑瘤</text>
    <text x="145" y="130" font-size="9" text-anchor="middle" fill="#333">(粘结的金属块)</text>
    
    <!-- 切削方向 -->
    <path d="M150,40 L200,40" fill="none" stroke="#27ae60" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="175" y="30" font-size="9" fill="#27ae60">切削方向</text>
  </g>
  
  <!-- 形成条件 -->
  <g transform="translate(380, 50)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#2c3e50">形成条件:</text>
    <rect x="0" y="15" width="180" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5"/>
    <text x="15" y="40" font-size="10" fill="#78350f">• 切削速度不高</text>
    <text x="15" y="60" font-size="10" fill="#78350f">• 能形成连续切削</text>
    <text x="15" y="80" font-size="10" fill="#78350f">• 适合的温度和压力</text>
  </g>
  
  <!-- 特点 -->
  <g transform="translate(380, 160)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#2c3e50">特点:</text>
    <rect x="0" y="15" width="180" height="90" fill="#dcfce7" stroke="#22c55e" stroke-width="1" rx="5"/>
    <text x="15" y="40" font-size="10" fill="#166534">• 形状: 前面呈三角状</text>
    <text x="15" y="60" font-size="10" fill="#166534">• 位置: 粘附在前刀面</text>
    <text x="15" y="80" font-size="10" fill="#166534">• 作用: 可代替切削刃</text>
    <text x="15" y="95" font-size="10" fill="#166534">• 本质: 冷焊的金属块</text>
  </g>
  
  <!-- 积屑瘤结构标注 -->
  <g transform="translate(250, 200)">
    <line x1="0" y1="0" x2="30" y2="-30" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="30" cy="-30" r="3" fill="#f59e0b"/>
    <text x="35" y="-25" font-size="9" fill="#92400e">积屑瘤(冷焊金属)</text>
    
    <line x1="80" y1="10" x2="100" y2="-10" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="100" cy="-10" r="3" fill="#e74c3c"/>
    <text x="105" y="-5" font-size="9" fill="#991b1b">切削层</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>
