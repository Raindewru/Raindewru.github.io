<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <defs>
    <style>
      .t{font:700 20px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .p{font:13px system-ui,Segoe UI,Arial;fill:#1f2937}
      .h{font:700 14px system-ui,Segoe UI,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect x="20" y="20" width="820" height="380" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="430" y="48" class="t" text-anchor="middle">2023 选择题速记卡</text>
  <g transform="translate(50,70)">
    <rect x="0" y="0" width="760" height="300" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="760" height="36" fill="#e2e8f0"/>
      <text x="24" y="24" class="h">题目</text>
      <text x="310" y="24" class="h">答案</text>
      <text x="380" y="24" class="h">关键词</text>
      <text x="620" y="24" class="h">记忆提示</text>
    </g>
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="760" height="40" fill="#fff"/>
      <text x="24" y="24" class="p">1. 生产类型决定因素</text>
      <text x="310" y="24" class="p" fill="#059669">A</text>
      <text x="380" y="24" class="p">生产纲领</text>
      <text x="620" y="24" class="p">纲领=产量计划</text>
    </g>
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="760" height="40" fill="#f9fafb"/>
      <text x="24" y="24" class="p">2. 增环↑封闭环？</text>
      <text x="310" y="24" class="p" fill="#059669">A</text>
      <text x="380" y="24" class="p">变大</text>
      <text x="620" y="24" class="p">TF=ΣTi</text>
    </g>
    <g transform="translate(0,120)">
      <rect x="0" y="0" width="760" height="40" fill="#fff"/>
      <text x="24" y="24" class="p">5. 误差复映系数</text>
      <text x="310" y="24" class="p" fill="#ef4444">C</text>
      <text x="380" y="24" class="p">≪1</text>
      <text x="620" y="24" class="p">刚度↑ → ε↓</text>
    </g>
    <g transform="translate(0,160)">
      <rect x="0" y="0" width="760" height="40" fill="#f9fafb"/>
      <text x="24" y="24" class="p">6. 脆性材料切屑</text>
      <text x="310" y="24" class="p" fill="#059669">D</text>
      <text x="380" y="24" class="p">崩碎</text>
      <text x="620" y="24" class="p">脆→断裂</text>
    </g>
    <g transform="translate(0,200)">
      <rect x="0" y="0" width="760" height="40" fill="#fff"/>
      <text x="24" y="24" class="p">7. 主偏角↓ 切屑宽？</text>
      <text x="310" y="24" class="p" fill="#059669">C</text>
      <text x="380" y="24" class="p">变宽</text>
      <text x="620" y="24" class="p">κr↓ → b↑</text>
    </g>
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="760" height="40" fill="#f9fafb"/>
      <text x="24" y="24" class="p">8. 调头继续车削</text>
      <text x="310" y="24" class="p" fill="#059669">C</text>
      <text x="380" y="24" class="p">变安装</text>
      <text x="620" y="24" class="p">新装夹</text>
    </g>
    <g transform="translate(0,280)">
      <rect x="0" y="0" width="760" height="40" fill="#fff"/>
      <text x="24" y="24" class="p">10. 安装次数↑ → ？</text>
      <text x="310" y="24" class="p" fill="#ef4444">B</text>
      <text x="380" y="24" class="p">精度/效率↓</text>
      <text x="620" y="24" class="p">误差累积</text>
    </g>
  </g>
</svg>
