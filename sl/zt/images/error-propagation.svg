<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <!-- 误差复映原理图 -->
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">误差复映原理</text>
  
  <!-- 因果链流程图 -->
  <g transform="translate(50, 60)">
    <!-- 第1步: 毛坯误差 -->
    <rect x="0" y="0" width="130" height="70" fill="#fca5a5" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="65" y="25" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">毛坯误差</text>
    <text x="65" y="45" font-size="9" text-anchor="middle" fill="#7f1d1d">余量不均</text>
    <text x="65" y="57" font-size="9" text-anchor="middle" fill="#7f1d1d">硬度变化</text>
    
    <!-- 箭头1 -->
    <path d="M130,35 L170,35" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- 第2步: 切削力变化 -->
    <rect x="170" y="0" width="130" height="70" fill="#fef08a" stroke="#eab308" stroke-width="2" rx="8"/>
    <text x="235" y="25" font-size="11" font-weight="bold" text-anchor="middle" fill="#854d0e">切削力变化</text>
    <text x="235" y="45" font-size="9" text-anchor="middle" fill="#713f12">加工余量变化</text>
    <text x="235" y="57" font-size="9" text-anchor="middle" fill="#713f12">→ 切削力波动</text>
    
    <!-- 箭头2 -->
    <path d="M300,35 L340,35" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- 第3步: 工艺系统变形 -->
    <rect x="340" y="0" width="130" height="70" fill="#c4b5fd" stroke="#8b5cf6" stroke-width="2" rx="8"/>
    <text x="405" y="25" font-size="11" font-weight="bold" text-anchor="middle" fill="#5b21b6">工艺系统变形</text>
    <text x="405" y="45" font-size="9" text-anchor="middle" fill="#4c1d95">受力不均</text>
    <text x="405" y="57" font-size="9" text-anchor="middle" fill="#4c1d95">→ 弹性变形</text>
    
    <!-- 箭头3 -->
    <path d="M470,35 L510,35" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- 第4步: 工件误差 -->
    <rect x="510" y="0" width="80" height="70" fill="#f472b6" stroke="#ec4899" stroke-width="2" rx="8"/>
    <text x="550" y="35" font-size="11" font-weight="bold" text-anchor="middle" fill="#9d174d">工件误差</text>
    <text x="550" y="52" font-size="9" text-anchor="middle" fill="#831843">复映</text>
  </g>
  
  <!-- 避免方法 -->
  <g transform="translate(150, 170)">
    <rect x="0" y="0" width="300" height="60" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="150" y="22" font-size="12" font-weight="bold" text-anchor="middle" fill="#166534">避免方法</text>
    <text x="150" y="45" font-size="11" text-anchor="middle" fill="#15803d">提高工艺系统刚度 → 减小弹性变形 → 减少误差复映</text>
  </g>
  
  <!-- 图示说明 -->
  <g transform="translate(50, 260)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#2c3e50">误差复映演示:</text>
    
    <!-- 毛坯示意 -->
    <g transform="translate(20, 20)">
      <text x="40" y="0" font-size="9" text-anchor="middle" fill="#333">毛坯(余量不均)</text>
      <path d="M0,30 Q20,10 40,30 Q60,50 80,30" fill="none" stroke="#ef4444" stroke-width="2"/>
      <path d="M0,50 Q20,30 40,50 Q60,70 80,50" fill="none" stroke="#ef4444" stroke-width="2"/>
    </g>
    
    <!-- 刀具示意 -->
    <g transform="translate(120, 30)">
      <rect x="0" y="0" width="40" height="25" fill="#7f8c8d"/>
      <text x="20" y="40" font-size="8" text-anchor="middle" fill="#333">刀具</text>
      <!-- 运动 -->
      <path d="M20,25 L20,55" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    
    <!-- 加工后工件 -->
    <g transform="translate(200, 20)">
      <text x="40" y="0" font-size="9" text-anchor="middle" fill="#333">加工后(误差复映)</text>
      <path d="M0,30 Q20,15 40,30 Q60,45 80,30" fill="none" stroke="#ec4899" stroke-width="2"/>
      <path d="M0,50 Q20,35 40,50 Q60,65 80,50" fill="none" stroke="#ec4899" stroke-width="2"/>
    </g>
    
    <!-- 关键概念 -->
    <g transform="translate(350, 25)">
      <rect x="0" y="0" width="120" height="55" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="4"/>
      <text x="60" y="18" font-size="9" font-weight="bold" text-anchor="middle" fill="#374151">关键要点</text>
      <text x="10" y="35" font-size="8" fill="#4b5563">• 毛坯误差</text>
      <text x="10" y="48" font-size="8" fill="#4b5563">• 系统变形</text>
    </g>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>
</svg>
