<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <rect x="0" y="0" width="820" height="420" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="410" y="28" font-size="18" font-weight="700" text-anchor="middle" fill="#0b1e33">误差复映 · 因果链与避免方法</text>

  <!-- 因果链：横向四步，留足垂直间距 -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="160" height="80" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="80" y="28" font-size="13" font-weight="700" text-anchor="middle" fill="#991b1b">毛坯误差</text>
    <text x="80" y="50" font-size="11" text-anchor="middle" fill="#7f1d1d">余量不均 / 硬度变化</text>

    <path d="M160,40 L210,40" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="210" y="0" width="170" height="80" fill="#fef08a" stroke="#f59e0b" stroke-width="2" rx="10"/>
    <text x="295" y="28" font-size="13" font-weight="700" text-anchor="middle" fill="#854d0e">切削力变化</text>
    <text x="295" y="50" font-size="11" text-anchor="middle" fill="#713f12">F 随余量/硬度波动</text>

    <path d="M380,40 L430,40" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="430" y="0" width="180" height="80" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="10"/>
    <text x="520" y="28" font-size="13" font-weight="700" text-anchor="middle" fill="#5b21b6">工艺系统受力变形</text>
    <text x="520" y="50" font-size="11" text-anchor="middle" fill="#4c1d95">静/动刚度不足 → 位移/振动</text>

    <path d="M610,40 L660,40" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="660" y="0" width="110" height="80" fill="#fbcfe8" stroke="#ec4899" stroke-width="2" rx="10"/>
    <text x="715" y="30" font-size="13" font-weight="700" text-anchor="middle" fill="#9d174d">工件误差</text>
    <text x="715" y="52" font-size="11" text-anchor="middle" fill="#9d174d">尺寸 / 形状复映</text>
  </g>

  <!-- 避免方法：放在单独面板，增大高度防止遮挡 -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="720" height="110" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="10"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#166534">避免方法</text>
    <text x="30" y="56" font-size="12" fill="#065f46">• 提高刚度：机床/夹具/刀杆刚度、缩短悬伸，抑制变形与振动</text>
    <text x="30" y="78" font-size="12" fill="#065f46">• 均匀条件：均匀余量、均匀硬度（热处理）；粗精分离，递减余量</text>
    <text x="30" y="100" font-size="12" fill="#065f46">• 工艺参数：优化切削用量与冷却方式，避免共振区</text>
  </g>

  <!-- 直观示意：与文字错位排布，避免重叠 -->
  <g transform="translate(50, 310)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#0b1e33">复映示意</text>
    <g transform="translate(0, 15)">
      <text x="40" y="-6" font-size="11" text-anchor="middle" fill="#374151">毛坯（余量不均）</text>
      <path d="M0,12 Q20,-8 40,12 Q60,32 80,12" fill="none" stroke="#ef4444" stroke-width="2"/>
      <path d="M0,32 Q20,12 40,32 Q60,52 80,32" fill="none" stroke="#ef4444" stroke-width="2"/>
    </g>
    <g transform="translate(160, 15)">
      <rect x="0" y="0" width="48" height="28" fill="#64748b"/>
      <text x="24" y="46" font-size="10" text-anchor="middle" fill="#374151">刀具</text>
      <path d="M24,28 L24,58" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(240, 15)">
      <text x="40" y="-6" font-size="11" text-anchor="middle" fill="#374151">加工后（复映）</text>
      <path d="M0,12 Q20,-2 40,12 Q60,26 80,12" fill="none" stroke="#ec4899" stroke-width="2"/>
      <path d="M0,32 Q20,18 40,32 Q60,46 80,32" fill="none" stroke="#ec4899" stroke-width="2"/>
    </g>
    <g transform="translate(360, -6)">
      <rect x="0" y="0" width="200" height="80" fill="#f8fafc" stroke="#e5e7eb" rx="8"/>
      <text x="100" y="22" font-size="12" font-weight="700" text-anchor="middle" fill="#0b1e33">要点提炼</text>
      <text x="12" y="44" font-size="11" fill="#334155">• 误差链：毛坯 → F → 系统位移 → 工件</text>
      <text x="12" y="64" font-size="11" fill="#334155">• 控制：刚度↑、余量/硬度均匀、参数优化</text>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
