<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <!-- 磨削、珩磨、研磨、抛光 对比图 -->
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>
  
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">磨削、珩磨、研磨、抛光对比</text>
  
  <!-- 磨削 -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="120" height="80" fill="#ecf0f1" stroke="#3498db" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="12" font-weight="bold" text-anchor="middle" fill="#3498db">磨削</text>
    <!-- 砂轮 -->
    <circle cx="60" cy="50" r="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
    <circle cx="60" cy="50" r="8" fill="#ecf0f1"/>
    <!-- 砂轮纹路 -->
    <line x1="40" y1="40" x2="50" y2="50" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="50" y1="35" x2="60" y2="45" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="70" y1="35" x2="80" y2="45" stroke="#7f8c8d" stroke-width="1"/>
    <!-- 工件 -->
    <rect x="45" y="70" width="30" height="8" fill="#e74c3c"/>
    <text x="60" y="95" font-size="9" text-anchor="middle" fill="#333">砂轮高速旋转</text>
  </g>
  
  <!-- 珩磨 -->
  <g transform="translate(170, 50)">
    <rect x="0" y="0" width="120" height="80" fill="#ecf0f1" stroke="#e67e22" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="12" font-weight="bold" text-anchor="middle" fill="#e67e22">珩磨</text>
    <!-- 工件(孔) -->
    <ellipse cx="60" cy="50" rx="30" ry="15" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <!-- 珩磨头 -->
    <rect x="30" y="45" width="60" height="10" fill="#9b59b6"/>
    <rect x="30" y="45" width="5" height="10" fill="#8e44ad"/>
    <rect x="85" y="45" width="5" height="10" fill="#8e44ad"/>
    <!-- 运动方向 -->
    <path d="M30,30 L60,20 L90,30" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow1)"/>
    <path d="M30,70 L60,80 L90,70" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="60" y="95" font-size="9" text-anchor="middle" fill="#333">旋转+往复运动</text>
  </g>
  
  <!-- 研磨 -->
  <g transform="translate(310, 50)">
    <rect x="0" y="0" width="120" height="80" fill="#ecf0f1" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="12" font-weight="bold" text-anchor="middle" fill="#27ae60">研磨</text>
    <!-- 研具 -->
    <rect x="20" y="35" width="80" height="8" fill="#34495e"/>
    <!-- 工件 -->
    <rect x="40" y="20" width="40" height="12" fill="#e74c3c"/>
    <!-- 研磨剂 -->
    <circle cx="45" cy="50" r="2" fill="#95a5a6"/>
    <circle cx="55" cy="50" r="2" fill="#95a5a6"/>
    <circle cx="65" cy="50" r="2" fill="#95a5a6"/>
    <circle cx="75" cy="50" r="2" fill="#95a5a6"/>
    <!-- 运动方向 -->
    <path d="M30,65 L60,75 L90,65" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="60" y="95" font-size="9" text-anchor="middle" fill="#333">相对运动+压力</text>
  </g>
  
  <!-- 抛光 -->
  <g transform="translate(450, 50)">
    <rect x="0" y="0" width="120" height="80" fill="#ecf0f1" stroke="#9b59b6" stroke-width="2" rx="5"/>
    <text x="60" y="20" font-size="12" font-weight="bold" text-anchor="middle" fill="#9b59b6">抛光</text>
    <!-- 抛光轮 -->
    <ellipse cx="60" cy="45" rx="25" ry="15" fill="#f39c12" opacity="0.7"/>
    <!-- 工件 -->
    <rect x="45" y="60" width="30" height="10" fill="#e74c3c"/>
    <!-- 抛光膏 -->
    <circle cx="60" cy="35" r="3" fill="#ecf0f1" opacity="0.8"/>
    <!-- 运动 -->
    <path d="M35,35 Q60,25 85,35" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="60" y="95" font-size="9" text-anchor="middle" fill="#333">软布轮+化学作用</text>
  </g>
  
  <!-- 效果对比表格 -->
  <g transform="translate(100, 160)">
    <text x="200" y="0" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">表面效果对比</text>
    <rect x="50" y="15" width="300" height="120" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    
    <!-- 表头 -->
    <rect x="50" y="15" width="80" height="25" fill="#3498db"/>
    <rect x="130" y="15" width="110" height="25" fill="#e67e22"/>
    <rect x="240" y="15" width="110" height="25" fill="#9b59b6"/>
    
    <text x="90" y="32" font-size="10" font-weight="bold" text-anchor="middle" fill="white">方法</text>
    <text x="185" y="32" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Ra范围</text>
    <text x="295" y="32" font-size="10" font-weight="bold" text-anchor="middle" fill="white">效果</text>
    
    <!-- 磨削行 -->
    <rect x="50" y="40" width="80" height="28" fill="#ecf0f1"/>
    <text x="90" y="58" font-size="10" text-anchor="middle" fill="#2c3e50">磨削</text>
    <rect x="130" y="40" width="110" height="28" fill="#fff"/>
    <text x="185" y="58" font-size="9" text-anchor="middle" fill="#333">0.8-0.2 μm</text>
    <rect x="240" y="40" width="110" height="28" fill="#fff"/>
    <text x="295" y="58" font-size="9" text-anchor="middle" fill="#333">提高表面质量</text>
    
    <!-- 珩磨行 -->
    <rect x="50" y="68" width="80" height="28" fill="#fff"/>
    <text x="90" y="86" font-size="10" text-anchor="middle" fill="#2c3e50">珩磨</text>
    <rect x="130" y="68" width="110" height="28" fill="#ecf0f1"/>
    <text x="185" y="86" font-size="9" text-anchor="middle" fill="#333">0.4-0.1 μm</text>
    <rect x="240" y="68" width="110" height="28" fill="#ecf0f1"/>
    <text x="295" y="86" font-size="9" text-anchor="middle" fill="#333">降低粗糙度+提高精度</text>
    
    <!-- 研磨行 -->
    <rect x="50" y="96" width="80" height="28" fill="#ecf0f1"/>
    <text x="90" y="114" font-size="10" text-anchor="middle" fill="#2c3e50">研磨</text>
    <rect x="130" y="96" width="110" height="28" fill="#fff"/>
    <text x="185" y="114" font-size="9" text-anchor="middle" fill="#333">0.1-0.012 μm</text>
    <rect x="240" y="96" width="110" height="28" fill="#fff"/>
    <text x="295" y="114" font-size="9" text-anchor="middle" fill="#333">极高精度+高光洁度</text>
  </g>
</svg>
