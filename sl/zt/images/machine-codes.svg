    <text x="200" y="24" class="h">类别</text>
    <text x="300" y="24" class="h">特性</text>
    <text x="400" y="24" class="h">组系</text>
    <text x="520" y="24" class="h">主参数</text>
    <text x="650" y="24" class="h">改进</text>
    <g transform="translate(0,50)">
      <rect x="0" y="0" width="700" height="40" fill="#fff" rx="6"/>
