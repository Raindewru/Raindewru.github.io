      <text x="200" y="25" class="p">M 磨床</text>
      <text x="300" y="25" class="p">G 高精度</text>
      <text x="400" y="25" class="p">14 万能外圆</text>
      <text x="520" y="25" class="p">32 ⌀320</text>
      <text x="650" y="25" class="p">—</text>
    </g>
    <g transform="translate(0,140)">
      <rect x="0" y="0" width="700" height="40" fill="#fff" rx="6"/>
      <text x="30" y="25" class="p">X5025</text>
      <text x="200" y="25" class="p">X 铣床</text>
      <text x="300" y="25" class="p">—</text>
      <text x="400" y="25" class="p">50 立式</text>
      <text x="520" y="25" class="p">25 台宽</text>
      <text x="650" y="25" class="p">—</text>
