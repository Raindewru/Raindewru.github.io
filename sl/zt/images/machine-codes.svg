    <g transform="translate(0,185)">
      <rect x="0" y="0" width="700" height="40" fill="#f9fafb" rx="6"/>
      <text x="30" y="25" class="p">CM6132</text>
      <text x="200" y="25" class="p">C 车床</text>
      <text x="300" y="25" class="p">M 精密</text>
