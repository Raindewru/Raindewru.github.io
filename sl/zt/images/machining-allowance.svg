<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- 加工余量示意图 -->
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">加工余量</text>
  
  <!-- 工序示意 -->
  <g transform="translate(30, 50)">
    <!-- 毛坯 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="120" height="100" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2" rx="3"/>
      <text x="60" y="50" font-size="11" text-anchor="middle" fill="#6b7280">毛坯</text>
      <text x="60" y="70" font-size="9" text-anchor="middle" fill="#9ca3af">尺寸较大</text>
    </g>
    
    <!-- 箭头 -->
    <path d="M125,50 L155,50" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- 半成品 -->
    <g transform="translate(160, 0)">
      <rect x="0" y="20" width="120" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="3"/>
      <text x="60" y="55" font-size="11" text-anchor="middle" fill="#92400e">半成品</text>
    </g>
    
    <!-- 箭头 -->
    <path d="M285,50 L315,50" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- 成品 -->
    <g transform="translate(320, 0)">
      <rect x="0" y="35" width="120" height="30" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="3"/>
      <text x="60" y="55" font-size="11" text-anchor="middle" fill="#166534">成品</text>
    </g>
  </g>
  
  <!-- 加工余量分解 -->
  <g transform="translate(30, 180)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#2c3e50">加工余量组成:</text>
    
    <!-- 余量图示 -->
    <g transform="translate(20, 20)">
      <!-- 表面层 -->
      <rect x="0" y="0" width="500" height="40" fill="#e5e7eb" stroke="#d1d5db"/>
      <text x="250" y="25" font-size="9" text-anchor="middle" fill="#6b7280">上工序表面</text>
      
      <!-- 本工序切除层 -->
      <rect x="0" y="40" width="500" height="25" fill="#fca5a5" stroke="#ef4444"/>
      <text x="250" y="57" font-size="9" text-anchor="middle" fill="#991b1b">本工序切除层(加工余量)</text>
      
      <!-- 本工序加工后表面 -->
      <rect x="0" y="65" width="500" height="15" fill="#86efac" stroke="#22c55e"/>
      <text x="250" y="77" font-size="9" text-anchor="middle" fill="#166534">本工序加工后表面</text>
    </g>
  </g>
  
  <!-- 五因素 -->
  <g transform="translate(450, 200)">
    <rect x="0" y="0" width="130" height="80" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1" rx="5"/>
    <text x="65" y="18" font-size="10" font-weight="bold" text-anchor="middle" fill="#0369a1">五因素</text>
    <text x="10" y="40" font-size="8" fill="#0c4a6e">1. 表面粗糙度Ra</text>
    <text x="10" y="55" font-size="8" fill="#0c4a6e">2. 表面破坏层</text>
    <text x="10" y="70" font-size="8" fill="#0c4a6e">3. 尺寸公差</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>
</svg>
