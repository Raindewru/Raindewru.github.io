<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300">
  <defs>
    <style>
      .panel{fill:#f8fafc;stroke:#e2e8f0}
      .title{font:600 16px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#0b1e33}
      .label{font:12px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#334155}
      .work{fill:#e5e7eb;stroke:#94a3b8}
      .tool{fill:#64748b}
      .z1{fill:#fca5a5;opacity:.85}
      .z2{fill:#93c5fd;opacity:.85}
      .z3{fill:#86efac;opacity:.85}
      .note{fill:#eef2ff;stroke:#818cf8}
    </style>
  </defs>
  <rect x="10" y="10" width="800" height="280" rx="8" class="panel"/>
  <text x="25" y="35" class="title">切削三个变形区：位置 · 特点 · 影响</text>

  <rect x="80" y="220" width="660" height="40" rx="6" class="work"/>
  <polygon points="240,220 300,150 330,220" class="tool"/>

  <polygon points="300,185 360,200 340,220 300,212" class="z1"/>
  <text x="305" y="180" class="label">I区 剪切滑移</text>
  <polygon points="310,175 370,168 360,182 315,188" class="z2"/>
  <text x="375" y="165" class="label">II区 前刀面摩擦</text>
  <polygon points="300,220 340,220 335,235 300,235" class="z3"/>
  <text x="305" y="250" class="label">III区 后刀面挤压</text>

  <rect x="80" y="70" width="660" height="120" rx="6" class="note"/>
  <text x="95" y="95" class="label">I区（剪切滑移）：</text>
  <text x="210" y="95" class="label">变形最大 → 决定切屑形成、切削力基值</text>
  <text x="95" y="115" class="label">II区（前刀面摩擦）：</text>
  <text x="230" y="115" class="label">摩擦热大 → 二次塑变，影响切屑流动</text>
  <text x="95" y="135" class="label">III区（后刀面挤压）：</text>
  <text x="240" y="135" class="label">直接作用已加工表面 → 表面质量的主导区</text>
  <text x="95" y="155" class="label">要点：</text>
  <text x="140" y="155" class="label">减小II区摩擦（前角/涂层/润滑）与III区挤压（后角/减负荷）提升表面质量</text>
</svg>

