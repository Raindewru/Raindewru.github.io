<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- 削边销定位原理图 -->
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">削边销(菱形销)</text>
  
  <!-- 定位原理 -->
  <g transform="translate(50, 50)">
    <text x="250" y="0" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">两孔定位原理</text>
    
    <!-- 工件(带两孔) -->
    <rect x="100" y="80" width="300" height="120" fill="#ecf0f1" stroke="#7f8c8d" stroke-width="2" rx="5"/>
    
    <!-- 孔1 (定位孔) -->
    <circle cx="180" cy="140" r="25" fill="none" stroke="#3498db" stroke-width="3"/>
    <text x="180" y="145" font-size="9" text-anchor="middle" fill="#3498db">圆柱销</text>
    
    <!-- 孔2 (需要削边的孔) -->
    <circle cx="320" cy="140" r="25" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <text x="320" y="145" font-size="9" text-anchor="middle" fill="#e74c3c">削边销</text>
    
    <!-- 连心线 -->
    <line x1="180" y1="140" x2="320" y2="140" stroke="#2c3e50" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="250" y="175" font-size="9" text-anchor="middle" fill="#2c3e50">连心线方向</text>
  </g>
  
  <!-- 削边销结构 -->
  <g transform="translate(50, 200)">
    <!-- 普通圆柱销 vs 削边销对比 -->
    <text x="0" y="0" font-size="10" font-weight="bold" fill="#2c3e50">削边销结构:</text>
    
    <!-- 圆柱销(会产生过定位) -->
    <g transform="translate(50, 15)">
      <ellipse cx="30" cy="20" rx="25" ry="12" fill="#e74c3c" opacity="0.5"/>
      <text x="30" y="50" font-size="8" text-anchor="middle" fill="#991b1b">圆柱销</text>
      <text x="30" y="62" font-size="7" text-anchor="middle" fill="#991b1b">(限制4个方向)</text>
      <text x="30" y="72" font-size="7" text-anchor="middle" fill="#ef4444">→ 过定位!</text>
    </g>
    
    <!-- 箭头 -->
    <path d="M140,45 L170,45" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- 削边销 -->
    <g transform="translate(180, 15)">
      <path d="M5,20 L30,8 L55,20 L55,32 L30,44 L5,32 Z" fill="#27ae60" opacity="0.7"/>
      <text x="30" y="60" font-size="8" text-anchor="middle" fill="#166534">削边销(菱形销)</text>
      <text x="30" y="72" font-size="7" text-anchor="middle" fill="#166534">只保留1个方向约束</text>
      <text x="30" y="82" font-size="7" text-anchor="middle" fill="#15803d">→ 避免过定位</text>
    </g>
  </g>
  
  <!-- 定位分析 -->
  <g transform="translate(400, 50)">
    <text x="0" y="0" font-size="10" font-weight="bold" fill="#2c3e50">定位分析:</text>
    <rect x="0" y="15" width="160" height="100" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1" rx="5"/>
    <text x="10" y="40" font-size="9" fill="#0369a1">• 圆柱销: 限制度1,2</text>
    <text x="10" y="58" font-size="9" fill="#0369a1">• 削边销: 只限制垂直</text>
    <text x="10" y="76" font-size="9" fill="#0369a1">  连心线方向留间隙</text>
    <text x="10" y="94" font-size="9" fill="#0369a1">• 目的: 避免过定位</text>
  </g>
  
  <!-- 优点 -->
  <g transform="translate(400, 180)">
    <text x="0" y="0" font-size="10" font-weight="bold" fill="#2c3e50">削边原因:</text>
    <rect x="0" y="15" width="160" height="50" fill="#dcfce7" stroke="#22c55e" stroke-width="1" rx="5"/>
    <text x="10" y="40" font-size="9" fill="#166534">增强连心线方向间隙</text>
    <text x="10" y="55" font-size="9" fill="#166534">避免加工和装配误差</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>
</svg>
