<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <defs>
    <style>
      .t{font:700 20px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .p{font:13px system-ui,Segoe UI,Arial;fill:#1f2937}
      .h{font:600 14px system-ui,Segoe UI,Arial;fill:#334155}
    </style>
  </defs>
  <rect x="20" y="20" width="780" height="340" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="410" y="48" class="t" text-anchor="middle">定位误差组成</text>
  <g transform="translate(60,80)">
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#e0f2fe" stroke="#93c5fd"/>
    <text x="160" y="28" class="h" text-anchor="middle">△jb 基准不重合误差</text>
    <text x="160" y="52" class="p" text-anchor="middle">定位基准 ≠ 设计基准</text>
    <g transform="translate(30,80)">
      <rect x="0" y="0" width="260" height="100" rx="8" fill="#fff" stroke="#93c5fd"/>
      <text x="130" y="28" class="p" text-anchor="middle">误差路径：</text>
      <text x="130" y="52" class="p" text-anchor="middle">基准变换 → 尺寸传递</text>
      <text x="130" y="76" class="p" text-anchor="middle">位置误差保留</text>
    </g>
  </g>
  <g transform="translate(440,80)">
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#dcfce7" stroke="#86efac"/>
    <text x="160" y="28" class="h" text-anchor="middle">△jw 基准位移误差</text>
    <text x="160" y="52" class="p" text-anchor="middle">定位副几何/间隙误差</text>
    <g transform="translate(30,80)">
      <rect x="0" y="0" width="260" height="100" rx="8" fill="#fff" stroke="#86efac"/>
      <text x="130" y="28" class="p" text-anchor="middle">来源：</text>
      <text x="130" y="52" class="p" text-anchor="middle">制造误差 · 间隙 · 弹性形变</text>
      <text x="130" y="76" class="p" text-anchor="middle">夹紧力不均等</text>
    </g>
  </g>
  <g transform="translate(410,320)">
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#94a3b8" stroke-dasharray="6 6"/>
    <circle cx="-120" cy="0" r="4" fill="#93c5fd"/>
    <circle cx="120" cy="0" r="4" fill="#86efac"/>
    <text x="-120" y="-10" class="p" text-anchor="middle">△jb</text>
    <text x="120" y="-10" class="p" text-anchor="middle">△jw</text>
    <text x="0" y="22" class="h" text-anchor="middle">定位误差 = △jb + △jw</text>
  </g>
</svg>
