<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <style>
      .title{font:700 22px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .sub{font:600 14px system-ui,Segoe UI,Arial;fill:#334155}
      .text{font:13px/1.5 system-ui,Segoe UI,Arial;fill:#334155}
      .badge{font:700 12px system-ui,Segoe UI,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect x="20" y="20" width="380" height="340" rx="16" fill="url(#g1)" stroke="#93c5fd"/>
  <rect x="460" y="20" width="380" height="340" rx="16" fill="url(#g2)" stroke="#86efac"/>

  <text x="210" y="50" class="title" text-anchor="middle">主运动（主切削）</text>
  <text x="650" y="50" class="title" text-anchor="middle">进给运动（维持连续）</text>

  <g transform="translate(60,80)">
    <rect x="0" y="0" width="300" height="70" rx="12" fill="#fff" stroke="#93c5fd"/>
    <text x="150" y="28" class="sub" text-anchor="middle">定义：实现切削速度的基本运动</text>
    <text x="150" y="50" class="text" text-anchor="middle">功率最大 · 速度最高</text>

    <rect x="0" y="90" width="300" height="70" rx="12" fill="#fff" stroke="#93c5fd"/>
    <text x="150" y="118" class="sub" text-anchor="middle">车削示例</text>
    <text x="150" y="140" class="text" text-anchor="middle">工件旋转为主运动</text>

    <rect x="0" y="180" width="300" height="70" rx="12" fill="#fff" stroke="#93c5fd"/>
    <text x="150" y="208" class="sub" text-anchor="middle">铣削/磨削示例</text>
    <text x="150" y="230" class="text" text-anchor="middle">刀具旋转为主运动</text>
  </g>

  <g transform="translate(500,80)">
    <rect x="0" y="0" width="300" height="70" rx="12" fill="#fff" stroke="#86efac"/>
    <text x="150" y="28" class="sub" text-anchor="middle">定义：使新的材料进入切削的运动</text>
    <text x="150" y="50" class="text" text-anchor="middle">速度较低 · 用于形成完整表面</text>

    <rect x="0" y="90" width="300" height="70" rx="12" fill="#fff" stroke="#86efac"/>
    <text x="150" y="118" class="sub" text-anchor="middle">车削示例</text>
    <text x="150" y="140" class="text" text-anchor="middle">刀具沿轴向或径向移动为进给</text>

    <rect x="0" y="180" width="300" height="70" rx="12" fill="#fff" stroke="#86efac"/>
    <text x="150" y="208" class="sub" text-anchor="middle">铣削/磨削示例</text>
    <text x="150" y="230" class="text" text-anchor="middle">工件或工作台直线/往复为进给</text>
  </g>

  <g transform="translate(430,60)">
    <path d="M0 0 L-40 20 L0 40" fill="none" stroke="#0ea5e9" stroke-width="3"/>
    <text x="-56" y="24" class="badge" fill="#0ea5e9">区分</text>
  </g>

  <g transform="translate(140,300)">
    <rect x="-80" y="-18" width="160" height="36" rx="18" fill="#1d4ed8"/>
    <text x="0" y="6" class="badge" fill="#fff">提供切削速度</text>
  </g>
  <g transform="translate(700,300)">
    <rect x="-80" y="-18" width="160" height="36" rx="18" fill="#059669"/>
    <text x="0" y="6" class="badge" fill="#fff">保证连续切削</text>
  </g>
</svg>
