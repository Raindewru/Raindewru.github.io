<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <defs>
    <style>
      .t{font:700 20px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .p{font:13px system-ui,Segoe UI,Arial;fill:#1f2937}
      .h{font:700 14px system-ui,Segoe UI,Arial;fill:#0f172a}
    </style>
  </defs>
  <rect x="20" y="20" width="780" height="340" rx="16" fill="#fff" stroke="#e5e7eb"/>
  <text x="410" y="48" class="t" text-anchor="middle">插齿机基本运动</text>
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="660" height="220" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <g transform="translate(20,20)">
      <rect x="0" y="0" width="300" height="36" fill="#e2e8f0" rx="6"/>
      <text x="12" y="24" class="h">主切削运动</text>
      <text x="170" y="24" class="p">插齿刀直线往复</text>
    </g>
    <g transform="translate(20,64)">
      <rect x="0" y="0" width="300" height="36" fill="#e2e8f0" rx="6"/>
      <text x="12" y="24" class="h">展成运动</text>
      <text x="170" y="24" class="p">刀—工件同步旋转</text>
    </g>
    <g transform="translate(20,108)">
      <rect x="0" y="0" width="300" height="36" fill="#e2e8f0" rx="6"/>
      <text x="12" y="24" class="h">圆周进给</text>
      <text x="170" y="24" class="p">切入不同齿槽</text>
    </g>
    <g transform="translate(20,152)">
      <rect x="0" y="0" width="300" height="36" fill="#e2e8f0" rx="6"/>
      <text x="12" y="24" class="h">径向进给</text>
      <text x="170" y="24" class="p">逐步加深切入</text>
    </g>
    <g transform="translate(20,196)">
      <rect x="0" y="0" width="300" height="36" fill="#e2e8f0" rx="6"/>
      <text x="12" y="24" class="h">让刀运动</text>
      <text x="170" y="24" class="p">退刀避免干涉</text>
    </g>
    <g transform="translate(360,20)">
      <circle cx="60" cy="60" r="48" fill="#cbd5e1"/>
      <rect x="140" y="12" width="18" height="96" fill="#475569"/>
      <path d="M140,12 L110,60 L140,108" stroke="#ef4444" stroke-width="3" fill="none"/>
      <text x="60" y="130" class="p" text-anchor="middle">工件</text>
      <text x="150" y="130" class="p">插齿刀</text>
      <text x="190" y="50" class="p" fill="#ef4444">往复主运动</text>
      <path d="M60,60 A48,48 0 1,1 59.9,60" stroke="#10b981" stroke-width="3" fill="none"/>
      <text x="60" y="10" class="p" text-anchor="middle" fill="#10b981">展成：同步转动</text>
    </g>
  </g>
</svg>
