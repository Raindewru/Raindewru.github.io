<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <defs>
    <style>
      .t{font:700 20px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .h{font:700 14px system-ui,Segoe UI,Arial;fill:#334155}
      .p{font:13px system-ui,Segoe UI,Arial;fill:#1f2937}
    </style>
  </defs>
  <rect x="20" y="20" width="820" height="380" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="430" y="48" class="t" text-anchor="middle">2019 判断题要点清单</text>

  <g transform="translate(50,70)">
    <rect x="0" y="0" width="760" height="300" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="760" height="36" fill="#e2e8f0"/>
      <text x="20" y="24" class="h">条目</text>
      <text x="320" y="24" class="h">判断</text>
      <text x="420" y="24" class="h">关键词</text>
      <text x="620" y="24" class="h">记忆提示</text>
    </g>
    <g class="row" transform="translate(0,40)">
      <rect x="0" y="0" width="760" height="32" fill="#fff"/>
      <text x="20" y="22" class="p">主偏角定义/标注角度</text>
      <text x="330" y="22" class="p" fill="#ef4444">错</text>
      <text x="420" y="22" class="p">标注角度是静态</text>
      <text x="620" y="22" class="p">别把“工作角度”当“标注角度”</text>
    </g>
    <g class="row" transform="translate(0,72)">
      <rect x="0" y="0" width="760" height="32" fill="#f9fafb"/>
      <text x="20" y="22" class="p">拉削一次完成多阶段</text>
      <text x="330" y="22" class="p" fill="#10b981">对</text>
      <text x="420" y="22" class="p">多刃/多齿</text>
      <text x="620" y="22" class="p">效率高</text>
    </g>
    <g class="row" transform="translate(0,104)">
      <rect x="0" y="0" width="760" height="32" fill="#fff"/>
      <text x="20" y="22" class="p">入体原则</text>
      <text x="330" y="22" class="p" fill="#10b981">对</text>
      <text x="420" y="22" class="p">包容/被包容</text>
      <text x="620" y="22" class="p">上偏差=0/下偏差=0</text>
    </g>
    <g class="row" transform="translate(0,136)">
      <rect x="0" y="0" width="760" height="32" fill="#f9fafb"/>
      <text x="20" y="22" class="p">基准统一 vs 定位误差</text>
      <text x="330" y="22" class="p" fill="#ef4444">错</text>
      <text x="420" y="22" class="p">减少变换误差</text>
      <text x="620" y="22" class="p">非直接降低定位误差</text>
    </g>
    <g class="row" transform="translate(0,168)">
      <rect x="0" y="0" width="760" height="32" fill="#fff"/>
      <text x="20" y="22" class="p">残余压应力</text>
      <text x="330" y="22" class="p" fill="#10b981">对</text>
      <text x="420" y="22" class="p">疲劳强度↑</text>
      <text x="620" y="22" class="p">喷丸等</text>
    </g>
    <g class="row" transform="translate(0,200)">
      <rect x="0" y="0" width="760" height="32" fill="#f9fafb"/>
      <text x="20" y="22" class="p">欠定位</text>
      <text x="330" y="22" class="p" fill="#ef4444">错</text>
      <text x="420" y="22" class="p">绝不允许</text>
      <text x="620" y="22" class="p">必要自由度未限</text>
    </g>
    <g class="row" transform="translate(0,232)">
      <rect x="0" y="0" width="760" height="32" fill="#fff"/>
      <text x="20" y="22" class="p">尺寸链有无减环</text>
      <text x="330" y="22" class="p" fill="#ef4444">错</text>
      <text x="420" y="22" class="p">并联可全增环</text>
      <text x="620" y="22" class="p">看结构</text>
    </g>
    <g class="row" transform="translate(0,264)">
      <rect x="0" y="0" width="760" height="32" fill="#f9fafb"/>
      <text x="20" y="22" class="p">工艺过程组成</text>
      <text x="330" y="22" class="p" fill="#ef4444">错</text>
      <text x="420" y="22" class="p">由工序组成</text>
      <text x="620" y="22" class="p">工位≠工序</text>
    </g>
    <g class="row" transform="translate(0,296)">
      <rect x="0" y="0" width="760" height="32" fill="#fff"/>
      <text x="20" y="22" class="p">粗基准选择</text>
      <text x="330" y="22" class="p" fill="#ef4444">错</text>
      <text x="420" y="22" class="p">选不加工面</text>
      <text x="620" y="22" class="p">保证位置关系</text>
    </g>
  </g>
</svg>
