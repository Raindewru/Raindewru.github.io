<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <defs>
    <style>
      .t{font:700 20px system-ui,Segoe UI,Arial;fill:#0b1e33}
      .s{font:600 14px system-ui,Segoe UI,Arial;fill:#334155}
      .p{font:13px system-ui,Segoe UI,Arial;fill:#334155}
    </style>
  </defs>
  <rect x="20" y="20" width="780" height="340" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="410" y="48" class="t" text-anchor="middle">刀尖高低对前角/后角的影响</text>

  <g transform="translate(70,80)">
    <rect x="0" y="0" width="320" height="260" rx="12" fill="#e0f2fe" stroke="#93c5fd"/>
    <text x="160" y="28" class="s" text-anchor="middle">刀尖高于工件中心</text>
    <text x="160" y="50" class="p" text-anchor="middle">前角↑ 后角↓</text>
    <g transform="translate(30,70)">
      <circle cx="70" cy="95" r="48" fill="#cbd5e1"/>
      <rect x="60" y="25" width="20" height="140" fill="#475569"/>
      <path d="M160,40 L110,85 L185,115 Z" fill="#f97316"/>
      <circle cx="110" cy="85" r="4" fill="#1f2937"/>
      <text x="90" y="20" class="p">工件</text>
      <text x="140" y="62" class="p">刀尖↑</text>
      <path d="M110,85 L150,55" stroke="#ef4444" stroke-width="2"/>
      <text x="152" y="52" class="p" fill="#ef4444">前角增大</text>
      <path d="M110,85 L148,110" stroke="#3b82f6" stroke-width="2"/>
      <text x="150" y="120" class="p" fill="#3b82f6">后角减小</text>
    </g>
  </g>

  <g transform="translate(430,80)">
    <rect x="0" y="0" width="320" height="260" rx="12" fill="#fef3c7" stroke="#facc15"/>
    <text x="160" y="28" class="s" text-anchor="middle">刀尖低于工件中心</text>
    <text x="160" y="50" class="p" text-anchor="middle">前角↓ 后角↑</text>
    <g transform="translate(30,70)">
      <circle cx="70" cy="95" r="48" fill="#cbd5e1"/>
      <rect x="60" y="25" width="20" height="140" fill="#475569"/>
      <path d="M160,130 L110,85 L185,55 Z" fill="#22c55e"/>
      <circle cx="110" cy="85" r="4" fill="#1f2937"/>
      <text x="90" y="20" class="p">工件</text>
      <text x="140" y="115" class="p">刀尖↓</text>
      <path d="M110,85 L148,60" stroke="#ef4444" stroke-width="2"/>
      <text x="150" y="58" class="p" fill="#ef4444">前角减小</text>
      <path d="M110,85 L150,115" stroke="#3b82f6" stroke-width="2"/>
      <text x="152" y="126" class="p" fill="#3b82f6">后角增大</text>
    </g>
  </g>
</svg>
