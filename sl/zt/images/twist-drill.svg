<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- 麻花钻结构简图 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- 钻头主体 -->
  <g transform="translate(50, 50)">
    <!-- 柄部 -->
    <rect x="0" y="120" width="60" height="30" fill="#7f8c8d" rx="3"/>
    <text x="30" y="140" font-size="10" text-anchor="middle" fill="white">柄部</text>
    
    <!-- 颈部 -->
    <rect x="60" y="125" width="30" height="20" fill="#95a5a6"/>
    <text x="75" y="140" font-size="8" text-anchor="middle" fill="white">颈部</text>
    
    <!-- 工作部分 - 切削部分 -->
    <path d="M90,135 L250,110 L250,160 L90,135" fill="#3498db" opacity="0.8"/>
    <path d="M90,135 L250,110 L250,160 L90,135" fill="none" stroke="#2980b9" stroke-width="2"/>
    <text x="170" y="125" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">切削部分</text>
    
    <!-- 螺旋槽 -->
    <path d="M90,120 Q170,90 250,100" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <path d="M90,150 Q170,180 250,170" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <text x="280" y="100" font-size="9" fill="#c0392b">螺旋槽</text>
    
    <!-- 刃瓣 -->
    <path d="M90,110 L280,95 L280,105 L90,120" fill="#f39c12" opacity="0.7"/>
    <path d="M90,160 L280,175 L280,165 L90,150" fill="#f39c12" opacity="0.7"/>
    <text x="290" y="90" font-size="9" fill="#d68910">刃瓣</text>
    
    <!-- 钻芯 -->
    <line x1="90" y1="135" x2="280" y2="135" stroke="#2c3e50" stroke-width="4"/>
    <text x="300" y="138" font-size="9" fill="#2c3e50">钻芯</text>
    
    <!-- 棱边/刃带 -->
    <line x1="250" y1="108" x2="280" y2="113" stroke="#27ae60" stroke-width="2"/>
    <line x1="250" y1="162" x2="280" y2="157" stroke="#27ae60" stroke-width="2"/>
    <text x="290" y="180" font-size="9" fill="#27ae60">棱边(刃带)</text>
    
    <!-- 切削刃标注 -->
    <line x1="250" y1="110" x2="250" y2="135" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="260" y="120" font-size="8" fill="#8e44ad">主切削刃</text>
    
    <!-- 横刃 -->
    <line x1="230" y1="120" x2="230" y2="150" stroke="#e67e22" stroke-width="3"/>
    <text x="200" y="165" font-size="8" fill="#e67e22">横刃</text>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(400, 30)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#2c3e50">图例</text>
    <rect x="0" y="15" width="20" height="10" fill="#3498db" opacity="0.8"/>
    <text x="25" y="23" font-size="9" fill="#2c3e50">切削部分</text>
    <rect x="0" y="35" width="20" height="10" fill="#f39c12" opacity="0.7"/>
    <text x="25" y="43" font-size="9" fill="#2c3e50">刃瓣</text>
    <line x1="3" y1="60" x2="20" y2="60" stroke="#e74c3c" stroke-width="2"/>
    <text x="25" y="63" font-size="9" fill="#2c3e50">螺旋槽</text>
    <line x1="3" y1="80" x2="20" y2="80" stroke="#27ae60" stroke-width="2"/>
    <text x="25" y="83" font-size="9" fill="#2c3e50">棱边/刃带</text>
    <line x1="3" y1="100" x2="20" y2="100" stroke="#8e44ad" stroke-width="2"/>
    <text x="25" y="103" font-size="9" fill="#2c3e50">主切削刃</text>
    <line x1="3" y1="120" x2="20" y2="120" stroke="#e67e22" stroke-width="3"/>
    <text x="25" y="123" font-size="9" fill="#2c3e50">横刃</text>
  </g>
</svg>
