<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS · 面试 · 专业课</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #ffffff 100%);
      color: #0b1e33;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
    }
    header {
      max-width: 980px;
      width: 100%;
      text-align: center;
      margin-bottom: 22px;
    }
    header h1 {
      font-size: 2.1rem;
      line-height: 1.2;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #4a5568;
      margin-top: 8px;
    }
    .toolbar {
      max-width: 980px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e6ecf2;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      display: grid;
      grid-template-columns: 1fr 240px 120px;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }
    .toolbar input[type="search"] {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }
    .toolbar select, .toolbar button {
      height: 42px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      padding: 0 12px;
      font-size: 0.95rem;
      color: #0b1e33;
    }
    .toolbar button {
      background: #2a5298;
      color: #ffffff;
      border-color: #2a5298;
      cursor: pointer;
    }
    .article {
      max-width: 980px;
      width: 100%;
    }
    .article .section {
      margin: 28px 0 34px;
    }
    .article h2, .article h3, .article h4 {
      margin: 14px 0 10px;
      color: #0b1e33;
    }
    .article p {
      margin: 10px 0;
      line-height: 1.9;
      color: #334155;
    }
    .article table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 14px;
      font-size: 0.96rem;
      border: 1px solid #94a3b8;
    }
    .article th, .article td {
      border: 1px solid #94a3b8;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .article th {
      background: #f1f5f9;
    }
    .grid {
      max-width: 980px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #edf2f7;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.06);
      border-color: #cbd5e0;
    }
    /* 增加卡片左右留白 */
    .card {
      padding: 24px 28px;
    }
    .card .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      color: #2a3a8a;
      background: #eef2ff;
    }
    .question {
      font-weight: 700;
      color: #0b1e33;
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin: 6px 0 8px;
    }
    .btn {
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #0b1e33;
      height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .answer, .tips {
      display: none;
      line-height: 1.8;
      color: #334155;
      padding: 10px 8px 0 8px;
    }
    .answer.show, .tips.show { display: block; }
    /* p 与可视块左右留白增强 */
    .card .question,
    .card .answer p,
    .card .tips p {
      padding-left: 8px;
      padding-right: 8px;
    }
    /* 题库视角表格样式（实线网格 + 表头底色） */
    .answer table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 14px;
      font-size: 0.96rem;
      border: 1px solid #94a3b8;
    }
    .answer th, .answer td {
      border: 1px solid #94a3b8;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .answer th {
      background: #f1f5f9;
    }
    .tbl-intro {
      margin: 6px 0 6px;
      color: #475569;
      font-size: 0.95rem;
    }
    .hl-y { background:#fde047; padding:2px 6px; border-radius:4px; }
    .hl-p { background:#c4b5fd; padding:2px 6px; border-radius:4px; }
    .hl-g { background:#86efac; padding:2px 6px; border-radius:4px; }
    .hl-b { background:#dbeafe; padding:2px 6px; border-radius:4px; }
    .hl-r { background:#fca5a5; padding:2px 6px; border-radius:4px; }
    footer {
      margin: 20px 0;
      color: #718096;
      font-size: 0.9rem;
      text-align: center;
    }
    .fab-love {
      position: fixed;
      right: 20px;
      bottom: 22px;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: none;
      background: #e63946;
      color: #fff;
      font-size: 22px;
      box-shadow: 0 10px 24px rgba(230,57,70,0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .fab-love:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(230,57,70,0.45); }
    .fab-love.active { background: #c1121f; }
    .top-nav {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }
    .top-nav a {
      background: #ffffff;
      border: 1.5px solid #2a5298;
      color: #2a5298;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .top-nav a:hover {
      background: #2a5298;
      color: #ffffff;
      border-color: #2a5298;
    }
    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr; }
      .top-nav { top: 10px; right: 10px; }
      .top-nav a { padding: 6px 10px; }
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre','code']
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
</head>
<body>
  <div class="top-nav">
    <a href="../index.html">主页</a>
    <a href="../ky/">去 KY</a>
    <a href="../zt/">去 ZT</a>
  </div>
  <header>
    <h1>MS · 面试题库 · 专业课</h1>
    <p>分类筛选｜关键词搜索｜展开查看答案与要点，高亮重点便于速记</p>
  </header>
  <section class="toolbar">
    <input id="search" type="search" placeholder="搜索题干/标签，例如：齿轮、液压、热处理" />
    <select id="version">
      <option value="chapter1" selected>一、热处理与材料改性</option>
      <option value="chapter2">二、机械传动与轴系设计</option>
      <option value="chapter3">三、液压与气压传动</option>
      <option value="chapter4">四、数控加工与切削技术</option>
      <option value="chapter5">五、材料力学与理论力学</option>
      <option value="chapter6">六、控制工程与自动化</option>
      <option value="chapter7">七、机器人与智能制造</option>
      <option value="chapter8">八、几何公差与互换性</option>
      <option value="chapter9">九、电工电子基础</option>
      <option value="chapter10">十、其他关键概念</option>
    </select>
    <button id="clear">清空筛选</button>
  </section>
  <main class="grid" id="list"></main>
  <main class="grid" id="book" style="display:none;"></main>
  <button id="fabLove" class="fab-love" title="一键打开/关闭所有答案" aria-pressed="false">❤</button>
  <footer>© MS</footer>
  <script>
    const listEl = document.getElementById('list');
    const bookEl = document.getElementById('book');
    const searchEl = document.getElementById('search');
    const verEl = document.getElementById('version');
    const clearBtn = document.getElementById('clear');
    const fabLove = document.getElementById('fabLove');
    let data = [];
    let filtered = [];
    let categories = [];
    let allAnswersOpen = false;
    let chapterLoaded = false;
    const sources = {
      core: './data/questions.json',
      detailed: './data/questions_detailed.json',
      verbatim: './data/questions_verbatim.json',
      chapter1: './data/detail_ch1.json',
      chapter2: './data/detail_ch2.json',
      chapter3: './data/detail_ch3.json',
      chapter4: './data/detail_ch4.json',
      chapter5: './data/detail_ch5.json',
      chapter6: './data/detail_ch6.json',
      chapter7: './data/detail_ch7.json',
      chapter8: './data/detail_ch8.json',
      chapter9: './data/detail_ch9.json',
      chapter10: './data/detail_ch10.json'
    };
    function sanitize(s) {
      return (s || '').replace(/\\n/g, '<br>');
    }
    function setAllAnswers(open) {
      allAnswersOpen = !!open;
      const answers = document.querySelectorAll('.answer');
      const btns = document.querySelectorAll('.btn-answer');
      answers.forEach(el => el.classList.toggle('show', allAnswersOpen));
      btns.forEach(b => {
        const id = b.getAttribute('data-id');
        const el = document.getElementById('ans-' + id);
        if (!el) return;
        b.textContent = el.classList.contains('show') ? '📖 隐藏答案' : '📖 显示答案';
      });
      fabLove.classList.toggle('active', allAnswersOpen);
      fabLove.setAttribute('aria-pressed', allAnswersOpen ? 'true' : 'false');
      fabLove.title = allAnswersOpen ? '关闭所有答案' : '打开所有答案';
      fabLove.innerText = allAnswersOpen ? '❤' : '♡';
    }
    fabLove.addEventListener('click', () => setAllAnswers(!allAnswersOpen));
    function renderList() {
      if (!filtered.length) {
        listEl.innerHTML = '<p style="text-align:center; color:#718096; padding:2rem;">暂无结果，请更换关键词或分类。</p>';
        return;
      }
      const html = filtered.map(item => {
        const tags = (item.tags || []).map(t => `<span class="chip" data-tag="${t}">${t}</span>`).join('');
        return `
          <div class="card" data-id="${item.id}">
            <div class="meta">
              <span class="chip">${item.category || '未分类'}</span>
              ${tags}
            </div>
            <div class="question">${item.question}</div>
            <div class="actions">
              <button class="btn btn-answer" data-id="${item.id}">📖 显示答案</button>
              ${item.tips ? `<button class="btn btn-tips" data-id="${item.id}">🧠 记忆要点</button>` : ''}
            </div>
            <div class="answer" id="ans-${item.id}">${sanitize(item.answer)}</div>
            ${item.tips ? `<div class="tips" id="tips-${item.id}">${sanitize(item.tips)}</div>` : ''}
          </div>
        `;
      }).join('');
      listEl.innerHTML = html;
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([listEl]).catch(()=>{});
      }
      listEl.querySelectorAll('.btn-answer').forEach(b => {
        b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const el = document.getElementById('ans-' + id);
          if (el) el.classList.toggle('show');
          e.currentTarget.textContent = el && el.classList.contains('show') ? '📖 隐藏答案' : '📖 显示答案';
        });
      });
      listEl.querySelectorAll('.btn-tips').forEach(b => {
        b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const el = document.getElementById('tips-' + id);
          if (el) el.classList.toggle('show');
          e.currentTarget.textContent = el && el.classList.contains('show') ? '🧠 隐藏要点' : '🧠 记忆要点';
        });
      });
      listEl.querySelectorAll('.chip[data-tag]').forEach(c => {
        c.addEventListener('click', () => {
          searchEl.value = c.getAttribute('data-tag') || '';
          applyFilters();
        });
      });
      if (allAnswersOpen) setAllAnswers(true);
    }
    function applyFilters() {
      const q = (searchEl.value || '').trim().toLowerCase();
      filtered = data.filter(it => {
        const t = [it.question, it.answer, (it.tags || []).join(' ')].join(' ').toLowerCase();
        const hitQ = !q || t.includes(q);
        return hitQ;
      });
      renderList();
    }
    function chapterHtmlHighlight(html) {
      if (!html) return '';
      // 只要段落包含公式标记，直接返回原 HTML（不做彩色高亮），保留粗体
      const hasMath = /\\\(|\\\[|\$/.test(html);
      if (hasMath) return html;
      let t = html;
      t = t.replace(/<strong>(.*?)<\/strong>/g, '<span class="hl-y">$1</span>');
      t = t.replace(/(提高|增加|增强|升高|加快|扩大)/g, '<span class="hl-g">$1</span>');
      t = t.replace(/(降低|减小|减弱|下降|减慢|缩小)/g, '<span class="hl-r">$1</span>');
      t = t.replace(/(优点|缺点|注意|要点|原因|结论|原则|关键|核心|定义|特点|对比|适用场景|适用于)/g, '<span class="hl-b">$1</span>');
      t = t.replace(/(硬度|强度|韧性|疲劳|磨损|效率|精度)/g, '<span class="hl-y">$1</span>');
      t = t.replace(/\b(HRC|HB|HV|MPa|℃|mm|m\/s)\b/g, '<span class="hl-p">$1</span>');
      return t;
    }
    function escapeHtml(s) {
      return (s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function mdInline(src) {
      let s = escapeHtml(src || '');
      // links [text](url)
      s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      // inline code `code`
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      // bold **text**
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // italic *text*
      s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      // newlines to <br>
      s = s.replace(/\n/g, '<br>');
      return s;
    }
    function blocksToHtml(blocks) {
      return (blocks || []).map(b => {
        if (b.type === 'paragraph') {
          const txt = (b.text || '').trim();
          const html = mdInline(txt);
          return chapterHtmlHighlight(`<p>${html}</p>`);
        }
        if (b.type === 'table') {
          const intro = `<p class="tbl-intro">下表为本小节关键要点对比：</p>`;
          const thead = b.header ? `<thead><tr>${b.header.map((h,i)=>`<th${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${h}</th>`).join('')}</tr></thead>` : '';
          const tbody = `<tbody>${(b.rows||[]).map(r=>`<tr>${r.map((c,i)=>`<td${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${mdInline(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
          return `${intro}<table>${thead}${tbody}</table>`;
        }
        if (b.type === 'list') {
          const items = (b.items||[]).map(it => `<li>${mdInline(it.text || '')}</li>`).join('');
          return b.ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
        }
        return '';
      }).join('');
    }
    function buildChapterQA(doc) {
      const chapterTitle = (doc && doc.meta && doc.meta.title)
        ? doc.meta.title.replace(/^[一二三四五六七八九十]+、/, '')
        : '本章';
      const blocks = (doc && doc.blocks) || [];
      // 收集三级标题为题目，聚合其后的内容至下一个三级标题或章节结束
      const items = [];
      const cat = chapterTitle;
      // 找到所有 depth===3 的 heading 索引
      const indices = [];
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        if (b.type === 'heading' && b.depth === 3) indices.push(i);
      }
      for (let k = 0; k < indices.length; k++) {
        const start = indices[k];
        const end = k + 1 < indices.length ? indices[k+1] : blocks.length;
        const head = blocks[start];
        const content = blocks.slice(start + 1, end);
        const answerHtml = blocksToHtml(content);
        items.push({
          id: head.id || ('chap1-' + k),
          category: cat,
          question: head.text || ('小节 ' + (k+1)),
          answer: chapterHtmlHighlight(answerHtml),
          tips: '',
          tags: [cat]
        });
      }
      return items;
    }
    function loadData() {
      const srcKey = verEl.value;
      const src = sources[srcKey] || sources.core;
      const verLabel =
        srcKey === 'detailed' ? '核心版' :
        (srcKey === 'verbatim' ? '原文逐条版' :
        (srcKey.startsWith && srcKey.startsWith('chapter') ? '章节题库' : '精简版'));
      listEl.innerHTML = '<p style=\"text-align:center; color:#718096; padding:2rem;\">正在加载 ' + verLabel + ' 数据...</p>';
      fetch(src)
        .then(r => r.json())
        .then(json => {
          if (srcKey.startsWith && srcKey.startsWith('chapter')) {
            data = buildChapterQA(json);
          } else {
            data = json || [];
          }
          applyFilters();
        })
        .catch(() => {
          listEl.innerHTML = '<p style=\"text-align:center; color:#ef4444; padding:2rem;\">数据加载失败，请稍后重试。</p>';
        });
    }
    searchEl.addEventListener('input', applyFilters);
    verEl.addEventListener('change', () => {
      searchEl.value = '';
      loadData();
    });
    clearBtn.addEventListener('click', () => {
      searchEl.value = '';
      applyFilters();
    });
    function renderChapter(doc) {
      const blocks = doc && doc.blocks ? doc.blocks : [];
      const parts = [];
      let section = [];
      let title = '';
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        if (b.type === 'heading' && b.depth === 2) {
          title = `<h2 id="${b.id}">${mdInline(b.text || '')}</h2>`;
          continue;
        }
        if (b.type === 'heading' && b.depth === 3) {
          if (section.length) {
            parts.push(`<div class="section">${section.join('')}</div>`);
            section = [];
          }
          section.push(`<h3 id="${b.id}">${mdInline(b.text || '')}</h3>`);
          continue;
        }
        if (b.type === 'paragraph') {
          const txt = (b.text || '').trim();
          const html = mdInline(txt);
          section.push(chapterHtmlHighlight(`<p>${html}</p>`));
          continue;
        }
        if (b.type === 'table') {
          const intro = `<p class="tbl-intro">下表为本小节关键要点对比：</p>`;
          const thead = b.header ? `<thead><tr>${b.header.map((h,i)=>`<th${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${h}</th>`).join('')}</tr></thead>` : '';
          const tbody = `<tbody>${(b.rows||[]).map(r=>`<tr>${r.map((c,i)=>`<td${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${mdInline(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
          section.push(`${intro}<table>${thead}${tbody}</table>`);
          continue;
        }
        if (b.type === 'list') {
          const items = (b.items||[]).map(it => `<li>${mdInline(it.text || '')}</li>`).join('');
          section.push(b.ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`);
          continue;
        }
      }
      if (section.length) parts.push(`<div class="section">${section.join('')}</div>`);
      const html = [title, ...parts].join('');
      bookEl.innerHTML = `<div class="card article">${html}</div>`;
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([bookEl]).catch(()=>{});
      }
    }
    function loadChapter() {
      if (chapterLoaded) return;
      const v = (verEl.value && verEl.value.startsWith('chapter')) ? verEl.value : 'chapter1';
      const src = sources[v] || sources['chapter1'];
      bookEl.innerHTML = '<p style="text-align:center; color:#718096; padding:2rem;">正在加载章节...</p>';
      fetch(src)
        .then(r => r.json())
        .then(json => {
          renderChapter(json);
          chapterLoaded = true;
        })
        .catch(() => {
          bookEl.innerHTML = '<p style="text-align:center; color:#ef4444; padding:2rem;">章节加载失败，请稍后重试。</p>';
        });
    }
    loadData();
  </script>
</body>
