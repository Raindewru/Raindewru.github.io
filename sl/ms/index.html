<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS · 面试 · 专业课</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #ffffff 100%);
      color: #0b1e33;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
    }
    header {
      max-width: 980px;
      width: 100%;
      text-align: center;
      margin-bottom: 22px;
    }
    header h1 {
      font-size: 2.1rem;
      line-height: 1.2;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #4a5568;
      margin-top: 8px;
    }
    .toolbar {
      max-width: 980px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e6ecf2;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      display: grid;
      grid-template-columns: 180px 200px 1fr 140px 110px;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      position: sticky;
      top: 72px;
      z-index: 950;
    }
    .toolbar input[type="search"] {
      width: 100%;
      max-width: 320px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }
    .toolbar select, .toolbar button {
      height: 42px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      padding: 0 12px;
      font-size: 0.95rem;
      color: #0b1e33;
    }
    .toolbar button {
      background: #2a5298;
      color: #ffffff;
      border-color: #2a5298;
      cursor: pointer;
    }
    .toolbar button.btn-nav {
      background: #ffffff;
      color: #2a5298;
      border-color: #2a5298;
      font-weight: 800;
    }
    .toolbar button.btn-nav:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .article {
      max-width: 980px;
      width: 100%;
    }
    .article .section {
      margin: 28px 0 34px;
    }
    .article h2, .article h3, .article h4 {
      margin: 14px 0 10px;
      color: #0b1e33;
    }
    .article p {
      margin: 10px 0;
      line-height: 1.9;
      color: #334155;
    }
    .article table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 14px;
      font-size: 0.96rem;
      border: 1px solid #94a3b8;
    }
    .article th, .article td {
      border: 1px solid #94a3b8;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .article th {
      background: #f1f5f9;
    }
    .grid {
      max-width: 980px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #edf2f7;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.06);
      border-color: #cbd5e0;
    }
    /* 增加卡片左右留白 */
    .card {
      padding: 24px 28px;
    }
    .card .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      color: #2a3a8a;
      background: #eef2ff;
    }
    .question {
      font-weight: 700;
      color: #0b1e33;
      margin-bottom: 10px;
      line-height: 1.6;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .qno {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1e3c72;
      font-weight: 900;
      flex: 0 0 auto;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin: 6px 0 8px;
    }
    .btn {
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #0b1e33;
      height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .panel {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 10px;
      background: #ffffff;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .panel-answer .panel-head { background: #eef2ff; color: #2a3a8a; }
    .panel-tips .panel-head { background: #ecfeff; color: #0e7490; }
    .panel-note .panel-head { background: #f1f5f9; color: #0b1e33; }
    .panel-body {
      display: none;
      line-height: 1.85;
      color: #334155;
      padding: 12px 14px 14px;
    }
    .note-body {
      padding: 12px 14px 14px;
    }
    .note-text {
      width: 100%;
      min-height: 112px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      background: #fbfdff;
      color: #0b1e33;
    }
    .note-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .note-actions .btn {
      height: 34px;
      font-size: 13px;
    }
    .btn-note-clear {
      background: #ffffff;
      border-color: #cbd5e1;
      color: #0b1e33;
    }
    .note-status {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
    }
    .answer, .tips {
      padding: 0;
    }
    .answer.show, .tips.show { display: block; }
    /* p 与可视块左右留白增强 */
    .card .question,
    .card .answer p,
    .card .tips p {
      padding-left: 8px;
      padding-right: 8px;
    }
    /* 题库视角表格样式（实线网格 + 表头底色） */
    .answer table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 14px;
      font-size: 0.96rem;
      border: 1px solid #94a3b8;
    }
    .answer th, .answer td {
      border: 1px solid #94a3b8;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .answer th {
      background: #f1f5f9;
    }
    .tbl-intro {
      margin: 6px 0 6px;
      color: #475569;
      font-size: 0.95rem;
    }
    .hl-y { background:#fde047; padding:2px 6px; border-radius:4px; font-weight: 800; }
    .hl-p { background:#c4b5fd; padding:2px 6px; border-radius:4px; font-weight: 750; }
    .hl-g { background:#86efac; padding:2px 6px; border-radius:4px; font-weight: 750; }
    .hl-b { background:#dbeafe; padding:2px 6px; border-radius:4px; font-weight: 750; }
    .hl-r { background:#fca5a5; padding:2px 6px; border-radius:4px; font-weight: 750; }
    .rich-list { margin: 10px 0 6px 22px; padding: 0; }
    .rich-list li { margin: 6px 0; line-height: 1.85; }
    footer {
      margin: 20px 0;
      color: #718096;
      font-size: 0.9rem;
      text-align: center;
    }
    .fab-love {
      position: fixed;
      right: 20px;
      bottom: 22px;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: none;
      background: #e63946;
      color: #fff;
      font-size: 22px;
      box-shadow: 0 10px 24px rgba(230,57,70,0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .fab-love:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(230,57,70,0.45); }
    .fab-love.active { background: #c1121f; }
    .top-nav {
      position: sticky;
      top: 12px;
      max-width: 980px;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      z-index: 1000;
      margin-bottom: 10px;
    }
    .top-nav a {
      background: #ffffff;
      border: 1.5px solid #2a5298;
      color: #2a5298;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .top-nav a:hover {
      background: #2a5298;
      color: #ffffff;
      border-color: #2a5298;
    }
    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr; }
      .toolbar { top: 64px; }
      .top-nav { top: 10px; }
      .top-nav a { padding: 6px 10px; }
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre','code']
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
</head>
<body>
  <div class="top-nav">
    <a href="../index.html">主页</a>
    <a href="../ky/">口语</a>
    <a href="../zt/">真题</a>
    <a href="../ms/">面试</a>
    <a href="../ms2/">机械材料</a>
  </div>
  <header>
    <h1>MS · 面试题库 · 专业课</h1>
    <p>分类筛选｜关键词搜索｜展开查看答案与要点，高亮重点便于速记</p>
  </header>
  <section class="toolbar">
    <select id="bookSelect">
      <option value="detail" selected>面试考点</option>
      <option value="core">核心考点</option>
    </select>
    <input id="search" type="search" placeholder="搜索题干/标签，例如：齿轮、液压、热处理" />
    <button id="prevChapter" class="btn-nav" type="button">上一章</button>
    <select id="version">
      <option value="detail" selected>全部题集</option>
      <option value="chapter1">一、热处理与材料改性</option>
      <option value="chapter2">二、机械传动与轴系设计</option>
      <option value="chapter3">三、液压与气压传动</option>
      <option value="chapter4">四、数控加工与切削技术</option>
      <option value="chapter5">五、材料力学与理论力学</option>
      <option value="chapter6">六、控制工程与自动化</option>
      <option value="chapter7">七、机器人与智能制造</option>
      <option value="chapter8">八、几何公差与互换性</option>
      <option value="chapter9">九、电工电子基础</option>
      <option value="chapter10">十、其他关键概念</option>
    </select>
    <button id="nextChapter" class="btn-nav" type="button">下一章</button>
  </section>
  <main class="grid" id="list"></main>
  <main class="grid" id="book" style="display:none;"></main>
  <button id="fabLove" class="fab-love" title="一键打开/关闭所有答案" aria-pressed="false">❤</button>
  <footer>© MS</footer>
  <script>
    const listEl = document.getElementById('list');
    const bookEl = document.getElementById('book');
    const searchEl = document.getElementById('search');
    const verEl = document.getElementById('version');
    const bookSelect = document.getElementById('bookSelect');
    const prevChapterBtn = document.getElementById('prevChapter');
    const nextChapterBtn = document.getElementById('nextChapter');
    const fabLove = document.getElementById('fabLove');
    let fullData = [];
    let data = [];
    let filtered = [];
    let categories = [];
    let allAnswersOpen = true;
    let chapterLoaded = false;
    let currentBook = 'detail';
    const sources = {
      detail: './data/detail.json',
      core: './data/core.json'
    };
    const chapterTitles = {
      chapter1: '一、热处理与材料改性',
      chapter2: '二、机械传动与轴系设计',
      chapter3: '三、液压与气压传动',
      chapter4: '四、数控加工与切削技术',
      chapter5: '五、材料力学与理论力学',
      chapter6: '六、控制工程与自动化',
      chapter7: '七、机器人与智能制造',
      chapter8: '八、几何公差与互换性',
      chapter9: '九、电工电子基础',
      chapter10: '十、其他关键概念'
    };
    const NOTE_NS = 'ms_notes_v1';
    const noteTimers = new Map();
    function noteKey(id) {
      return NOTE_NS + ':' + String(id || '');
    }
    function getNoteText(id) {
      const k = noteKey(id);
      try {
        const raw = localStorage.getItem(k);
        if (!raw) return '';
        const v = JSON.parse(raw);
        if (v && typeof v.text === 'string') return v.text;
        if (typeof v === 'string') return v;
        return '';
      } catch {
        return '';
      }
    }
    function setNoteText(id, text) {
      const k = noteKey(id);
      const payload = { text: String(text || ''), updatedAt: Date.now() };
      localStorage.setItem(k, JSON.stringify(payload));
    }
    function clearNote(id) {
      localStorage.removeItem(noteKey(id));
    }
    function setNoteStatus(id, text) {
      const el = document.getElementById('note-status-' + id);
      if (!el) return;
      el.textContent = text || '';
      if (text) {
        setTimeout(() => {
          const cur = document.getElementById('note-status-' + id);
          if (cur && cur.textContent === text) cur.textContent = '';
        }, 1200);
      }
    }
    function sanitize(s) {
      return (s || '').replace(/\\n/g, '<br>');
    }
    function normalizeNewlines(s) {
      return String(s || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    }
    function normalizeMarkdownTableSource(s) {
      let src = normalizeNewlines(s);
      if (!src.includes('\n') && src.includes('||') && /\|\s*:?-{3,}:?\s*\|/.test(src)) {
        src = src.replace(/\|\|/g, '|\n|');
      }
      return src;
    }
    function looksLikeHtml(s) {
      return /<\/(p|table|ul|ol|div|h\d)>/i.test(String(s || ''));
    }
    function parseMarkdownTableBlock(raw) {
      const src = normalizeMarkdownTableSource(raw);
      const lines = src.split('\n');
      const nonEmpty = [];
      for (let i = 0; i < lines.length; i++) {
        const t = lines[i].trim();
        if (t) nonEmpty.push({ i, t });
      }
      if (nonEmpty.length < 2) return null;
      const header = nonEmpty[0];
      const sep = nonEmpty[1];
      if (!header.t.includes('|')) return null;
      if (!/---/.test(sep.t)) return null;
      const rowCells = (line) => {
        let cells = line.split('|');
        if (cells.length && cells[0].trim() === '') cells = cells.slice(1);
        if (cells.length && cells[cells.length - 1].trim() === '') cells = cells.slice(0, -1);
        return cells.map(c => c.trim());
      };
      const tableLines = [header.t, sep.t];
      let lastLineIndex = sep.i;
      for (let k = 2; k < nonEmpty.length; k++) {
        const cur = nonEmpty[k];
        if (!cur.t.includes('|')) break;
        tableLines.push(cur.t);
        lastLineIndex = cur.i;
      }
      const headerCells = rowCells(tableLines[0]);
      const rows = tableLines.slice(2).map(rowCells).filter(r => r.length);
      const thead = `<thead><tr>${headerCells.map(h => `<th>${mdInline(h)}</th>`).join('')}</tr></thead>`;
      const tbody = `<tbody>${rows.map(r => `<tr>${r.map(c => `<td>${mdInline(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
      const tableHtml = `<div class="tbl-intro">下表为本题关键要点对比：</div><table>${thead}${tbody}</table>`;
      const restRaw = lines.slice(lastLineIndex + 1).join('\n').trim();
      return { tableHtml, restRaw };
    }
    function renderRichText(raw) {
      const src = normalizeMarkdownTableSource(raw);
      const tableBlock = parseMarkdownTableBlock(src);
      if (tableBlock) {
        const tail = tableBlock.restRaw ? renderRichText(tableBlock.restRaw) : '';
        return chapterHtmlHighlight(tableBlock.tableHtml) + tail;
      }
      const lines = src.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      if (!lines.length) return '';
      const bulletRe = /^([-*•]\s+|\d+[.、]\s+|[①②③④⑤⑥⑦⑧⑨⑩]\s*)/;
      const bulletCount = lines.filter(l => bulletRe.test(l)).length;
      if (lines.length >= 2 && bulletCount / lines.length >= 0.5) {
        const items = lines.map(l => l.replace(bulletRe, '').trim()).filter(Boolean);
        const html = `<ul class="rich-list">${items.map(it => `<li>${mdInline(it)}</li>`).join('')}</ul>`;
        return chapterHtmlHighlight(html);
      }
      const html = lines.map(l => {
        const idx = l.indexOf('：');
        if (idx > 0 && idx <= 18) {
          const head = l.slice(0, idx).trim();
          const tail = l.slice(idx + 1).trim();
          if (head && tail) {
            const boosted = `**${head}**：${tail}`;
            return chapterHtmlHighlight(`<p>${mdInline(boosted)}</p>`);
          }
        }
        return chapterHtmlHighlight(`<p>${mdInline(l)}</p>`);
      }).join('');
      return html;
    }
    function renderContent(v) {
      if (v == null) return '';
      const s = String(v);
      if (looksLikeHtml(s)) return s;
      return renderRichText(s);
    }
    function setAllAnswers(open) {
      allAnswersOpen = !!open;
      const answers = document.querySelectorAll('.answer');
      const tips = document.querySelectorAll('.tips');
      const btnAns = document.querySelectorAll('.btn-answer');
      const btnTips = document.querySelectorAll('.btn-tips');
      answers.forEach(el => el.classList.toggle('show', allAnswersOpen));
      tips.forEach(el => el.classList.toggle('show', allAnswersOpen));
      const bodies = document.querySelectorAll('.panel-body');
      bodies.forEach(el => el.style.display = allAnswersOpen ? 'block' : 'none');
      btnAns.forEach(b => {
        const id = b.getAttribute('data-id');
        const el = document.getElementById('ans-' + id);
        if (!el) return;
        b.textContent = el.classList.contains('show') ? '📖 隐藏答案' : '📖 显示答案';
      });
      btnTips.forEach(b => {
        const id = b.getAttribute('data-id');
        const el = document.getElementById('tips-' + id);
        if (!el) return;
        b.textContent = el.classList.contains('show') ? '🧠 隐藏要点' : '🧠 记忆要点';
      });
      fabLove.classList.toggle('active', allAnswersOpen);
      fabLove.setAttribute('aria-pressed', allAnswersOpen ? 'true' : 'false');
      fabLove.title = allAnswersOpen ? '关闭所有答案/要点' : '打开所有答案/要点';
      fabLove.innerText = allAnswersOpen ? '❤' : '♡';
    }
    fabLove.addEventListener('click', () => setAllAnswers(!allAnswersOpen));
    function updateChapterNavButtons() {
      const i = verEl.selectedIndex;
      prevChapterBtn.disabled = i <= 0;
      nextChapterBtn.disabled = i >= verEl.options.length - 1;
    }
    prevChapterBtn.addEventListener('click', () => {
      const i = verEl.selectedIndex;
      if (i > 0) {
        verEl.selectedIndex = i - 1;
        verEl.dispatchEvent(new Event('change'));
      }
    });
    nextChapterBtn.addEventListener('click', () => {
      const i = verEl.selectedIndex;
      if (i < verEl.options.length - 1) {
        verEl.selectedIndex = i + 1;
        verEl.dispatchEvent(new Event('change'));
      }
    });
    function renderList() {
      if (!filtered.length) {
        listEl.innerHTML = '<p style="text-align:center; color:#718096; padding:2rem;">暂无结果，请更换关键词或分类。</p>';
        return;
      }
      const html = filtered.map((item, idx) => {
        const tags = (item.tags || [])
          .filter(t => t && t !== item.category)
          .map(t => `<span class="chip" data-tag="${t}">${t}</span>`)
          .join('');
        const ansShow = allAnswersOpen ? ' show' : '';
        const tipsShow = allAnswersOpen ? ' show' : '';
        const answerLabel = currentBook === 'core' ? '核心解析' : '答案解析';
        const tipsLabel = currentBook === 'core' ? '提示 / 拓展' : '提示';
        const msysLabel = '面试延申';
        const ansBtn = allAnswersOpen ? `📖 收起${answerLabel}` : `📖 展开${answerLabel}`;
        const tipsBtn = allAnswersOpen ? `🧠 收起${tipsLabel}` : `🧠 展开${tipsLabel}`;
        return `
          <div class="card" data-id="${item.id}">
            <div class="meta">
              <span class="chip">${item.category || '未分类'}</span>
              ${tags}
            </div>
            <div class="question"><span class="qno">${idx + 1}</span><span>${item.question}</span></div>
            <div class="actions">
              <button class="btn btn-answer" data-id="${item.id}">${ansBtn}</button>
              ${item.tips ? `<button class="btn btn-tips" data-id="${item.id}">${tipsBtn}</button>` : ''}
            </div>
            <div class="panel panel-answer">
              <div class="panel-head">${answerLabel}</div>
              <div class="panel-body answer${ansShow}" id="ans-${item.id}" style="display:${allAnswersOpen ? 'block' : 'none'}">${renderContent(item.answer)}</div>
            </div>
            ${item.tips ? `
              <div class="panel panel-tips">
                <div class="panel-head">${tipsLabel}</div>
                <div class="panel-body tips${tipsShow}" id="tips-${item.id}" style="display:${allAnswersOpen ? 'block' : 'none'}">${renderContent(item.tips)}</div>
              </div>
            ` : ''}
            ${(currentBook === 'core' && item.msys) ? `
              <div class="panel panel-tips">
                <div class="panel-head">${msysLabel}</div>
                <div class="panel-body tips${tipsShow}" style="display:${allAnswersOpen ? 'block' : 'none'}">${renderContent(item.msys)}</div>
              </div>
            ` : ''}
            <div class="panel panel-note">
              <div class="panel-head">
                <span>我的笔记</span>
                <span class="note-status" id="note-status-${item.id}"></span>
              </div>
              <div class="note-body">
                <textarea class="note-text" id="note-${item.id}" placeholder="写下你的笔记（仅本机可见，按题目 id 自动保存）"></textarea>
                <div class="note-actions">
                  <button class="btn btn-note-save" type="button" data-id="${item.id}">保存</button>
                  <button class="btn btn-note-clear" type="button" data-id="${item.id}">清空</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      listEl.innerHTML = html;
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([listEl]).catch(()=>{});
      }
      listEl.querySelectorAll('.btn-answer').forEach(b => {
        b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const el = document.getElementById('ans-' + id);
          if (el) {
            el.classList.toggle('show');
            el.style.display = el.classList.contains('show') ? 'block' : 'none';
          }
          e.currentTarget.textContent = el && el.classList.contains('show') ? '📖 隐藏答案' : '📖 显示答案';
        });
      });
      listEl.querySelectorAll('.btn-tips').forEach(b => {
        b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const el = document.getElementById('tips-' + id);
          if (el) {
            el.classList.toggle('show');
            el.style.display = el.classList.contains('show') ? 'block' : 'none';
          }
          e.currentTarget.textContent = el && el.classList.contains('show') ? '🧠 隐藏要点' : '🧠 记忆要点';
        });
      });
      listEl.querySelectorAll('.chip[data-tag]').forEach(c => {
        c.addEventListener('click', () => {
          searchEl.value = c.getAttribute('data-tag') || '';
          applyFilters();
        });
      });
      listEl.querySelectorAll('.note-text').forEach(t => {
        const id = (t.id || '').replace(/^note-/, '');
        t.value = getNoteText(id);
        t.addEventListener('input', () => {
          const prev = noteTimers.get(id);
          if (prev) clearTimeout(prev);
          const timer = setTimeout(() => {
            try {
              setNoteText(id, t.value);
              setNoteStatus(id, '已保存');
            } catch {
              setNoteStatus(id, '保存失败');
            }
          }, 350);
          noteTimers.set(id, timer);
        });
      });
      listEl.querySelectorAll('.btn-note-save').forEach(b => {
        b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const t = document.getElementById('note-' + id);
          try {
            setNoteText(id, t ? t.value : '');
            setNoteStatus(id, '已保存');
          } catch {
            setNoteStatus(id, '保存失败');
          }
        });
      });
      listEl.querySelectorAll('.btn-note-clear').forEach(b => {
        b.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const t = document.getElementById('note-' + id);
          if (t) t.value = '';
          try {
            clearNote(id);
            setNoteStatus(id, '已清空');
          } catch {
            setNoteStatus(id, '清空失败');
          }
        });
      });
    }
    function applyFilters() {
      const q = (searchEl.value || '').trim().toLowerCase();
      const chapterTitle = getSelectedChapterTitle();
      data = fullData.filter(it => {
        if (!chapterTitle) return true;
        const c = it.category || '';
        return c === chapterTitle || c.startsWith(chapterTitle);
      });
      filtered = data.filter(it => {
        const t = [it.question, it.answer, it.tips, (it.tags || []).join(' ')].join(' ').toLowerCase();
        return !q || t.includes(q);
      });
      renderList();
    }
    function chapterHtmlHighlight(html) {
      if (!html) return '';
      // 只要段落包含公式标记，直接返回原 HTML（不做彩色高亮），保留粗体
      const hasMath = /\\\(|\\\[|\$/.test(html);
      if (hasMath) return html;
      let t = html;
      t = t.replace(/<strong>(.*?)<\/strong>/g, '<span class="hl-y">$1</span>');
      t = t.replace(/(提高|增加|增强|升高|加快|扩大)/g, '<span class="hl-g">$1</span>');
      t = t.replace(/(降低|减小|减弱|下降|减慢|缩小)/g, '<span class="hl-r">$1</span>');
      t = t.replace(/(优点|缺点|注意|要点|原因|结论|原则|关键|核心|定义|特点|对比|适用场景|适用于)/g, '<span class="hl-b">$1</span>');
      t = t.replace(/(硬度|强度|韧性|疲劳|磨损|效率|精度|应力|变形|组织|晶粒|马氏体|奥氏体|珠光体|淬火|回火|正火|退火|调质|渗碳|渗氮|表面淬火|齿轮|轴承|蜗杆|液压|气压|数控|刀具|公差|误差|定位|电阻|电容|电感|电压|电流)/g, '<span class="hl-y">$1</span>');
      t = t.replace(/\b(HRC|HB|HV|MPa|℃|mm|m\/s)\b/g, '<span class="hl-p">$1</span>');
      t = t.replace(/(\d+(?:\.\d+)?)(?=\s*(?:℃|mm|MPa|m\/s|%|HRC|HB|HV)\b)/g, '<span class="hl-p">$1</span>');
      return t;
    }
    function escapeHtml(s) {
      return (s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function mdInline(src) {
      let s = escapeHtml(src || '');
      s = s.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
      // links [text](url)
      s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      // inline code `code`
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      // bold **text**
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // italic *text*
      s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      // newlines to <br>
      s = s.replace(/\n/g, '<br>');
      return s;
    }
    function blocksToHtml(blocks) {
      return (blocks || []).map(b => {
        if (b.type === 'paragraph') {
          const txt = (b.text || '').trim();
          const html = mdInline(txt);
          return chapterHtmlHighlight(`<p>${html}</p>`);
        }
        if (b.type === 'table') {
          const intro = `<p class="tbl-intro">下表为本小节关键要点对比：</p>`;
          const thead = b.header ? `<thead><tr>${b.header.map((h,i)=>`<th${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${h}</th>`).join('')}</tr></thead>` : '';
          const tbody = `<tbody>${(b.rows||[]).map(r=>`<tr>${r.map((c,i)=>`<td${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${mdInline(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
          return `${intro}<table>${thead}${tbody}</table>`;
        }
        if (b.type === 'list') {
          const items = (b.items||[]).map(it => `<li>${mdInline(it.text || '')}</li>`).join('');
          return b.ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
        }
        return '';
      }).join('');
    }
    function buildChapterQA(doc) {
      const chapterTitle = (doc && doc.meta && doc.meta.title)
        ? doc.meta.title.replace(/^[一二三四五六七八九十]+、/, '')
        : '本章';
      const blocks = (doc && doc.blocks) || [];
      // 收集三级标题为题目，聚合其后的内容至下一个三级标题或章节结束
      const items = [];
      const cat = chapterTitle;
      // 找到所有 depth===3 的 heading 索引
      const indices = [];
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        if (b.type === 'heading' && b.depth === 3) indices.push(i);
      }
      for (let k = 0; k < indices.length; k++) {
        const start = indices[k];
        const end = k + 1 < indices.length ? indices[k+1] : blocks.length;
        const head = blocks[start];
        const content = blocks.slice(start + 1, end);
        const answerHtml = blocksToHtml(content);
        items.push({
          id: head.id || ('chap1-' + k),
          category: cat,
          question: head.text || ('小节 ' + (k+1)),
          answer: chapterHtmlHighlight(answerHtml),
          tips: '',
          tags: [cat]
        });
      }
      return items;
    }
    function normalizeItem(it, idx) {
      const id = (it && it.id != null) ? String(it.id) : String(idx + 1);
      const category = (it && it.category) ? it.category : '未分类';
      const question = (it && it.question) ? it.question : '';
      // 兼容 detail.json 字段：answer_standard / answer_core
      const answer = (it && (it.answer != null || it.answer_standard != null))
        ? (it.answer != null ? it.answer : it.answer_standard)
        : '';
      const tips = (it && (it.tips != null || it.answer_core != null))
        ? (it.tips != null ? it.tips : it.answer_core)
        : '';
      const tags = (it && Array.isArray(it.tags)) ? it.tags : (category ? [category] : []);
      const msys = (currentBook === 'core' && it && it.msys) ? it.msys : '';
      return { id, category, question, answer, tips, tags, msys };
    }
    function getSelectedChapterTitle() {
      if (currentBook === 'core') return '';
      const v = verEl.value;
      return chapterTitles[v] || '';
    }
    function loadData() {
      if (fullData.length) {
        applyFilters();
        updateChapterNavButtons();
        return;
      }
      const src = currentBook === 'core' ? sources.core : sources.detail;
      listEl.innerHTML = `<p style=\"text-align:center; color:#718096; padding:2rem;\">正在加载 ${src}...</p>`;
      fetch(src)
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(json => {
          fullData = (json || []).map(normalizeItem);
          applyFilters();
          updateChapterNavButtons();
        })
        .catch(() => {
          listEl.innerHTML = `<p style=\"text-align:center; color:#ef4444; padding:2rem;\">数据加载失败，请检查 ${src} 是否存在且为合法 JSON。</p>`;
        });
    }
    searchEl.addEventListener('input', applyFilters);
    verEl.addEventListener('change', () => {
      searchEl.value = '';
      loadData();
    });
    bookSelect.addEventListener('change', () => {
      currentBook = bookSelect.value;
      fullData = [];
      data = [];
      filtered = [];
      categories = [];
      listEl.innerHTML = '';
      loadData();
    });
    function renderChapter(doc) {
      const blocks = doc && doc.blocks ? doc.blocks : [];
      const parts = [];
      let section = [];
      let title = '';
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        if (b.type === 'heading' && b.depth === 2) {
          title = `<h2 id="${b.id}">${mdInline(b.text || '')}</h2>`;
          continue;
        }
        if (b.type === 'heading' && b.depth === 3) {
          if (section.length) {
            parts.push(`<div class="section">${section.join('')}</div>`);
            section = [];
          }
          section.push(`<h3 id="${b.id}">${mdInline(b.text || '')}</h3>`);
          continue;
        }
        if (b.type === 'paragraph') {
          const txt = (b.text || '').trim();
          const html = mdInline(txt);
          section.push(chapterHtmlHighlight(`<p>${html}</p>`));
          continue;
        }
        if (b.type === 'table') {
          const intro = `<p class="tbl-intro">下表为本小节关键要点对比：</p>`;
          const thead = b.header ? `<thead><tr>${b.header.map((h,i)=>`<th${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${h}</th>`).join('')}</tr></thead>` : '';
          const tbody = `<tbody>${(b.rows||[]).map(r=>`<tr>${r.map((c,i)=>`<td${b.align && b.align[i] ? ` style="text-align:${b.align[i]};"`:''}>${mdInline(c)}</td>`).join('')}</tr>`).join('')}</tbody>`;
          section.push(`${intro}<table>${thead}${tbody}</table>`);
          continue;
        }
        if (b.type === 'list') {
          const items = (b.items||[]).map(it => `<li>${mdInline(it.text || '')}</li>`).join('');
          section.push(b.ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`);
          continue;
        }
      }
      if (section.length) parts.push(`<div class="section">${section.join('')}</div>`);
      const html = [title, ...parts].join('');
      bookEl.innerHTML = `<div class="card article">${html}</div>`;
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([bookEl]).catch(()=>{});
      }
    }
    function loadChapter() {
      if (chapterLoaded) return;
      const v = (verEl.value && verEl.value.startsWith('chapter')) ? verEl.value : 'chapter1';
      const src = sources[v] || sources['chapter1'];
      bookEl.innerHTML = '<p style="text-align:center; color:#718096; padding:2rem;">正在加载章节...</p>';
      fetch(src)
        .then(r => r.json())
        .then(json => {
          renderChapter(json);
          chapterLoaded = true;
        })
        .catch(() => {
          bookEl.innerHTML = '<p style="text-align:center; color:#ef4444; padding:2rem;">章节加载失败，请稍后重试。</p>';
        });
    }
    loadData();
  </script>
</body>
