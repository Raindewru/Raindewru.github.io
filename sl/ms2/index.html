                                        "id": "q1",
                                        "title": "1. 材料力学研究对象及核心任务？与理论力学区别？",
                                        "coreAnswer": "材料力学研究对象是**构件**（梁、轴、拉杆），核心任务围绕**强度**、**刚度**、**稳定性**。\n① 强度：构件抵抗破坏的能力（如吊车梁不被拉断）；\n② 刚度：构件抵抗变形的能力（如机床主轴变形不超允许值）；\n③ 稳定性：受压构件保持原有平衡形态的能力（如细长压杆不被压弯）。\n与理论力学的区别：理论力学将物体视为**刚体**，仅研究运动与受力关系；材料力学将物体视为**变形固体**，重点分析受力与变形、破坏的内在联系。",

                                    },
                                    {
                                        "id": "q2",
                                        "title": "2. 什么是“应力”和“应变”？正应力、切应力与正应变、切应变的对应关系？",
                                        "coreAnswer": "应力是构件内部单位面积上的内力（单位 Pa，\\(1\\mathrm{Pa} = 1\\mathrm{N} / \\mathrm{m}^{2}\\)），反映内力的密集程度；应变是构件单位长度的变形量（无量纲），反映变形的强弱。对应关系：\n① 正应力 \\((\\sigma)\\) 与正应变 \\((\\epsilon)\\)：正应力是垂直于截面的应力（拉/压应力），正应变是沿截面法线方向的线应变，胡克定律下满足 \\(\\sigma = E\\epsilon\\)（E为弹性模量，衡量材料抵抗线变形的能力）；\n② 切应力 \\((\\tau)\\) 与切应变 \\((\\gamma)\\)：切应力是平行于截面的应力（剪切变形产生），切应变是截面间的角变形（弧度），胡克定律下满足 \\(\\tau = G\\gamma\\)（G为切变模量，衡量材料抵抗剪切变形的能力）。",
                                        "interviewExtension": "弹性模量E和切变模量G存在换算关系 \\(G = E / [2(1 + \\mu)]\\)（\\(\\mu\\) 为泊松比，反映横向应变与纵向应变的比值），泊松比 \\(\\mu\\) 通常在0.2-0.4之间，橡胶材料可达0.5。"
                                    },

                                        "id": "q3",
                                        "title": "3. 材料的“强度指标”和“塑性指标”有哪些？简述拉伸试验中低碳钢的四个变形阶段。",
                                        "coreAnswer": "强度指标是衡量材料抵抗破坏的指标，包括屈服强度（\\(\\sigma _{s}\\)，材料开始塑性变形的应力）、抗拉强度（\\(\\sigma _{B}\\)，材料能承受的最大应力）；塑性指标是衡量材料塑性变形能力的指标，包括伸长率（δ，断裂后长度变化率）、断面收缩率（\\(\\psi\\)，断裂后横截面积变化率）。\n低碳钢拉伸四阶段：①弹性阶段（应力与应变成正比，卸载后变形完全恢复，对应比例极限 \\(\\sigma _{p}\\) )；②屈服阶段（应力基本不变，应变显著增加，出现“屈服平台”，对应屈服强度 \\(\\sigma _{s}\\) )；③强化阶段（材料抵抗变形能力增强，应力应变均增加，对应抗拉强度 \\(\\sigma _{B}\\) )；④颈缩阶段（局部截面急剧缩小，应力下降，最终断裂）。",

                                    }
                                ]

                                        "id": "q4",
                                        "title": "4．轴向拉压杆的强度条件是什么？如何进行强度校核、截面设计和许用载荷计算？",
                                        "coreAnswer": "轴向拉压杆的强度条件是“工作应力不超过许用应力”，公式为 \\(\\sigma _{max}= N_{max}/A\\leq [\\sigma ]\\)，其中 \\(N_{max}\\) 是最大轴力（通过轴力图确定），A是横截面面积，\\([\\sigma ]\\) 是许用应力（\\([\\sigma ]=\\sigma _{s}/[n]\\) 或 \\([\\sigma ]=\\sigma _{B}/[n]\\)，\\([n]\\) 为安全系数）。\n三类应用：①强度校核：已知A、\\([\\sigma ]\\) 和 \\(N_{max}\\)，验证 \\(\\sigma _{max}\\leq [\\sigma ]\\)；②截面设计：已知 \\(N_{max}\\) 和 \\([\\sigma ]\\)，计算最小截面面积 \\(A\\geq N_{max}/[\\sigma ]\\)；③许用载荷计算：已知A和 \\([\\sigma ]\\)，计算最大许用轴力 \\([N]=A[\\sigma ]\\)，再换算为许用载荷。",
                                        "interviewExtension": "变截面拉压杆需分段计算应力，最大应力可能出现在轴力大或截面积小的截面；对于阶梯杆，需绘制轴力图并结合截面尺寸确定危险截面。"
                                    },
                                    {

                                        "title": "5．圆轴扭转时的强度条件和刚度条件是什么？如何判断扭转时的危险截面和危险点？",
                                        "coreAnswer": "扭转强度条件：\\(\\tau_{\\mathrm{max}} = T_{\\mathrm{max}} / W_{\\mathrm{t}} \\leq [\\tau ]\\)，其中 \\(T_{\\mathrm{max}}\\) 是最大扭矩（通过扭矩图确定），\\(W_{\\mathrm{t}}\\) 是抗扭截面系数（圆轴 \\(W_{\\mathrm{t}} = \\pi \\mathrm{d}^{3} / 16\\)，空心圆轴 \\(W_{\\mathrm{t}} = \\pi (D^{4} - d^{4}) / (16D)\\)），\\([\\tau ]\\) 是许用切应力。扭转刚度条件：\\(\\phi_{\\mathrm{max}}^{\\prime} = T_{\\mathrm{max}} / (\\mathrm{GIP}) \\times (180 / \\pi) \\leq [\\phi ]\\)（单位°/m），其中IP是极惯性矩（圆轴 \\(\\mathrm{IP} = \\pi \\mathrm{d}^{4} / 32\\)），\\([\\phi ]\\) 是许用单位长度扭转角。危险截面判断：扭矩T最大且抗扭截面系数 \\(W_{\\mathrm{t}}\\) 最小的截面；危险点判断：危险截面边缘各点（切应力最大）。",

              "coreAnswer": "常用创新方法：\n\n① 机构组合法（串联、并联、叠加，如数控机床的进给机构是滚珠丝杠＋直线导轨的串联组合）；\n② 机构变异法（改变构件形状或运动副类型，如将曲柄滑块机构的滑块改为导杆，得到导杆机构）；\n③ 仿生设计法（模仿生物运动，如仿生机器人的关节采用球面副模拟人体关节）；\n④ 逆向设计法（从工作要求反推机构形式，如为实现间歇送料，设计槽轮机构或棘轮机构）。",
              "interviewExtension": ""
            },
            {
              "id": "q03",
              "title": "3. 凸轮机构的常用从动件运动规律有哪些？各适用于什么场合？",
              "coreAnswer": "主要运动规律及应用：\n\n① 等速运动规律：从动件速度突变，产生刚性冲击，适用于低速、轻载（如自动送料机构的推料凸轮）；\n② 等加速等减速运动规律：加速度突变，产生柔性冲击，适用于中速、中载（如机床凸轮机构）；\n③ 简谐运动规律：加速度连续变化，无刚性冲击，适用于高速、轻载（如高速凸轮粉碎机）；\n④ 多项式运动规律（如五次多项式）：加速度和速度均连续，无冲击，适用于高速、重载精密场合（如航空发动机凸轮）。",
              "interviewExtension": ""
            },
            {

              "title": "4. 齿轮系的分类及功用是什么？周转轮系的传动比计算核心步骤是什么？",
              "coreAnswer": "齿轮系分为定轴轮系（各齿轮轴线固定）和周转轮系（含行星轮，轴线绕中心轮转动）。功用：\n\n① 实现大传动比（如减速器的定轴轮系，周转轮系传动比可达1000以上）；\n② 改变运动方向（如锥齿轮轮系实现90°转向）；\n③ 实现分路传动（如汽车变速箱的轮系，带动车轮和差速器）；\n④ 实现运动合成与分解（如差速器的周转轮系，分解汽车左右轮转速）。\n\n周转轮系传动比计算步骤：\n\n① 给整个周转轮系加一个与系杆转向相反的角速度（-ω_H），将其转化为定轴轮系（转化轮系）；\n② 利用定轴轮系传动比公式计算转化轮系的传动比；\n③ 代入已知条件，求解未知角速度和传动比。",

            },
            {
              "id": "q05",
              "title": "5. 机械系统的减震降噪措施有哪些？请从结构设计角度分析。",
              "coreAnswer": "结构设计层面的措施：\n\n① 采用弹性连接（如联轴器选用弹性柱销型，减少振动传递）；\n② 增加阻尼元件（如在机架上安装阻尼器，吸收振动能量）；\n③ 优化构件刚度分布（避免共振，如调整轴的直径避开临界转速）；\n④ 减少运动副间隙（如齿轮采用变位修正，减小啮合间隙）；\n⑤ 采用隔音结构（如齿轮箱采用密封式箱体并填充隔音材料）；\n⑥ 轻量化设计（选用铝合金等轻质材料，降低惯性力引起的振动）。",

                ]
            };

            // 兼容嵌套 books 结构：如果有元素本身包含 books 数组，拉平成同级书本
            if (Array.isArray(booksData.books)) {
                booksData.books = booksData.books.flatMap(b => (b && b.books ? b.books : [b]));
            }

            // 当前书本/章节
            let currentBookId = "book1";
            let currentChapterId = "chap1";
            let currentBook = booksData.books.find(b => b.id === currentBookId);
            let chapters = currentBook.chapters;

            // DOM
            const bookSelect = document.getElementById('bookSelect');
            const chapterSelect = document.getElementById('chapterSelect');
            const currentChapterSpan = document.getElementById('currentChapterTitle');
            const container = document.getElementById('questionsContainer');
            const prevBtn = document.getElementById('prevChapterBtn');
            const nextBtn = document.getElementById('nextChapterBtn');
            const toggleAllBtn = document.getElementById('toggleAllBtn');

            // 主题切换
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.getAttribute('data-theme');
                    document.body.setAttribute('data-theme', theme);
                });
            });

            // 初始化下拉框
            function renderBookSelect() {
                bookSelect.innerHTML = '';
                booksData.books.forEach(book => {
                    const option = document.createElement('option');
                    option.value = book.id;
                    option.textContent = book.name;
                    if (book.id === currentBookId) option.selected = true;
                    bookSelect.appendChild(option);
                });
            }

            function renderChapterSelect() {
                chapterSelect.innerHTML = '';
                currentBook = booksData.books.find(b => b.id === currentBookId);
                chapters = currentBook.chapters;

                if (chapters.length === 0) {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = '✨ 暂无章节';
                    chapterSelect.appendChild(option);
                    chapterSelect.disabled = true;
                    currentChapterSpan.textContent = '无章节';
                    return;
                }
                chapterSelect.disabled = false;

                // 全部展开选项
                const optAll = document.createElement('option');
                optAll.value = '__all';
                optAll.textContent = '🔓 展开全部章节';
                chapterSelect.appendChild(optAll);

                chapters.forEach((ch, index) => {
                    const option = document.createElement('option');
                    option.value = ch.id;
                    option.textContent = ch.title;
                    if (index === 0 && !currentChapterId) {
                        option.selected = true;
                        currentChapterId = ch.id;
                    } else if (ch.id === currentChapterId) {
                        option.selected = true;
                    }
                    chapterSelect.appendChild(option);
                });

                const exists = currentChapterId === '__all' || chapters.some(ch => ch.id === currentChapterId);
                if (!exists && chapters.length) {
                    currentChapterId = chapters[0].id;
                    chapterSelect.value = currentChapterId;
                }
                if (chapters.length) {
                    if (currentChapterId === '__all') {
                        currentChapterSpan.textContent = '展开全部章节';
                        chapterSelect.value = '__all';
                    } else {
                        const curCh = chapters.find(ch => ch.id === currentChapterId);
                        currentChapterSpan.textContent = curCh ? curCh.title : chapters[0].title;
                    }
                } else {
                    currentChapterSpan.textContent = '';
                }
            }

            // 处理加粗、分行、前缀强调
            function processBold(text) {
                if (!text) return '';
                return text
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .split(/\n+/)
                    .map(line => {
                        line = line.trim();
                        if (!line) return '';
                        const m = line.match(/^(.{1,80}?)(：|:)(.*)$/);
                        if (m) {
                            const [, head, colon, tail] = m;
                            return `<div class="answer-line"><strong>${head}${colon}</strong>${tail}</div>`;
                        }
                        return `<div class="answer-line">${line}</div>`;
                    })
                    .join('');
            }

            // 渲染卡片，所有答案默认隐藏（因为父容器没有show-answers类）
            function renderQuestions() {
                if (!chapters.length) {
                    container.innerHTML = `<div class="empty-state">🍼 这本书还没有小题目呢，换一本试试吧～</div>`;
                    return;
                }

                // 决定要展示哪些章节
                let chapterList = [];
                if (currentChapterId === '__all') {
                    chapterList = chapters;
                } else {
                    const chapter = chapters.find(ch => ch.id === currentChapterId);
                    if (chapter) chapterList = [chapter];
                }

                if (!chapterList.length) {
                    container.innerHTML = `<div class="empty-state">🌸 当前章节还没有问题哦，去看看别的吧</div>`;
                    return;
                }

                container.innerHTML = '';

                chapterList.forEach(chapter => {
                    // 如果是展开全部，为每个章节打一个小标签
                    if (currentChapterId === '__all') {
                        const tag = document.createElement('div');
                        tag.className = 'sub-label';
                        tag.textContent = `📖 ${chapter.title}`;
                        tag.style.marginBottom = '10px';
                        container.appendChild(tag);
                    }

                    (chapter.questions || []).forEach(q => {
                        const coreWithBold = processBold(q.coreAnswer || '');
                        const extWithBold = processBold(q.interviewExtension || '');

                        const card = document.createElement('div');
                        card.className = 'question-card';
                        card.setAttribute('data-qid', q.id);

                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'q-title';
                        titleDiv.textContent = q.title;
                        card.appendChild(titleDiv);

                        const coreDiv = document.createElement('div');
                        coreDiv.className = 'core-answer';
                        const coreLabel = document.createElement('span');
                        coreLabel.className = 'sub-label';
                        coreLabel.textContent = '🍬 核心答案';
                        const coreContent = document.createElement('div');
                        coreContent.innerHTML = coreWithBold;
                        coreDiv.appendChild(coreLabel);
                        coreDiv.appendChild(coreContent);
                        card.appendChild(coreDiv);

                        const extDiv = document.createElement('div');
                        extDiv.className = 'interview-ext';
                        const extLabel = document.createElement('span');
                        extLabel.className = 'sub-label';
                        extLabel.textContent = '🍡 面试延伸';
                        const extContent = document.createElement('div');
                        extContent.innerHTML = extWithBold;
                        extDiv.appendChild(extLabel);
                        extDiv.appendChild(extContent);
                        card.appendChild(extDiv);

                        const footer = document.createElement('div');
                        footer.className = 'card-footer';
                        const toggleBtn = document.createElement('button');
                        toggleBtn.className = 'toggle-card-btn';
                        toggleBtn.textContent = '🔍 展开本卡答案';
                        footer.appendChild(toggleBtn);
                        card.appendChild(footer);

                        container.appendChild(card);

                        toggleBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const isHidden = coreDiv.style.display === 'none' || coreDiv.style.display === '';
                            if (isHidden) {
                                coreDiv.style.display = 'block';
                                extDiv.style.display = 'block';
                                toggleBtn.textContent = '📌 折叠答案';
                            } else {
                                coreDiv.style.display = 'none';
                                extDiv.style.display = 'none';
                                toggleBtn.textContent = '🔍 展开本卡答案';
                            }
                        });
                    });

                    // 章节末尾留一点空隙
                    if (currentChapterId === '__all') {
                        const spacer = document.createElement('div');
                        spacer.style.height = '10px';
                        container.appendChild(spacer);
                    }
                });

                // 渲染公式
                if (window.MathJax) {
                    MathJax.typesetPromise?.();
                }
            }

            // 全局展开/折叠
            let allAnswersVisible = false; // 初始折叠
            toggleAllBtn.addEventListener('click', () => {
                allAnswersVisible = !allAnswersVisible;
                document.querySelectorAll('.question-card').forEach(card => {
                    const core = card.querySelector('.core-answer');
                    const ext = card.querySelector('.interview-ext');
                    const btn = card.querySelector('.toggle-card-btn');
                    if (allAnswersVisible) {
                        core.style.display = 'block';
                        ext.style.display = 'block';
                        btn.textContent = '📌 折叠答案';
                    } else {
                        core.style.display = 'none';
                        ext.style.display = 'none';
                        btn.textContent = '🔍 展开本卡答案';
                    }
                });
                toggleAllBtn.textContent = allAnswersVisible ? '🔮 折叠全部答案' : '🔮 展开全部答案';
            });

            // 刷新所有
            function refreshAll() {
                renderBookSelect();
                renderChapterSelect();
                renderQuestions();
                // 重置全局展开状态为折叠
                allAnswersVisible = false;
                toggleAllBtn.textContent = '🔮 展开全部答案';
            }

            // 事件
            bookSelect.addEventListener('change', (e) => {
                currentBookId = e.target.value;
                const newBook = booksData.books.find(b => b.id === currentBookId);
                if (newBook.chapters && newBook.chapters.length > 0) {
                    currentChapterId = newBook.chapters[0].id;
                } else {
                    currentChapterId = null;
                }
                renderChapterSelect();
                renderQuestions();
            });

            chapterSelect.addEventListener('change', (e) => {
                currentChapterId = e.target.value;
                if (currentChapterId === '__all') {
                    currentChapterSpan.textContent = '展开全部章节';
                } else {
                    const chapter = chapters.find(ch => ch.id === currentChapterId);
                    if (chapter) currentChapterSpan.textContent = chapter.title;
                }
                renderQuestions();
            });

            prevBtn.addEventListener('click', () => {
                if (!chapters.length) return;
                const currentIdx = chapters.findIndex(ch => ch.id === currentChapterId);
                if (currentIdx > 0) {
                    currentChapterId = chapters[currentIdx - 1].id;
                    chapterSelect.value = currentChapterId;
                    currentChapterSpan.textContent = chapters[currentIdx - 1].title;
                    renderQuestions();
                } else {
                    alert('🍰 已经在第一章啦~');
                }
            });

            nextBtn.addEventListener('click', () => {
                if (!chapters.length) return;
                const currentIdx = chapters.findIndex(ch => ch.id === currentChapterId);
                if (currentIdx < chapters.length - 1) {
                    currentChapterId = chapters[currentIdx + 1].id;
                    chapterSelect.value = currentChapterId;
                    currentChapterSpan.textContent = chapters[currentIdx + 1].title;
                    renderQuestions();
                } else {
                    alert('🍰 已经是最后一章啦~');
                }
            });


            // 初始渲染
            refreshAll();
        })();
    </script>
</body>
</html>
